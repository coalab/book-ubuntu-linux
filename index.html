 -f /var/log/nginx/error.log\n\n# 가장 많이 접속한 IP\nawk '{print $1}' /var/log/nginx/access.log | sort | uniq -c | sort -rn | head -10\n\n# 가장 많이 요청된 URL\nawk '{print $7}' /var/log/nginx/access.log | sort | uniq -c | sort -rn | head -10\n\n# HTTP 상태 코드 분포\nawk '{print $9}' /var/log/nginx/access.log | sort | uniq -c | sort -rn\n\n# 로그 로테이션 설정\ncat /etc/logrotate.d/nginx\n```\n\n---\n\n## 핵심 요약\n\n- **설치 후 필수**: `systemctl enable nginx`, `ufw allow 'Nginx Full'`\n- **설정 구조**: sites-available에 작성 → sites-enabled에 심볼릭 링크\n- **`nginx -t`**: 설정 변경 후 항상 문법 검사\n- **Let's Encrypt**: certbot으로 무료 HTTPS 인증서 발급\n- **리버스 프록시**: Node.js/Python 앱 앞에 Nginx 배치\n- **보안 헤더**: HSTS, X-Frame-Options 등 필수 설정\n", "# 챕터 12: 데이터베이스 (MySQL/MariaDB)\n\n> MySQL을 설치하고 실전 데이터베이스 서버를 운영한다\n\n## 학습 목표\n- MySQL/MariaDB를 설치하고 보안 설정할 수 있다\n- 데이터베이스와 사용자를 생성하고 관리할 수 있다\n- 백업과 복원을 자동화할 수 있다\n- 기본적인 성능 튜닝을 적용할 수 있다\n\n---\n\n## 12.1 MySQL vs MariaDB\n\n| 특성 | MySQL | MariaDB |\n|------|-------|---------|\n| 개발사 | Oracle | MariaDB Foundation |\n| 라이선스 | GPL + 상업용 | GPL |\n| 호환성 | - | MySQL 완전 호환 |\n| 성능 | 우수 | 일부 쿼리 더 빠름 |\n| 추천 환경 | 대기업, Oracle 통합 | 오픈소스 프로젝트 |\n\n---\n\n## 12.2 MySQL 설치\n\n```bash\n# MySQL 설치\nsudo apt update\nsudo apt install mysql-server\n\n# 서비스 시작 및 활성화\nsudo systemctl enable --now mysql\n\n# 버전 확인\nmysql --version\n\n# 보안 초기 설정 (필수!)\nsudo mysql_secure_installation\n```\n\n```\nmysql_secure_installation 과정:\n1. root 비밀번호 설정\n2. 익명 사용자 제거: Y\n3. 원격 root 로그인 비활성화: Y\n4. test 데이터베이스 제거: Y\n5. 권한 테이블 갱신: Y\n```\n\n### MySQL 접속\n\n```bash\n# root로 접속 (sudo 필요)\nsudo mysql\n\n# 또는 비밀번호로 접속\nmysql -u root -p\n\n# 원격 서버 접속\nmysql -h 192.168.1.100 -u student -p mydb\n\n# SQL 파일 실행\nmysql -u root -p mydb < backup.sql\n```\n\n---\n\n## 12.3 데이터베이스 기본 SQL\n\n### 데이터베이스 관리\n\n```sql\n-- 데이터베이스 목록\nSHOW DATABASES;\n\n-- 데이터베이스 생성\nCREATE DATABASE myapp CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;\n\n-- 데이터베이스 선택\nUSE myapp;\n\n-- 현재 데이터베이스 확인\nSELECT DATABASE();\n\n-- 데이터베이스 삭제\nDROP DATABASE IF EXISTS testdb;\n```\n\n### 테이블 관리\n\n```sql\n-- 테이블 목록\nSHOW TABLES;\n\n-- 테이블 생성\nCREATE TABLE users (\n    id INT AUTO_INCREMENT PRIMARY KEY,\n    username VARCHAR(50) NOT NULL UNIQUE,\n    email VARCHAR(100) NOT NULL UNIQUE,\n    password_hash VARCHAR(255) NOT NULL,\n    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,\n    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,\n    is_active TINYINT(1) DEFAULT 1,\n    INDEX idx_email (email),\n    INDEX idx_username (username)\n) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;\n\n-- 테이블 구조 확인\nDESCRIBE users;\nSHOW CREATE TABLE users;\n\n-- 테이블 수정\nALTER TABLE users ADD COLUMN avatar_url VARCHAR(255);\nALTER TABLE users MODIFY COLUMN username VARCHAR(100);\nALTER TABLE users DROP COLUMN avatar_url;\n\n-- 테이블 삭제\nDROP TABLE IF EXISTS temp_table;\n```\n\n### CRUD 기본 쿼리\n\n```sql\n-- 데이터 삽입 (INSERT)\nINSERT INTO users (username, email, password_hash)\nVALUES ('student', 'student@example.com', '$2y$10$hashedpassword');\n\nINSERT INTO users (username, email, password_hash) VALUES\n  ('alice', 'alice@example.com', 'hash1'),\n  ('bob', 'bob@example.com', 'hash2');\n\n-- 데이터 조회 (SELECT)\nSELECT * FROM users;\nSELECT id, username, email FROM users WHERE is_active = 1;\nSELECT * FROM users WHERE created_at > '2024-01-01' ORDER BY created_at DESC;\nSELECT * FROM users LIMIT 10 OFFSET 20;\n\n-- 데이터 수정 (UPDATE)\nUPDATE users SET is_active = 0 WHERE id = 5;\nUPDATE users SET email = 'new@example.com' WHERE username = 'student';\n\n-- 데이터 삭제 (DELETE)\nDELETE FROM users WHERE id = 10;\nDELETE FROM users WHERE is_active = 0 AND created_at < '2023-01-01';\n\n-- JOIN 쿼리\nSELECT u.username, p.title, p.created_at\nFROM users u\nINNER JOIN posts p ON u.id = p.user_id\nWHERE u.is_active = 1\nORDER BY p.created_at DESC\nLIMIT 10;\n```\n\n---\n\n## 12.4 사용자와 권한 관리\n\n```sql\n-- 사용자 목록 확인\nSELECT user, host FROM mysql.user;\n\n-- 사용자 생성\nCREATE USER 'appuser'@'localhost' IDENTIFIED BY 'secure_password';\nCREATE USER 'readonly'@'%' IDENTIFIED BY 'password';         -- 모든 호스트\nCREATE USER 'admin'@'192.168.1.%' IDENTIFIED BY 'password';  -- IP 범위\n\n-- 권한 부여\nGRANT ALL PRIVILEGES ON myapp.* TO 'appuser'@'localhost';\nGRANT SELECT ON myapp.* TO 'readonly'@'%';\nGRANT SELECT, INSERT, UPDATE ON myapp.users TO 'appuser'@'localhost';\nGRANT REPLICATION SLAVE ON *.* TO 'replicator'@'%';\n\n-- 권한 확인\nSHOW GRANTS FOR 'appuser'@'localhost';\n\n-- 권한 적용\nFLUSH PRIVILEGES;\n\n-- 권한 제거\nREVOKE INSERT, UPDATE ON myapp.* FROM 'readonly'@'%';\n\n-- 사용자 삭제\nDROP USER 'olduser'@'localhost';\n\n-- 비밀번호 변경\nALTER USER 'appuser'@'localhost' IDENTIFIED BY 'new_password';\n```\n\n---\n\n## 12.5 백업과 복원\n\n### mysqldump - 논리적 백업\n\n```bash\n# 단일 데이터베이스 백업\nmysqldump -u root -p myapp > myapp_backup.sql\n\n# 압축 백업\nmysqldump -u root -p myapp | gzip > myapp_$(date +%Y%m%d).sql.gz\n\n# 모든 데이터베이스 백업\nmysqldump -u root -p --all-databases > all_databases.sql\n\n# 구조만 백업 (데이터 제외)\nmysqldump -u root -p --no-data myapp > myapp_schema.sql\n\n# 특정 테이블만 백업\nmysqldump -u root -p myapp users posts > partial_backup.sql\n\n# 원격 서버 백업\nmysqldump -h 192.168.1.100 -u root -p myapp > remote_backup.sql\n```\n\n### 복원\n\n```bash\n# 데이터베이스 복원\nmysql -u root -p myapp < myapp_backup.sql\n\n# 압축 파일에서 복원\ngunzip < myapp_20240115.sql.gz | mysql -u root -p myapp\n\n# 새 데이터베이스로 복원\nmysql -u root -p -e \"CREATE DATABASE myapp_restore\"\nmysql -u root -p myapp_restore < myapp_backup.sql\n```\n\n### 자동 백업 스크립트\n\n```bash\n#!/bin/bash\n# /opt/scripts/mysql_backup.sh\n\nBACKUP_DIR=\"/var/backups/mysql\"\nDB_USER=\"root\"\nDB_PASS=\"your_password\"\nRETENTION_DAYS=7\nDATE=$(date +%Y%m%d_%H%M%S)\n\nmkdir -p $BACKUP_DIR\n\n# 모든 데이터베이스 목록 가져와서 백업\nfor DB in $(mysql -u$DB_USER -p$DB_PASS -e \"SHOW DATABASES;\" 2>/dev/null | \\\n           grep -Ev \"^(Database|information_schema|performance_schema|mysql|sys)$\"); do\n    echo \"백업 중: $DB\"\n    mysqldump -u$DB_USER -p$DB_PASS --single-transaction \\\n              --routines --triggers $DB | \\\n              gzip > $BACKUP_DIR/${DB}_${DATE}.sql.gz\ndone\n\n# 오래된 백업 삭제\nfind $BACKUP_DIR -name \"*.sql.gz\" -mtime +$RETENTION_DAYS -delete\n\necho \"백업 완료: $DATE\"\n```\n\n```bash\nchmod +x /opt/scripts/mysql_backup.sh\n\n# crontab에 등록 (매일 새벽 2시)\necho \"0 2 * * * /opt/scripts/mysql_backup.sh >> /var/log/mysql_backup.log 2>&1\" | \\\n  sudo crontab -\n```\n\n---\n\n## 12.6 MySQL 설정 최적화\n\n```bash\nsudo nano /etc/mysql/mysql.conf.d/mysqld.cnf\n```\n\n```ini\n[mysqld]\n# 기본 설정\nuser            = mysql\npid-file        = /var/run/mysqld/mysqld.pid\nsocket          = /var/run/mysqld/mysqld.sock\nport            = 3306\ndatadir         = /var/lib/mysql\n\n# 로그 설정\ngeneral_log     = 0                          # 일반 로그 (개발 시만)\nslow_query_log  = 1                          # 느린 쿼리 로그\nslow_query_log_file = /var/log/mysql/slow.log\nlong_query_time = 1                          # 1초 이상 = 느린 쿼리\nlog_error       = /var/log/mysql/error.log\n\n# InnoDB 설정\ninnodb_buffer_pool_size = 1G                 # 전체 메모리의 70-80%\ninnodb_buffer_pool_instances = 2\ninnodb_log_file_size = 256M\ninnodb_flush_log_at_trx_commit = 1          # 안전성 우선\ninnodb_flush_method = O_DIRECT\n\n# 연결 설정\nmax_connections = 200\nconnect_timeout = 10\nwait_timeout = 600\ninteractive_timeout = 600\nmax_allowed_packet = 64M\n\n# 문자 인코딩\ncharacter-set-server = utf8mb4\ncollation-server = utf8mb4_unicode_ci\n```\n\n### 성능 모니터링\n\n```sql\n-- 현재 실행 중인 쿼리\nSHOW PROCESSLIST;\nSHOW FULL PROCESSLIST;\n\n-- 느린 쿼리 분석\nSELECT * FROM mysql.slow_log ORDER BY query_time DESC LIMIT 10;\n\n-- 테이블 상태 확인\nSHOW TABLE STATUS FROM myapp;\n\n-- 쿼리 실행 계획 확인\nEXPLAIN SELECT * FROM users WHERE email = 'student@example.com';\nEXPLAIN ANALYZE SELECT u.*, p.* FROM users u JOIN posts p ON u.id = p.user_id;\n\n-- 인덱스 사용 현황\nSHOW INDEX FROM users;\n\n-- 서버 상태 변수\nSHOW STATUS LIKE 'Threads_connected';\nSHOW STATUS LIKE 'Slow_queries';\nSHOW VARIABLES LIKE 'innodb_buffer_pool_size';\n```\n\n---\n\n## 핵심 요약\n\n- **설치 후 필수**: `mysql_secure_installation` 실행\n- **사용자 원칙**: root 직접 사용 금지, 앱별 전용 계정 생성\n- **백업 전략**: mysqldump + cron + gzip 압축 + 보존 기간 설정\n- **innodb_buffer_pool_size**: 전체 RAM의 70-80%로 설정\n- **EXPLAIN**: 느린 쿼리 최적화 시 반드시 실행 계획 확인\n- **utf8mb4**: 이모지 포함 완전한 유니코드 지원 (utf8 대신 사용)\n", "# 챕터 13: 컨테이너와 Docker\n\n> Docker로 애플리케이션을 컨테이너화하고 배포한다\n\n## 학습 목표\n- 컨테이너와 가상화의 차이를 이해한다\n- Docker 기본 명령어를 능숙하게 사용할 수 있다\n- Dockerfile로 커스텀 이미지를 빌드할 수 있다\n- Docker Compose로 멀티 컨테이너 앱을 관리할 수 있다\n\n---\n\n## 13.1 컨테이너 이해\n\n### 가상화 vs 컨테이너\n\n```\n가상화 (VM):                    컨테이너 (Docker):\n┌──────────────────────────┐   ┌──────────────────────────┐\n│  App A  │  App B  │ App C│   │  App A  │  App B  │ App C│\n├─────────┼─────────┼──────┤   ├─────────┼─────────┼──────┤\n│  OS A   │  OS B   │ OS C │   │ Libs A  │ Libs B  │LibsC │\n├─────────┴─────────┴──────┤   ├──────────────────────────┤\n│     하이퍼바이저           │   │      Docker Engine        │\n├──────────────────────────┤   ├──────────────────────────┤\n│         Host OS           │   │         Host OS           │\n└──────────────────────────┘   └──────────────────────────┘\n단점: OS 중복, 느린 부팅         장점: 경량, 빠른 시작, 이식성\n```\n\n### Docker 핵심 개념\n\n```\n이미지 (Image)      → 템플릿 (읽기 전용 레이어)\n컨테이너 (Container) → 실행 중인 이미지 인스턴스\n레지스트리 (Registry)→ 이미지 저장소 (Docker Hub)\n볼륨 (Volume)       → 영구 데이터 저장\n네트워크 (Network)  → 컨테이너 간 통신\n```\n\n---\n\n## 13.2 Docker 설치\n\n```bash\n# 공식 방법으로 설치\ncurl -fsSL https://get.docker.com -o get-docker.sh\nsudo sh get-docker.sh\n\n# 또는 수동 설치\nsudo apt update\nsudo apt install -y ca-certificates curl gnupg\n\n# GPG 키 추가\nsudo install -m 0755 -d /etc/apt/keyrings\ncurl -fsSL https://download.docker.com/linux/ubuntu/gpg | \\\n  sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg\n\n# 저장소 추가\necho \"deb [arch=$(dpkg --print-architecture) \\\n  signed-by=/etc/apt/keyrings/docker.gpg] \\\n  https://download.docker.com/linux/ubuntu \\\n  $(. /etc/os-release && echo \"$VERSION_CODENAME\") stable\" | \\\n  sudo tee /etc/apt/sources.list.d/docker.list\n\nsudo apt update\nsudo apt install docker-ce docker-ce-cli containerd.io \\\n  docker-buildx-plugin docker-compose-plugin\n\n# sudo 없이 Docker 사용\nsudo usermod -aG docker $USER\nnewgrp docker\n\n# 설치 확인\ndocker --version\ndocker run hello-world\n```\n\n---\n\n## 13.3 Docker 기본 명령어\n\n### 이미지 관리\n\n```bash\n# 이미지 검색\ndocker search ubuntu\ndocker search nginx\n\n# 이미지 다운로드\ndocker pull ubuntu:22.04\ndocker pull nginx:latest\ndocker pull node:20-alpine\n\n# 이미지 목록\ndocker images\ndocker image ls\n\n# 이미지 상세 정보\ndocker inspect ubuntu:22.04\n\n# 이미지 삭제\ndocker rmi nginx:latest\ndocker image prune           # 사용하지 않는 이미지 삭제\ndocker image prune -a        # 모든 미사용 이미지\n```\n\n### 컨테이너 실행\n\n```bash\n# 기본 실행\ndocker run ubuntu:22.04 echo \"Hello\"\n\n# 인터랙티브 (-it), 삭제 (--rm)\ndocker run -it --rm ubuntu:22.04 /bin/bash\n\n# 백그라운드 실행 (-d)\ndocker run -d --name mynginx nginx\n\n# 포트 매핑 (-p 호스트포트:컨테이너포트)\ndocker run -d -p 8080:80 --name webserver nginx\n\n# 환경 변수 (-e)\ndocker run -d \\\n  -e MYSQL_ROOT_PASSWORD=secret \\\n  -e MYSQL_DATABASE=myapp \\\n  --name mysql-server mysql:8.0\n\n# 볼륨 마운트 (-v)\ndocker run -d \\\n  -v /home/student/data:/var/lib/mysql \\\n  -e MYSQL_ROOT_PASSWORD=secret \\\n  mysql:8.0\n\n# 리소스 제한\ndocker run -d \\\n  --memory=\"512m\" \\\n  --cpus=\"1.0\" \\\n  nginx\n```\n\n### 컨테이너 관리\n\n```bash\n# 실행 중인 컨테이너 목록\ndocker ps\n\n# 모든 컨테이너 (중지된 것 포함)\ndocker ps -a\n\n# 컨테이너 시작/중지/재시작\ndocker start mynginx\ndocker stop mynginx\ndocker restart mynginx\n\n# 컨테이너 삭제\ndocker rm mynginx\ndocker rm -f mynginx        # 강제 삭제 (실행 중)\ndocker container prune      # 중지된 컨테이너 모두 삭제\n\n# 실행 중인 컨테이너에 명령 실행\ndocker exec -it mynginx /bin/bash\ndocker exec mynginx nginx -t\n\n# 로그 확인\ndocker logs mynginx\ndocker logs -f mynginx      # 실시간\ndocker logs --tail 100 mynginx\n\n# 컨테이너 상태 모니터링\ndocker stats\ndocker stats mynginx\n\n# 파일 복사\ndocker cp file.txt mynginx:/usr/share/nginx/html/\ndocker cp mynginx:/etc/nginx/nginx.conf ./\n```\n\n---\n\n## 13.4 Dockerfile 작성\n\n### 기본 구문\n\n```dockerfile\n# 기본 이미지\nFROM ubuntu:22.04\n\n# 메타데이터\nLABEL maintainer=\"student@example.com\"\nLABEL version=\"1.0\"\n\n# 환경 변수\nENV APP_HOME=/opt/app\nENV NODE_ENV=production\n\n# 작업 디렉토리\nWORKDIR $APP_HOME\n\n# 패키지 설치\nRUN apt-get update && apt-get install -y \\\n    curl \\\n    git \\\n    && rm -rf /var/lib/apt/lists/*\n\n# 파일 복사\nCOPY . .\nADD https://example.com/file.tar.gz /tmp/  # URL 또는 tar 자동 압축 해제\n\n# 포트 공개\nEXPOSE 3000\n\n# 볼륨\nVOLUME [\"/data\"]\n\n# 실행 사용자\nUSER appuser\n\n# 기본 명령어\nENTRYPOINT [\"node\"]           # 변경 불가 명령\nCMD [\"server.js\"]             # 변경 가능 인자\n```\n\n### 실전 Dockerfile 예제 - Node.js 앱\n\n```dockerfile\n# Node.js 애플리케이션 Dockerfile\nFROM node:20-alpine\n\n# 보안: root 대신 node 사용자\nWORKDIR /app\n\n# 의존성 파일만 먼저 복사 (캐시 최적화)\nCOPY package*.json ./\nRUN npm ci --only=production && npm cache clean --force\n\n# 소스 복사\nCOPY --chown=node:node . .\n\n# 사용자 변경\nUSER node\n\nEXPOSE 3000\n\nHEALTHCHECK --interval=30s --timeout=3s \\\n  CMD curl -f http://localhost:3000/health || exit 1\n\nCMD [\"node\", \"server.js\"]\n```\n\n```bash\n# 이미지 빌드\ndocker build -t myapp:1.0 .\ndocker build -t myapp:latest -f Dockerfile.prod .\n\n# 빌드 캐시 없이\ndocker build --no-cache -t myapp:1.0 .\n\n# 빌드 ARG 전달\ndocker build --build-arg NODE_ENV=production -t myapp .\n\n# Docker Hub에 푸시\ndocker tag myapp:1.0 username/myapp:1.0\ndocker push username/myapp:1.0\n```\n\n---\n\n## 13.5 Docker Compose\n\n### docker-compose.yml 기본 구조\n\n```yaml\n# docker-compose.yml\nversion: '3.8'\n\nservices:\n  # 웹 애플리케이션\n  web:\n    build: .\n    image: myapp:latest\n    ports:\n      - \"3000:3000\"\n    environment:\n      - NODE_ENV=production\n      - DB_HOST=db\n      - DB_NAME=myapp\n    env_file:\n      - .env\n    depends_on:\n      db:\n        condition: service_healthy\n    volumes:\n      - ./uploads:/app/uploads\n    restart: unless-stopped\n    networks:\n      - app-network\n\n  # Nginx 리버스 프록시\n  nginx:\n    image: nginx:alpine\n    ports:\n      - \"80:80\"\n      - \"443:443\"\n    volumes:\n      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro\n      - ./ssl:/etc/nginx/ssl:ro\n    depends_on:\n      - web\n    restart: unless-stopped\n    networks:\n      - app-network\n\n  # 데이터베이스\n  db:\n    image: mysql:8.0\n    environment:\n      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}\n      MYSQL_DATABASE: myapp\n      MYSQL_USER: appuser\n      MYSQL_PASSWORD: ${DB_PASSWORD}\n    volumes:\n      - mysql-data:/var/lib/mysql\n      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro\n    healthcheck:\n      test: [\"CMD\", \"mysqladmin\", \"ping\", \"-h\", \"localhost\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n    restart: unless-stopped\n    networks:\n      - app-network\n\n  # Redis 캐시\n  redis:\n    image: redis:7-alpine\n    volumes:\n      - redis-data:/data\n    restart: unless-stopped\n    networks:\n      - app-network\n\nvolumes:\n  mysql-data:\n  redis-data:\n\nnetworks:\n  app-network:\n    driver: bridge\n```\n\n### Docker Compose 명령어\n\n```bash\n# 서비스 시작 (백그라운드)\ndocker compose up -d\n\n# 로그 확인\ndocker compose logs\ndocker compose logs -f web\n\n# 서비스 상태\ndocker compose ps\n\n# 스케일링\ndocker compose up -d --scale web=3\n\n# 서비스 중지\ndocker compose stop\n\n# 서비스 중지 + 컨테이너 삭제\ndocker compose down\n\n# 볼륨까지 삭제\ndocker compose down -v\n\n# 특정 서비스만 재시작\ndocker compose restart web\n\n# 컨테이너 내부 명령 실행\ndocker compose exec web sh\ndocker compose exec db mysql -u root -p\n```\n\n---\n\n## 13.6 Docker 볼륨과 네트워크\n\n### 볼륨 관리\n\n```bash\n# 볼륨 생성\ndocker volume create mydata\n\n# 볼륨 목록\ndocker volume ls\n\n# 볼륨 상세 정보\ndocker volume inspect mydata\n\n# 볼륨 사용\ndocker run -v mydata:/data nginx\n\n# 사용하지 않는 볼륨 삭제\ndocker volume prune\n```\n\n### 네트워크 관리\n\n```bash\n# 네트워크 목록\ndocker network ls\n\n# 네트워크 생성\ndocker network create mynetwork\ndocker network create --driver bridge --subnet 172.18.0.0/16 mynetwork\n\n# 컨테이너를 네트워크에 연결\ndocker network connect mynetwork mynginx\n\n# 네트워크 내 컨테이너 확인\ndocker network inspect mynetwork\n```\n\n---\n\n## 핵심 요약\n\n- **이미지**: 불변 템플릿, **컨테이너**: 실행 중인 이미지 인스턴스\n- **docker run -d -p 8080:80**: 백그라운드 실행 + 포트 매핑\n- **Dockerfile 레이어 캐시**: 자주 변경되는 것은 아래에 배치\n- **Docker Compose**: 멀티 컨테이너 앱을 YAML로 선언적 관리\n- **볼륨**: 컨테이너 삭제 후에도 데이터 유지\n- **HEALTHCHECK**: 컨테이너 정상 여부 자동 확인\n", "# 챕터 14: 쉘 스크립트 프로그래밍\n\n> Bash 스크립트로 시스템 작업을 자동화한다\n\n## 학습 목표\n- Bash 스크립트의 기본 문법을 익힌다\n- 변수, 조건문, 반복문, 함수를 사용할 수 있다\n- 실용적인 자동화 스크립트를 작성할 수 있다\n- 스크립트 디버깅 방법을 알 수 있다\n\n---\n\n## 14.1 스크립트 기초\n\n### 첫 번째 스크립트\n\n```bash\n#!/bin/bash\n# 첫 줄: shebang (스크립트 인터프리터 지정)\n# #! + /bin/bash: Bash로 실행\n\necho \"Hello, Linux!\"\necho \"현재 날짜: $(date)\"\necho \"현재 사용자: $USER\"\necho \"현재 디렉토리: $PWD\"\n```\n\n```bash\n# 실행 권한 부여\nchmod +x script.sh\n\n# 실행 방법\n./script.sh\nbash script.sh\nsh script.sh\n```\n\n### 스크립트 모범 사례\n\n```bash\n#!/bin/bash\nset -euo pipefail\n# -e: 오류 발생 시 즉시 종료\n# -u: 정의되지 않은 변수 사용 시 오류\n# -o pipefail: 파이프 중간 오류도 감지\n\nIFS=$'\\n\\t'  # 안전한 필드 구분자\n```\n\n---\n\n## 14.2 변수\n\n### 변수 선언과 사용\n\n```bash\n# 변수 선언 (= 주변에 공백 없음!)\nNAME=\"Ubuntu\"\nVERSION=22\nPI=3.14159\n\n# 사용 ($변수명 또는 ${변수명})\necho $NAME\necho \"Version: ${VERSION}\"\necho \"Pi = ${PI}\"\n\n# 읽기 전용 변수\nreadonly MAX_RETRY=3\ndeclare -r CONFIG_FILE=\"/etc/app.conf\"\n\n# 정수 변수\ndeclare -i count=0\ncount=count+5        # 산술 연산 자동 처리\n\n# 배열\nfruits=(\"apple\" \"banana\" \"cherry\")\necho ${fruits[0]}            # apple\necho ${fruits[@]}            # 모든 요소\necho ${#fruits[@]}           # 배열 길이\nfruits+=(\"date\")             # 요소 추가\n\n# 연관 배열 (해시맵)\ndeclare -A scores\nscores[\"alice\"]=95\nscores[\"bob\"]=87\necho ${scores[\"alice\"]}\n```\n\n### 특수 변수\n\n```bash\n$0       # 스크립트 이름\n$1 ~ $9  # 위치 인자\n$@       # 모든 인자 (각각 따옴표)\n$*       # 모든 인자 (하나의 문자열)\n$#       # 인자 수\n$?       # 마지막 명령의 종료 코드 (0=성공)\n$$       # 현재 스크립트 PID\n$!       # 마지막 백그라운드 프로세스 PID\n$_       # 마지막 명령의 마지막 인자\n```\n\n```bash\n#!/bin/bash\necho \"스크립트명: $0\"\necho \"첫 번째 인자: $1\"\necho \"모든 인자: $@\"\necho \"인자 수: $#\"\n\nif [ $# -lt 2 ]; then\n    echo \"사용법: $0 <이름> <나이>\"\n    exit 1\nfi\n```\n\n### 변수 치환\n\n```bash\nNAME=\"\"\necho ${NAME:-\"기본값\"}         # NAME이 비어있으면 \"기본값\" 출력\necho ${NAME:=\"기본값\"}         # NAME이 비어있으면 \"기본값\"으로 설정\necho ${NAME:+\"사용됨\"}         # NAME이 설정되어 있으면 \"사용됨\"\n\nFILE=\"/home/student/docs/file.txt\"\necho ${FILE##*/}               # file.txt (마지막 /이후)\necho ${FILE%/*}                # /home/student/docs (마지막 /이전)\necho ${FILE%.txt}              # .txt 제거\necho ${FILE/student/admin}     # 치환\necho ${#FILE}                  # 문자열 길이\n```\n\n---\n\n## 14.3 조건문\n\n### if 문\n\n```bash\n# 파일 관련 조건\nif [ -f \"/etc/passwd\" ]; then\n    echo \"파일 존재\"\nfi\n\nif [ -d \"/tmp\" ]; then\n    echo \"디렉토리 존재\"\nfi\n\nif [ ! -e \"/path/to/file\" ]; then\n    echo \"파일 없음\"\nfi\n\n# 숫자 비교\nif [ $count -gt 10 ]; then\n    echo \"10보다 큼\"\nelif [ $count -eq 10 ]; then\n    echo \"10과 같음\"\nelse\n    echo \"10보다 작음\"\nfi\n\n# 문자열 비교\nif [ \"$NAME\" = \"Ubuntu\" ]; then\n    echo \"Ubuntu입니다\"\nfi\n\nif [ -z \"$VAR\" ]; then\n    echo \"변수가 비어있음\"\nfi\n\nif [ -n \"$VAR\" ]; then\n    echo \"변수가 비어있지 않음\"\nfi\n\n# 복합 조건\nif [ $count -gt 0 ] && [ $count -lt 100 ]; then\n    echo \"1~99 사이\"\nfi\n\n# [[ ]] 확장 테스트 (Bash 전용, 더 강력)\nif [[ $NAME == \"Ubuntu\"* ]]; then\n    echo \"Ubuntu로 시작\"\nfi\n\nif [[ $VERSION =~ ^[0-9]+\\.[0-9]+$ ]]; then\n    echo \"유효한 버전 형식\"\nfi\n```\n\n### 파일 테스트 연산자\n\n| 연산자 | 의미 |\n|--------|------|\n| `-f file` | 일반 파일 존재 |\n| `-d dir` | 디렉토리 존재 |\n| `-e path` | 경로 존재 (파일/디렉토리) |\n| `-r file` | 읽기 가능 |\n| `-w file` | 쓰기 가능 |\n| `-x file` | 실행 가능 |\n| `-s file` | 크기가 0보다 큼 |\n| `-L file` | 심볼릭 링크 |\n| `f1 -nt f2` | f1이 f2보다 최신 |\n\n### case 문\n\n```bash\ncase $1 in\n    start)\n        echo \"서비스 시작\"\n        ;;\n    stop)\n        echo \"서비스 중지\"\n        ;;\n    restart|reload)\n        echo \"서비스 재시작\"\n        ;;\n    *)\n        echo \"사용법: $0 {start|stop|restart}\"\n        exit 1\n        ;;\nesac\n```\n\n---\n\n## 14.4 반복문\n\n### for 문\n\n```bash\n# 범위\nfor i in {1..5}; do\n    echo \"번호: $i\"\ndone\n\n# 배열\nfor fruit in \"${fruits[@]}\"; do\n    echo \"과일: $fruit\"\ndone\n\n# 파일 목록\nfor file in /var/log/*.log; do\n    echo \"로그: $file\"\ndone\n\n# C 스타일\nfor ((i=0; i<10; i++)); do\n    echo $i\ndone\n\n# 명령어 출력\nfor user in $(cut -d: -f1 /etc/passwd); do\n    echo \"사용자: $user\"\ndone\n```\n\n### while/until 문\n\n```bash\n# while\ncount=0\nwhile [ $count -lt 5 ]; do\n    echo \"카운트: $count\"\n    ((count++))\ndone\n\n# until (조건이 참이 될 때까지)\nuntil ping -c1 google.com &>/dev/null; do\n    echo \"네트워크 기다리는 중...\"\n    sleep 5\ndone\necho \"네트워크 연결됨\"\n\n# 파일 라인 읽기\nwhile IFS= read -r line; do\n    echo \"라인: $line\"\ndone < /etc/hosts\n\n# 파이프로 읽기\nps aux | while read line; do\n    echo \"$line\"\ndone\n```\n\n---\n\n## 14.5 함수\n\n```bash\n#!/bin/bash\n\n# 함수 정의\ngreet() {\n    local name=$1    # local: 함수 내 지역 변수\n    local age=${2:-0}\n    echo \"안녕하세요, ${name}님 (나이: ${age})\"\n}\n\n# 반환값 (종료 코드)\nis_root() {\n    if [ $(id -u) -eq 0 ]; then\n        return 0   # true\n    else\n        return 1   # false\n    fi\n}\n\n# 결과 반환 (echo 사용)\nget_disk_usage() {\n    local path=${1:-\"/\"}\n    df -h \"$path\" | awk 'NR==2 {print $5}' | tr -d '%'\n}\n\n# 함수 호출\ngreet \"Alice\" 25\ngreet \"Bob\"\n\nif is_root; then\n    echo \"root 사용자입니다\"\nfi\n\nusage=$(get_disk_usage \"/\")\necho \"디스크 사용률: ${usage}%\"\n```\n\n---\n\n## 14.6 입력과 출력\n\n```bash\n# 사용자 입력\nread -p \"이름을 입력하세요: \" name\nread -s -p \"비밀번호: \" password    # -s: 입력 숨김\necho \"\"\nread -t 5 -p \"5초 내에 입력: \" answer  # 타임아웃\n\necho \"입력된 이름: $name\"\n```\n\n### 로그 함수\n\n```bash\n#!/bin/bash\nLOG_FILE=\"/var/log/myapp.log\"\n\nlog() {\n    local level=$1\n    shift\n    echo \"[$(date '+%Y-%m-%d %H:%M:%S')] [$level] $*\" | tee -a \"$LOG_FILE\"\n}\n\nlog \"INFO\"  \"서비스 시작\"\nlog \"WARN\"  \"디스크 사용률 높음: 85%\"\nlog \"ERROR\" \"데이터베이스 연결 실패\"\n```\n\n---\n\n## 14.7 실전 스크립트\n\n### 시스템 헬스체크 스크립트\n\n```bash\n#!/bin/bash\n# /opt/scripts/health_check.sh\n\nset -euo pipefail\n\n# 임계값\nCPU_THRESHOLD=80\nMEM_THRESHOLD=85\nDISK_THRESHOLD=90\n\ncheck_cpu() {\n    local cpu=$(top -bn1 | grep \"Cpu(s)\" | awk '{print $2}' | tr -d '%us,')\n    local cpu_int=${cpu%.*}\n    if [ \"${cpu_int:-0}\" -gt $CPU_THRESHOLD ]; then\n        echo \"WARN: CPU 사용률 높음: ${cpu}%\"\n        return 1\n    fi\n    echo \"OK: CPU ${cpu}%\"\n}\n\ncheck_memory() {\n    local mem=$(free | grep Mem | awk '{printf \"%.0f\", $3/$2*100}')\n    if [ \"$mem\" -gt $MEM_THRESHOLD ]; then\n        echo \"WARN: 메모리 사용률 높음: ${mem}%\"\n        return 1\n    fi\n    echo \"OK: Memory ${mem}%\"\n}\n\ncheck_disk() {\n    while IFS= read -r line; do\n        local usage=$(echo \"$line\" | awk '{print $5}' | tr -d '%')\n        local mount=$(echo \"$line\" | awk '{print $6}')\n        if [ \"${usage:-0}\" -gt $DISK_THRESHOLD ]; then\n            echo \"WARN: 디스크 사용률 높음 ${mount}: ${usage}%\"\n        fi\n    done < <(df -h | grep -v tmpfs | tail -n +2)\n}\n\ncheck_service() {\n    local service=$1\n    if systemctl is-active --quiet \"$service\"; then\n        echo \"OK: $service 실행 중\"\n    else\n        echo \"ERROR: $service 중지됨\"\n        return 1\n    fi\n}\n\necho \"=== 시스템 헬스체크 $(date) ===\"\ncheck_cpu\ncheck_memory\ncheck_disk\nfor svc in nginx mysql ssh; do\n    check_service \"$svc\"\ndone\necho \"=== 체크 완료 ===\"\n```\n\n---\n\n## 14.8 디버깅\n\n```bash\n# 디버그 모드 실행\nbash -x script.sh\n\n# 스크립트 내에서 디버그 활성화\nset -x    # 실행 명령 출력\nset +x    # 디버그 모드 해제\n\n# 구문 검사\nbash -n script.sh\n\n# shellcheck 설치 (정적 분석)\nsudo apt install shellcheck\nshellcheck script.sh\n```\n\n---\n\n## 핵심 요약\n\n- **shebang**: `#!/bin/bash`로 시작, `chmod +x`로 실행 권한\n- **set -euo pipefail**: 안전한 스크립트의 시작\n- **[ ]**: 기본 테스트, **[[ ]]**: Bash 확장 테스트 (정규식 지원)\n- **local**: 함수 내 지역 변수 반드시 사용\n- **$?**: 명령 성공 여부 확인 (0=성공)\n- **shellcheck**: 스크립트 작성 후 항상 검사\n", "# 챕터 15: cron과 자동화\n\n> 반복 작업을 자동화하여 시스템 운영 효율을 높인다\n\n## 학습 목표\n- crontab 문법을 완전히 이해한다\n- 다양한 자동화 작업을 설정할 수 있다\n- systemd timer를 cron 대신 활용할 수 있다\n- 로그 관리와 logrotate를 설정할 수 있다\n\n---\n\n## 15.1 cron 이해\n\n### cron 서비스\n\n```bash\n# cron 서비스 상태 확인\nsudo systemctl status cron\n\n# 시작 및 활성화\nsudo systemctl enable --now cron\n```\n\n### crontab 문법\n\n```\n┌──────── 분 (0-59)\n│ ┌────── 시 (0-23)\n│ │ ┌──── 일 (1-31)\n│ │ │ ┌── 월 (1-12)\n│ │ │ │ ┌ 요일 (0-7, 0과 7=일요일)\n│ │ │ │ │\n* * * * *  명령어\n\n특수 문자:\n*  = 모든 값\n,  = 목록 (1,3,5)\n-  = 범위 (1-5)\n/  = 간격 (*/5 = 5분마다)\n```\n\n### 주요 cron 예제\n\n```\n# 매분 실행\n* * * * * /opt/scripts/check.sh\n\n# 매시간 30분에 실행\n30 * * * * /opt/scripts/hourly.sh\n\n# 매일 새벽 2시에 실행\n0 2 * * * /opt/scripts/backup.sh\n\n# 월요일~금요일 오전 9시에 실행\n0 9 * * 1-5 /opt/scripts/weekday_report.sh\n\n# 5분마다 실행\n*/5 * * * * /opt/scripts/monitor.sh\n\n# 매월 1일 오전 6시에 실행\n0 6 1 * * /opt/scripts/monthly_report.sh\n\n# 매주 일요일 새벽 3시에 실행\n0 3 * * 0 /opt/scripts/weekly_cleanup.sh\n\n# 분기별 (1,4,7,10월 1일)\n0 0 1 1,4,7,10 * /opt/scripts/quarterly.sh\n```\n\n### crontab 관리\n\n```bash\n# 현재 사용자 crontab 편집\ncrontab -e\n\n# crontab 목록 확인\ncrontab -l\n\n# crontab 삭제\ncrontab -r\n\n# 특정 사용자 crontab 편집 (root만 가능)\nsudo crontab -u www-data -e\nsudo crontab -u student -l\n\n# 시스템 crontab (루트 작업)\nsudo nano /etc/crontab\n# 형식: 분 시 일 월 요일 사용자 명령어\n# 0 2 * * * root /opt/scripts/backup.sh\n```\n\n---\n\n## 15.2 cron 디렉토리\n\n```bash\n# 주기별 스크립트 디렉토리\nls /etc/cron.hourly/    # 매시간\nls /etc/cron.daily/     # 매일\nls /etc/cron.weekly/    # 매주\nls /etc/cron.monthly/   # 매월\n\n# 스크립트 추가 (실행 권한 필수)\nsudo cp backup.sh /etc/cron.daily/\nsudo chmod +x /etc/cron.daily/backup.sh\n\n# 실행 확인\nsudo run-parts /etc/cron.daily\n```\n\n---\n\n## 15.3 실전 cron 스크립트\n\n### 데이터베이스 백업\n\n```bash\n#!/bin/bash\n# /opt/scripts/db_backup.sh\n\nset -euo pipefail\n\nBACKUP_DIR=\"/var/backups/mysql\"\nRETENTION=7\nDATE=$(date +%Y%m%d_%H%M%S)\nLOGFILE=\"/var/log/db_backup.log\"\n\nlog() { echo \"[$(date '+%Y-%m-%d %H:%M:%S')] $*\" >> \"$LOGFILE\"; }\n\nmkdir -p \"$BACKUP_DIR\"\nlog \"백업 시작\"\n\nfor DB in $(mysql -u root -p\"$MYSQL_ROOT_PASSWORD\" \\\n           -e \"SHOW DATABASES;\" 2>/dev/null | \\\n           grep -Ev \"information_schema|performance_schema|mysql|sys|Database\"); do\n    log \"백업 중: $DB\"\n    mysqldump -u root -p\"$MYSQL_ROOT_PASSWORD\" \\\n              --single-transaction \"$DB\" | \\\n              gzip > \"$BACKUP_DIR/${DB}_${DATE}.sql.gz\"\ndone\n\nfind \"$BACKUP_DIR\" -name \"*.sql.gz\" -mtime +\"$RETENTION\" -delete\nlog \"백업 완료. 오래된 백업 삭제됨 (${RETENTION}일 초과)\"\n```\n\n```bash\n# crontab 등록\necho \"0 2 * * * MYSQL_ROOT_PASSWORD=secret /opt/scripts/db_backup.sh\" | \\\n  sudo crontab -\n```\n\n### 디스크 모니터링 및 알림\n\n```bash\n#!/bin/bash\n# /opt/scripts/disk_alert.sh\n\nTHRESHOLD=85\nEMAIL=\"admin@example.com\"\n\ndf -h | grep -vE '^Filesystem|tmpfs|cdrom' | \\\nwhile read -r line; do\n    usage=$(echo \"$line\" | awk '{print $5}' | sed 's/%//')\n    partition=$(echo \"$line\" | awk '{print $6}')\n    if [ \"${usage:-0}\" -ge $THRESHOLD ]; then\n        subject=\"[경고] 디스크 사용률 ${usage}% - $partition\"\n        body=\"서버: $(hostname)\\n파티션: $partition\\n사용률: ${usage}%\\n시간: $(date)\"\n        echo -e \"$body\" | mail -s \"$subject\" \"$EMAIL\"\n        echo \"경고 발송: $partition ${usage}%\"\n    fi\ndone\n```\n\n### 로그 수집 및 분석\n\n```bash\n#!/bin/bash\n# /opt/scripts/log_report.sh\n\nREPORT_FILE=\"/tmp/daily_report_$(date +%Y%m%d).txt\"\n\n{\necho \"=== 일일 보고서 $(date) ===\"\necho \"\"\necho \"--- SSH 로그인 시도 ---\"\ngrep \"Failed password\" /var/log/auth.log | wc -l | xargs -I{} echo \"실패: {} 회\"\ngrep \"Accepted\" /var/log/auth.log | wc -l | xargs -I{} echo \"성공: {} 회\"\necho \"\"\necho \"--- Nginx 오류 ---\"\ntail -100 /var/log/nginx/error.log | grep \"error\" | wc -l | \\\n  xargs -I{} echo \"오류 수: {} 개\"\necho \"\"\necho \"--- 시스템 상태 ---\"\nuptime\nfree -h\ndf -h /\n} > \"$REPORT_FILE\"\n\nmail -s \"일일 서버 보고서 $(date +%Y-%m-%d)\" admin@example.com < \"$REPORT_FILE\"\nrm -f \"$REPORT_FILE\"\n```\n\n---\n\n## 15.4 at 명령어 (일회성 예약)\n\n```bash\n# at 설치\nsudo apt install at\n\n# 특정 시간에 한 번 실행\nat 14:30\nat> /opt/scripts/deploy.sh\nat> Ctrl+D\n\n# 시간 표현\nat now + 1 hour\nat now + 30 minutes\nat 9:00 tomorrow\nat 14:00 2024-12-25\n\n# 예약 목록 확인\natq\n\n# 예약 삭제\natrm 3    # 3번 작업 삭제\n```\n\n---\n\n## 15.5 systemd Timer\n\n### cron과 비교\n\n| 특성 | cron | systemd timer |\n|------|------|---------------|\n| 로그 | 별도 설정 | journald 자동 |\n| 의존성 | 없음 | 서비스 의존성 |\n| 실패 처리 | 제한적 | 재시도 가능 |\n| 정확도 | 분 단위 | 마이크로초 |\n\n### systemd timer 설정\n\n```bash\n# 서비스 유닛 파일\nsudo nano /etc/systemd/system/backup.service\n```\n\n```ini\n[Unit]\nDescription=Database Backup Service\nAfter=mysql.service\n\n[Service]\nType=oneshot\nExecStart=/opt/scripts/db_backup.sh\nUser=backup\nStandardOutput=journal\nStandardError=journal\n```\n\n```bash\n# 타이머 유닛 파일\nsudo nano /etc/systemd/system/backup.timer\n```\n\n```ini\n[Unit]\nDescription=Daily Backup Timer\nRequires=backup.service\n\n[Timer]\nOnCalendar=*-*-* 02:00:00    # 매일 새벽 2시\nRandomizedDelaySec=300        # 최대 5분 랜덤 지연\nPersistent=true               # 놓친 실행 보완\n\n[Install]\nWantedBy=timers.target\n```\n\n```bash\n# 활성화 및 시작\nsudo systemctl daemon-reload\nsudo systemctl enable --now backup.timer\n\n# 타이머 목록 확인\nsystemctl list-timers\nsystemctl list-timers --all\n\n# 수동 실행\nsudo systemctl start backup.service\n\n# 로그 확인\njournalctl -u backup.service\njournalctl -u backup.timer\n```\n\n---\n\n## 15.6 logrotate\n\n### logrotate 설정\n\n```bash\n# 기본 설정\ncat /etc/logrotate.conf\n\n# 개별 앱 설정 위치\nls /etc/logrotate.d/\n```\n\n```bash\n# 커스텀 설정 추가\nsudo nano /etc/logrotate.d/myapp\n```\n\n```\n/var/log/myapp/*.log {\n    daily               # 매일 로테이션\n    rotate 30           # 30개 보관\n    compress            # gzip 압축\n    delaycompress       # 최신 로그는 압축 안 함\n    missingok           # 파일 없어도 오류 없음\n    notifempty          # 빈 파일은 로테이션 안 함\n    create 644 www-data www-data  # 새 파일 권한\n    sharedscripts\n    postrotate\n        # Nginx에 로그 재오픈 신호\n        /usr/sbin/nginx -s reopen 2>/dev/null || true\n    endscript\n}\n```\n\n```bash\n# 테스트 실행 (실제 로테이션 안 함)\nsudo logrotate -d /etc/logrotate.d/myapp\n\n# 강제 실행\nsudo logrotate -f /etc/logrotate.d/myapp\n\n# 전체 실행\nsudo logrotate /etc/logrotate.conf\n```\n\n---\n\n## 핵심 요약\n\n```\ncrontab 빠른 참조:\n┌────── 분  (0-59)\n│ ┌──── 시  (0-23)\n│ │ ┌── 일  (1-31)\n│ │ │ ┌ 월  (1-12)\n│ │ │ │ ┌ 요일 (0-7)\n│ │ │ │ │\n0 2 * * * /path/to/script.sh   ← 매일 새벽 2시\n*/5 * * * * /monitor.sh        ← 5분마다\n0 9 * * 1-5 /weekday.sh        ← 평일 오전 9시\n```\n\n- **crontab -e**: 사용자별 cron 편집\n- **MAILTO=\"\"**: cron 결과 메일 비활성화\n- **스크립트 로그**: cron에서 실행 시 반드시 로그 파일 지정\n- **systemd timer**: 로그가 journald에 자동 저장되어 디버깅 쉬움\n- **logrotate**: 로그 파일 크기 관리 필수\n", "# 챕터 16: 시스템 모니터링과 로그\n\n> 서버 상태를 실시간으로 파악하고 문제를 조기에 발견한다\n\n## 학습 목표\n- 시스템 리소스를 다양한 도구로 모니터링할 수 있다\n- systemd 저널과 syslog를 분석할 수 있다\n- 성능 병목점을 찾고 진단할 수 있다\n- 모니터링 자동화를 구축할 수 있다\n\n---\n\n## 16.1 시스템 리소스 모니터링\n\n### CPU 모니터링\n\n```bash\n# 실시간 CPU 사용률\ntop\nhtop\n\n# CPU 정보\nlscpu\ncat /proc/cpuinfo | grep \"model name\" | head -1\nnproc                    # 코어 수\n\n# vmstat - 시스템 통계\nvmstat 1 5               # 1초 간격, 5회\nvmstat -s                # 메모리 통계 요약\n\n# mpstat - CPU별 사용률 (sysstat 패키지)\nsudo apt install sysstat\nmpstat -P ALL 1 3\nmpstat 1                 # 전체 CPU 합산\n\n# sar - 역사적 데이터 수집/분석\nsar -u 1 10              # CPU 사용률 (1초 간격, 10회)\nsar -u -f /var/log/sysstat/sa$(date +%d)  # 오늘 히스토리\n```\n\n### 메모리 모니터링\n\n```bash\n# 메모리 사용량\nfree -h\nfree -m\n\n# 상세 메모리 정보\ncat /proc/meminfo\n\n# 메모리 사용 프로세스 (상위 10개)\nps aux --sort=-%mem | head -11\n\n# 캐시와 버퍼 확인\nvmstat -s | grep -E \"used|free|buffer|cache\"\n\n# 스왑 사용량\nswapon --show\ncat /proc/swaps\n```\n\n```\nfree -h 출력 해석:\n              total   used   free  shared  buff/cache  available\nMem:           15G    8.2G   3.1G    512M        3.7G       6.5G\nSwap:           2G    256M   1.7G\n\navailable = 실제 사용 가능한 메모리 (buff/cache 포함)\n```\n\n### 디스크 I/O 모니터링\n\n```bash\n# iostat - 디스크 I/O 통계\niostat -x 1 5             # 확장 통계, 1초 간격, 5회\niostat -d /dev/sda 1      # 특정 디스크\n\n# iotop - 프로세스별 I/O\nsudo apt install iotop\nsudo iotop\nsudo iotop -o             # I/O 발생 프로세스만\n\n# lsof - 열린 파일 목록\nlsof +D /var/log          # 특정 디렉토리\nlsof -p 1234              # 특정 PID\nlsof -u student           # 특정 사용자\nlsof -i :80               # 특정 포트\n\n# 디스크 읽기/쓰기 속도 테스트\ndd if=/dev/zero of=/tmp/testfile bs=1M count=100\ndd if=/tmp/testfile of=/dev/null bs=1M\n```\n\n### 네트워크 모니터링\n\n```bash\n# 네트워크 통계\nss -s\nnetstat -s 2>/dev/null | head -20\n\n# 인터페이스 통계\ncat /proc/net/dev\nip -s link\n\n# 대역폭 모니터링\nsudo apt install iftop nload\nsudo iftop -i ens33\nsudo nload ens33\n\n# 연결 수 확인\nss -ant | awk '{print $1}' | sort | uniq -c\nss -s\n\n# tcpdump 패킷 캡처\nsudo tcpdump -i ens33 -n -c 100\n```\n\n---\n\n## 16.2 로그 시스템 이해\n\n### 로그 파일 위치\n\n```bash\n/var/log/\n├── syslog          # 일반 시스템 로그 (Ubuntu 기본)\n├── auth.log        # 인증/보안 로그 (로그인, sudo)\n├── kern.log        # 커널 로그\n├── dmesg           # 부팅 시 커널 메시지\n├── dpkg.log        # 패키지 설치/제거\n├── apt/            # APT 로그\n├── nginx/          # Nginx 액세스/에러\n│   ├── access.log\n│   └── error.log\n├── mysql/          # MySQL 로그\n├── fail2ban.log    # fail2ban 로그\n└── ufw.log         # 방화벽 로그\n```\n\n### 로그 레벨\n\n```\nemerg   (0) - 시스템 사용 불가\nalert   (1) - 즉시 조치 필요\ncrit    (2) - 심각한 오류\nerr     (3) - 오류\nwarning (4) - 경고\nnotice  (5) - 정상이지만 중요\ninfo    (6) - 정보\ndebug   (7) - 디버그 정보\n```\n\n---\n\n## 16.3 journalctl - systemd 저널\n\n```bash\n# 전체 로그\njournalctl\n\n# 최신 로그 (tail)\njournalctl -f\njournalctl -n 50          # 최근 50줄\n\n# 특정 서비스 로그\njournalctl -u nginx\njournalctl -u nginx -f    # 실시간\n\n# 시간 범위 필터\njournalctl --since \"2024-01-15 10:00:00\"\njournalctl --since \"1 hour ago\"\njournalctl --since yesterday\njournalctl --since \"2024-01-01\" --until \"2024-01-31\"\n\n# 부팅별 로그\njournalctl -b             # 현재 부팅\njournalctl -b -1          # 이전 부팅\njournalctl --list-boots   # 부팅 목록\n\n# 우선순위별 필터\njournalctl -p err         # 오류 이상만\njournalctl -p warning     # 경고 이상만\n\n# 특정 PID\njournalctl _PID=1234\n\n# JSON 출력\njournalctl -o json-pretty | head -50\n\n# 저널 크기 관리\njournalctl --disk-usage\nsudo journalctl --vacuum-size=500M   # 500MB로 줄이기\nsudo journalctl --vacuum-time=30d    # 30일 이전 삭제\n```\n\n---\n\n## 16.4 rsyslog 설정\n\n```bash\n# rsyslog 설정\nsudo nano /etc/rsyslog.conf\n\n# 원격 로그 서버로 전송\n# /etc/rsyslog.d/remote.conf\n*.* @logserver.example.com:514    # UDP\n*.* @@logserver.example.com:514   # TCP\n\n# 특정 앱 로그 분리\nlocal1.* /var/log/myapp.log\n\n# rsyslog 재시작\nsudo systemctl restart rsyslog\n```\n\n---\n\n## 16.5 성능 분석 도구\n\n### perf - Linux 성능 분석\n\n```bash\n# 설치\nsudo apt install linux-tools-generic linux-tools-$(uname -r)\n\n# CPU 성능 이벤트 수집\nsudo perf stat ls\n\n# 특정 프로세스 프로파일링\nsudo perf top -p 1234\n\n# 시스템 전체 프로파일링\nsudo perf record -g -a sleep 10\nsudo perf report\n```\n\n### strace - 시스템 콜 추적\n\n```bash\n# 프로세스 시스템 콜 추적\nstrace ls /tmp\n\n# 실행 중인 프로세스 추적\nsudo strace -p 1234\n\n# 요약 통계\nstrace -c ls /tmp\n```\n\n### lsof - 열린 파일 및 네트워크\n\n```bash\n# 모든 열린 파일\nlsof | head -20\n\n# 특정 포트 사용 프로세스\nlsof -i :80\nlsof -i :22\nlsof -i TCP:443\n\n# 삭제됐지만 열려있는 파일 (디스크 공간 회복 안 되는 경우)\nlsof +L1\n```\n\n---\n\n## 16.6 모니터링 자동화\n\n### 간단한 모니터링 스크립트\n\n```bash\n#!/bin/bash\n# /opt/scripts/system_monitor.sh\n\nALERT_EMAIL=\"admin@example.com\"\nCPU_WARN=80\nMEM_WARN=85\nDISK_WARN=90\n\nsend_alert() {\n    echo \"$2\" | mail -s \"[서버 경고] $1\" \"$ALERT_EMAIL\"\n}\n\n# CPU 체크\nCPU=$(top -bn1 | grep \"Cpu(s)\" | awk '{print $2}' | tr -d '%us,')\n[ \"${CPU%.*}\" -gt $CPU_WARN ] && send_alert \"CPU 높음\" \"CPU: ${CPU}%\"\n\n# 메모리 체크\nMEM=$(free | awk '/Mem/{printf \"%.0f\", $3/$2*100}')\n[ \"$MEM\" -gt $MEM_WARN ] && send_alert \"메모리 높음\" \"Memory: ${MEM}%\"\n\n# 디스크 체크\ndf -h | grep -vE '^Filesystem|tmpfs' | while read -r line; do\n    DISK=$(echo \"$line\" | awk '{print $5}' | tr -d '%')\n    MOUNT=$(echo \"$line\" | awk '{print $6}')\n    [ \"${DISK:-0}\" -gt $DISK_WARN ] && \\\n      send_alert \"디스크 높음\" \"Disk $MOUNT: ${DISK}%\"\ndone\n\n# 서비스 체크\nfor SVC in nginx mysql ssh; do\n    systemctl is-active --quiet \"$SVC\" || \\\n      send_alert \"서비스 중단\" \"$SVC 서비스가 중단됨!\"\ndone\n```\n\n### Prometheus + Grafana 소개\n\n```bash\n# Node Exporter 설치 (시스템 메트릭 수집)\nwget https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz\ntar -xzf node_exporter-*.tar.gz\nsudo mv node_exporter-*/node_exporter /usr/local/bin/\n\n# systemd 서비스로 등록\nsudo tee /etc/systemd/system/node_exporter.service << EOF\n[Unit]\nDescription=Node Exporter\n\n[Service]\nUser=nobody\nExecStart=/usr/local/bin/node_exporter\n\n[Install]\nWantedBy=multi-user.target\nEOF\n\nsudo systemctl enable --now node_exporter\n\n# 메트릭 확인 (포트 9100)\ncurl http://localhost:9100/metrics | head -20\n```\n\n---\n\n## 핵심 요약\n\n| 도구 | 용도 |\n|------|------|\n| `top/htop` | 실시간 CPU/메모리/프로세스 |\n| `vmstat` | 시스템 성능 통계 |\n| `iostat` | 디스크 I/O |\n| `iotop` | 프로세스별 디스크 I/O |\n| `iftop/nload` | 네트워크 대역폭 |\n| `journalctl -u svc` | systemd 서비스 로그 |\n| `journalctl -p err` | 오류 로그 필터 |\n| `lsof -i :포트` | 포트 사용 프로세스 |\n\n- **`journalctl -f -u 서비스명`**: 실시간 서비스 로그 모니터링 필수 습관\n- **`vmstat 1`**: 성능 이슈 발생 시 첫 번째로 확인\n- **logrotate**: 로그 파일 관리 자동화\n", "# 챕터 17: 개발 환경 구축\n\n> 우분투에서 완전한 개발 환경을 구성한다\n\n## 학습 목표\n- Python, Node.js, Java 개발 환경을 설정할 수 있다\n- 가상 환경으로 프로젝트를 격리할 수 있다\n- Git을 설정하고 효율적으로 활용할 수 있다\n- VS Code 원격 개발 환경을 구성할 수 있다\n\n---\n\n## 17.1 Python 개발 환경\n\n### Python 설치와 버전 관리\n\n```bash\n# 기본 Python 확인\npython3 --version\nwhich python3\n\n# 최신 Python 설치 (deadsnakes PPA)\nsudo add-apt-repository ppa:deadsnakes/python\nsudo apt update\nsudo apt install python3.12 python3.12-venv python3.12-dev\n\n# 여러 버전 관리 (update-alternatives)\nsudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1\nsudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 2\nsudo update-alternatives --config python3\n\n# pip 설치 및 업그레이드\nsudo apt install python3-pip\npip3 install --upgrade pip\n```\n\n### 가상 환경 (venv)\n\n```bash\n# 가상 환경 생성\npython3 -m venv myproject-env\npython3.12 -m venv myproject-env    # 특정 버전\n\n# 활성화\nsource myproject-env/bin/activate\n# (myproject-env) student@ubuntu:~$\n\n# 비활성화\ndeactivate\n\n# 패키지 설치\npip install flask sqlalchemy\n\n# 설치된 패키지 저장\npip freeze > requirements.txt\n\n# requirements.txt에서 설치\npip install -r requirements.txt\n```\n\n### pyenv - 버전 관리자\n\n```bash\n# pyenv 설치\ncurl https://pyenv.run | bash\n\n# .bashrc에 추가\necho 'export PYENV_ROOT=\"$HOME/.pyenv\"' >> ~/.bashrc\necho 'command -v pyenv >/dev/null || export PATH=\"$PYENV_ROOT/bin:$PATH\"' >> ~/.bashrc\necho 'eval \"$(pyenv init -)\"' >> ~/.bashrc\nsource ~/.bashrc\n\n# 빌드 의존성 설치\nsudo apt install -y build-essential libssl-dev zlib1g-dev \\\n  libbz2-dev libreadline-dev libsqlite3-dev libncurses5-dev \\\n  libncursesw5-dev xz-utils tk-dev libffi-dev liblzma-dev\n\n# Python 설치\npyenv install 3.12.0\npyenv install 3.11.5\n\n# 버전 설정\npyenv global 3.12.0         # 전체 기본\npyenv local 3.11.5          # 현재 디렉토리\npyenv shell 3.10.0          # 현재 쉘\n\n# 설치된 버전 목록\npyenv versions\n```\n\n---\n\n## 17.2 Node.js 개발 환경\n\n### nvm - Node 버전 관리자\n\n```bash\n# nvm 설치\ncurl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.5/install.sh | bash\nsource ~/.bashrc\n\n# Node.js 설치\nnvm install 20              # 최신 LTS\nnvm install --lts           # 최신 LTS 버전\nnvm install 18.17.0         # 특정 버전\n\n# 버전 전환\nnvm use 20\nnvm use --lts\nnvm alias default 20        # 기본 버전 설정\n\n# 설치된 버전 목록\nnvm list\nnvm list --no-alias\n\n# 버전 확인\nnode --version\nnpm --version\n```\n\n### npm 기본 사용법\n\n```bash\n# 프로젝트 초기화\nmkdir myapp && cd myapp\nnpm init -y\n\n# 패키지 설치\nnpm install express         # 프로덕션 의존성\nnpm install --save-dev jest # 개발 의존성\nnpm install -g pm2          # 글로벌 설치\n\n# 패키지 업데이트\nnpm update\nnpm outdated                # 업데이트 가능한 목록\n\n# 스크립트 실행\nnpm run start\nnpm run test\nnpm run build\n\n# package.json 예시\ncat package.json\n```\n\n```json\n{\n  \"name\": \"myapp\",\n  \"version\": \"1.0.0\",\n  \"scripts\": {\n    \"start\": \"node server.js\",\n    \"dev\": \"nodemon server.js\",\n    \"test\": \"jest\",\n    \"build\": \"webpack\"\n  },\n  \"dependencies\": {\n    \"express\": \"^4.18.0\"\n  },\n  \"devDependencies\": {\n    \"jest\": \"^29.0.0\",\n    \"nodemon\": \"^3.0.0\"\n  }\n}\n```\n\n### PM2 - 프로세스 관리\n\n```bash\n# PM2 설치\nnpm install -g pm2\n\n# 앱 시작\npm2 start server.js --name myapp\npm2 start server.js -i max    # CPU 코어 수만큼 클러스터\n\n# 관리\npm2 list\npm2 show myapp\npm2 stop myapp\npm2 restart myapp\npm2 delete myapp\npm2 logs myapp\npm2 monit\n\n# 부팅 시 자동 시작\npm2 startup\npm2 save\n```\n\n---\n\n## 17.3 Java 개발 환경\n\n### OpenJDK 설치\n\n```bash\n# 사용 가능한 버전 확인\napt search openjdk\n\n# OpenJDK 21 (LTS) 설치\nsudo apt install openjdk-21-jdk\n\n# 여러 JDK 관리\nsudo update-alternatives --config java\nsudo update-alternatives --config javac\n\n# JAVA_HOME 설정\necho 'export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))' >> ~/.bashrc\necho 'export PATH=$JAVA_HOME/bin:$PATH' >> ~/.bashrc\nsource ~/.bashrc\n\njava -version\njavac -version\necho $JAVA_HOME\n```\n\n### Maven 설치\n\n```bash\nsudo apt install maven\nmvn --version\n\n# 프로젝트 생성\nmvn archetype:generate \\\n  -DgroupId=com.example \\\n  -DartifactId=myapp \\\n  -DarchetypeArtifactId=maven-archetype-quickstart \\\n  -DinteractiveMode=false\n\ncd myapp\nmvn compile\nmvn test\nmvn package\njava -jar target/myapp-1.0-SNAPSHOT.jar\n```\n\n---\n\n## 17.4 Git 설정과 활용\n\n### 초기 설정\n\n```bash\n# 사용자 정보 설정\ngit config --global user.name \"Kim Student\"\ngit config --global user.email \"student@example.com\"\n\n# 기본 에디터 설정\ngit config --global core.editor vim\ngit config --global core.editor \"code --wait\"  # VS Code\n\n# 기본 브랜치명\ngit config --global init.defaultBranch main\n\n# 줄 끝 설정\ngit config --global core.autocrlf input  # Linux/Mac\n\n# 설정 확인\ngit config --list\ncat ~/.gitconfig\n```\n\n### .gitignore 설정\n\n```bash\n# 글로벌 .gitignore\ncat > ~/.gitignore_global << 'EOF'\n# OS\n.DS_Store\nThumbs.db\n*.swp\n*.swo\n\n# 환경 파일\n.env\n.env.local\n*.env\n\n# 에디터\n.idea/\n.vscode/\n*.code-workspace\nEOF\n\ngit config --global core.excludesfile ~/.gitignore_global\n```\n\n### 유용한 Git 설정\n\n```bash\n# ~/.gitconfig 추가 설정\ngit config --global alias.st status\ngit config --global alias.co checkout\ngit config --global alias.br branch\ngit config --global alias.lg \"log --graph --oneline --all --decorate\"\ngit config --global alias.unstage \"reset HEAD --\"\n\n# 색상 출력\ngit config --global color.ui auto\n\n# push 기본 설정\ngit config --global push.default current\n\n# pull 기본 설정 (rebase)\ngit config --global pull.rebase true\n```\n\n### SSH 키로 GitHub/GitLab 연결\n\n```bash\n# SSH 키 생성\nssh-keygen -t ed25519 -C \"student@example.com\" -f ~/.ssh/github_key\n\n# ssh-agent에 키 추가\neval $(ssh-agent)\nssh-add ~/.ssh/github_key\n\n# ~/.ssh/config 설정\ncat >> ~/.ssh/config << 'EOF'\nHost github.com\n    HostName github.com\n    User git\n    IdentityFile ~/.ssh/github_key\n\nHost gitlab.com\n    HostName gitlab.com\n    User git\n    IdentityFile ~/.ssh/github_key\nEOF\n\n# 공개키를 GitHub/GitLab에 등록\ncat ~/.ssh/github_key.pub\n\n# 연결 테스트\nssh -T git@github.com\n```\n\n---\n\n## 17.5 VS Code 원격 개발\n\n### Remote-SSH 설정\n\n```bash\n# 로컬 PC에서 VS Code 설치 후\n# Extension: Remote - SSH 설치\n\n# ~/.ssh/config (로컬 PC에서)\nHost ubuntu-server\n    HostName 192.168.1.100\n    User student\n    IdentityFile ~/.ssh/id_ed25519\n    ServerAliveInterval 60\n```\n\n```\nVS Code에서:\n1. Ctrl+Shift+P → \"Remote-SSH: Connect to Host\"\n2. ubuntu-server 선택\n3. 연결 후 서버에서 VS Code Server 자동 설치\n4. 로컬처럼 원격 파일 편집 가능\n```\n\n### 유용한 VS Code 확장 (원격 서버용)\n\n```\n- Python (ms-python.python)\n- ESLint (dbaeumer.vscode-eslint)\n- Prettier (esbenp.prettier-vscode)\n- GitLens (eamodio.gitlens)\n- Docker (ms-azuretools.vscode-docker)\n- YAML (redhat.vscode-yaml)\n```\n\n---\n\n## 17.6 데이터베이스 클라이언트 도구\n\n```bash\n# MySQL 클라이언트\nsudo apt install mysql-client\n\n# PostgreSQL 클라이언트\nsudo apt install postgresql-client\n\n# Redis 클라이언트\nsudo apt install redis-tools\nredis-cli -h localhost ping\n\n# MongoDB 클라이언트\n# 공식 저장소에서 설치\n```\n\n### .env 파일 관리\n\n```bash\n# 프로젝트별 .env 파일\ncat > /opt/myapp/.env << 'EOF'\nDB_HOST=localhost\nDB_PORT=3306\nDB_NAME=myapp\nDB_USER=appuser\nDB_PASSWORD=secure_password\nREDIS_URL=redis://localhost:6379\nSECRET_KEY=your-secret-key\nNODE_ENV=production\nPORT=3000\nEOF\n\nchmod 600 /opt/myapp/.env\nchown appuser:appuser /opt/myapp/.env\n\n# Python에서 로드 (python-dotenv)\npip install python-dotenv\n\n# Node.js에서 로드 (dotenv)\nnpm install dotenv\n```\n\n---\n\n## 핵심 요약\n\n```\n개발 환경 설정 체크리스트:\n□ Python: pyenv + venv 설정\n□ Node.js: nvm 설치, LTS 버전 사용\n□ Java: OpenJDK LTS 버전\n□ Git: user.name, user.email, SSH 키 설정\n□ .gitignore: .env, IDE 설정 파일 제외\n□ VS Code Remote-SSH: 원격 개발 환경\n□ PM2: Node.js 프로세스 관리\n□ .env: 환경 변수 파일 관리\n```\n\n- **버전 관리자 사용**: pyenv, nvm으로 다중 버전 관리\n- **가상 환경 필수**: 프로젝트별 Python 의존성 격리\n- **환경 변수**: .env 파일로 설정 관리, 절대 Git에 커밋 금지\n", "# 챕터 18: 트러블슈팅과 실전\n\n> 실제 문제를 체계적으로 진단하고 해결한다\n\n## 학습 목표\n- 부팅 문제를 진단하고 복구할 수 있다\n- 디스크와 파일시스템 문제를 해결할 수 있다\n- 네트워크 문제를 체계적으로 진단할 수 있다\n- 성능 저하 원인을 찾고 튜닝할 수 있다\n\n---\n\n## 18.1 부팅 문제 해결\n\n### 부팅 과정 이해\n\n```\n전원 켜짐\n  ↓\nBIOS/UEFI (하드웨어 초기화)\n  ↓\nGRUB (부트로더)\n  ↓\nLinux 커널 로드\n  ↓\ninitramfs (초기 RAM 파일시스템)\n  ↓\nsystemd (PID 1)\n  ↓\n타깃 (multi-user.target 등)\n  ↓\n로그인 프롬프트\n```\n\n### GRUB 복구\n\n```bash\n# GRUB 메뉴 진입 (부팅 시 ESC 또는 Shift)\n# 복구 모드 선택: \"Advanced options\" → \"recovery mode\"\n\n# 복구 모드 옵션:\n# - clean: 디스크 공간 확보\n# - dpkg: 패키지 데이터베이스 수정\n# - fsck: 파일시스템 검사\n# - root: root 쉘 열기\n\n# GRUB 재설치 (Live USB에서)\nsudo mount /dev/sda1 /mnt\nsudo mount --bind /dev /mnt/dev\nsudo mount --bind /proc /mnt/proc\nsudo mount --bind /sys /mnt/sys\nsudo chroot /mnt\ngrub-install /dev/sda\nupdate-grub\nexit\n```\n\n### systemd 부팅 문제 분석\n\n```bash\n# 부팅 시간 분석\nsystemd-analyze\nsystemd-analyze blame | head -20\nsystemd-analyze critical-chain\n\n# 실패한 유닛 확인\nsystemctl --failed\n\n# 특정 서비스 로그 확인\njournalctl -u nginx --boot\njournalctl -b -1 -p err      # 이전 부팅의 오류\n\n# 비상 모드 (emergency target)\n# GRUB에서 커널 파라미터에 추가:\n# systemd.unit=emergency.target\n\n# 단일 사용자 모드\n# 커널 파라미터: single\n```\n\n---\n\n## 18.2 디스크 문제 해결\n\n### 디스크 꽉 참 (Disk Full)\n\n```bash\n# 원인 찾기\ndf -h                              # 어느 파티션이 꽉 찼는지\ndu -sh /* 2>/dev/null | sort -rh | head -10  # 큰 디렉토리\n\n# 큰 파일 찾기\nfind / -size +100M -type f 2>/dev/null\nfind /var/log -name \"*.log\" -size +50M\n\n# 로그 파일 정리\nsudo journalctl --vacuum-size=200M\nsudo apt clean\nsudo apt autoremove\n\n# 삭제됐지만 열려있는 파일 (디스크 공간 미반환)\nlsof +L1 | awk 'NR>1 {print $7, $9}' | sort -rn | head -10\n# 해당 프로세스 재시작 필요\n```\n\n### 파일시스템 오류 수정\n\n```bash\n# 파일시스템 마운트 해제 후 검사\nsudo umount /dev/sdb1\n\n# ext4 검사 및 수정\nsudo fsck -f /dev/sdb1      # -f: 강제 검사\nsudo fsck -y /dev/sdb1      # -y: 모든 오류 자동 수정\nsudo e2fsck -f /dev/sda1\n\n# XFS 수정\nsudo xfs_repair /dev/sdb1\n\n# 루트 파티션 검사 (재부팅 시)\nsudo touch /forcefsck       # 다음 부팅 시 자동 검사\n```\n\n### inode 소진\n\n```bash\n# inode 사용량 확인\ndf -i\n\n# 많은 파일이 있는 디렉토리 찾기\nfind / -xdev -printf '%h\\n' 2>/dev/null | \\\n  sort | uniq -c | sort -rn | head -10\n\n# 임시 파일 정리\nfind /tmp -type f -mtime +7 -delete\nfind /var/tmp -type f -mtime +30 -delete\n```\n\n---\n\n## 18.3 네트워크 문제 진단\n\n### 체계적 진단 순서\n\n```\n1. 물리 연결 확인\n   ↓\n2. IP 주소 확인\n   ↓\n3. 게이트웨이 ping\n   ↓\n4. DNS 확인\n   ↓\n5. 외부 연결 테스트\n   ↓\n6. 방화벽 규칙 확인\n   ↓\n7. 서비스 포트 확인\n```\n\n```bash\n# 1. 인터페이스 확인\nip link show                    # UP 상태인지 확인\nip addr show\n\n# 2. IP 주소 확인\nip addr | grep inet\n\n# 3. 게이트웨이 ping\nip route | grep default         # 게이트웨이 IP 확인\nping -c 3 <gateway_ip>\n\n# 4. DNS 확인\ncat /etc/resolv.conf\ndig google.com @8.8.8.8         # 직접 DNS 서버 지정\nnslookup google.com\n\n# 5. 외부 연결\nping -c 3 8.8.8.8              # IP 직접 (DNS 없이)\ncurl -v https://google.com\n\n# 6. 방화벽 확인\nsudo ufw status\nsudo iptables -L -n\n\n# 7. 포트 확인\nss -tlnp | grep :80\ntelnet localhost 80\nnc -zv localhost 80\n```\n\n### 자주 발생하는 네트워크 문제\n\n```bash\n# DNS 캐시 초기화\nsudo systemd-resolve --flush-caches\nsudo resolvectl flush-caches\n\n# 네트워크 재시작\nsudo systemctl restart NetworkManager    # 데스크톱\nsudo netplan apply                       # 서버\n\n# 인터페이스 재시작\nsudo ip link set ens33 down\nsudo ip link set ens33 up\nsudo dhclient ens33                      # DHCP 재할당\n\n# MTU 문제 (패킷 분할 이슈)\nping -M do -s 1472 192.168.1.1           # MTU 테스트\nsudo ip link set ens33 mtu 1400          # MTU 조정\n```\n\n---\n\n## 18.4 서비스 문제 해결\n\n### 서비스가 시작되지 않을 때\n\n```bash\n# 상태 확인 (가장 먼저)\nsudo systemctl status nginx\n# → Active: failed 또는 오류 메시지 확인\n\n# 상세 로그 확인\nsudo journalctl -u nginx -n 50 --no-pager\nsudo journalctl -xe\n\n# 설정 파일 문법 검사\nsudo nginx -t\nsudo apache2ctl configtest\nsudo sshd -t\n\n# 포트 충돌 확인\nsudo ss -tlnp | grep :80\nsudo fuser 80/tcp\n\n# 프로세스 강제 종료 후 재시작\nsudo fuser -k 80/tcp\nsudo systemctl start nginx\n```\n\n### 프로세스 충돌 디버깅\n\n```bash\n# 코어 덤프 활성화\nulimit -c unlimited\necho \"/tmp/core.%e.%p\" | sudo tee /proc/sys/kernel/core_pattern\n\n# gdb로 코어 분석\nsudo apt install gdb\ngdb /usr/bin/nginx /tmp/core.nginx.1234\n(gdb) bt                    # 백트레이스\n\n# strace로 시스템 콜 추적\nsudo strace -p <PID> -e trace=network\nsudo strace nginx 2>&1 | head -50\n```\n\n---\n\n## 18.5 성능 튜닝\n\n### 커널 파라미터 튜닝\n\n```bash\n# 현재 값 확인\nsysctl -a | grep net.ipv4.tcp\n\n# 임시 변경\nsudo sysctl -w net.ipv4.tcp_fin_timeout=30\n\n# 영구 변경\nsudo nano /etc/sysctl.d/99-tuning.conf\n```\n\n```ini\n# /etc/sysctl.d/99-tuning.conf\n\n# 네트워크 성능\nnet.ipv4.tcp_fin_timeout = 30\nnet.ipv4.tcp_keepalive_time = 1200\nnet.core.somaxconn = 65535\nnet.ipv4.ip_local_port_range = 10000 65000\nnet.ipv4.tcp_max_syn_backlog = 8096\n\n# 파일 디스크립터 제한\nfs.file-max = 100000\nfs.nr_open = 100000\n\n# 가상 메모리\nvm.swappiness = 10          # 스왑 사용 최소화\nvm.dirty_ratio = 15\n```\n\n```bash\n# 적용\nsudo sysctl -p /etc/sysctl.d/99-tuning.conf\n```\n\n### 프로세스 파일 제한\n\n```bash\n# 현재 제한 확인\nulimit -n                       # 열 수 있는 파일 수\ncat /proc/sys/fs/file-max\n\n# 특정 서비스 제한 변경\nsudo nano /etc/systemd/system/nginx.service.d/override.conf\n```\n\n```ini\n[Service]\nLimitNOFILE=65535\nLimitNPROC=65535\n```\n\n---\n\n## 18.6 실전 시나리오\n\n### 시나리오 1: 웹서버 응답 없음\n\n```bash\n# 1. 서비스 상태 확인\nsudo systemctl status nginx\n\n# 2. 포트 리스닝 확인\nss -tlnp | grep :80\n\n# 3. 방화벽 확인\nsudo ufw status\n\n# 4. Nginx 설정 확인\nsudo nginx -t\n\n# 5. 오류 로그 확인\nsudo tail -f /var/log/nginx/error.log\n\n# 6. 리소스 확인 (CPU/메모리)\ntop\n\n# 7. 연결 수 확인\nss -tn | grep :80 | wc -l\n```\n\n### 시나리오 2: 서버 속도 저하\n\n```bash\n# 1. 부하 확인\nuptime                          # load average 확인\n# 1분 5분 15분 평균 (코어 수 초과면 과부하)\n\n# 2. CPU/메모리 확인\ntop -b -n 1 | head -20\n\n# 3. I/O 대기 확인\niostat -x 1 3\niotop -o -n 3\n\n# 4. 메모리 부족 확인\nfree -h\nvmstat 1 5\n\n# 5. 네트워크 포화 확인\nsar -n DEV 1 5\n\n# 6. 원인 프로세스 확인\nps aux --sort=-%cpu | head -10\nps aux --sort=-%mem | head -10\n```\n\n---\n\n## 핵심 요약\n\n```\n트러블슈팅 5단계:\n1. 증상 파악      → 무엇이 안 되는가?\n2. 정보 수집      → 로그, 상태 확인\n3. 가설 수립      → 원인 추정\n4. 검증           → 하나씩 테스트\n5. 해결 및 기록   → 재발 방지\n```\n\n```\n자주 쓰는 트러블슈팅 명령어:\nsystemctl status [서비스]       ← 서비스 상태\njournalctl -u [서비스] -n 50    ← 서비스 로그\nss -tlnp                        ← 포트 확인\ndf -h && free -h                ← 디스크/메모리\ntop                             ← CPU/프로세스\nsudo ufw status                 ← 방화벽\nip addr && ip route             ← 네트워크\n```\n", "# 부록: 빠른 참조 가이드\n\n> 자주 쓰는 명령어와 설정을 한눈에 확인한다\n\n---\n\n## A. 필수 명령어 치트시트\n\n### 파일과 디렉토리\n\n```bash\nls -la              # 숨김 파일 포함 상세 목록\ncd ~                # 홈 디렉토리\npwd                 # 현재 위치\nmkdir -p a/b/c      # 중간 디렉토리 포함 생성\ncp -r src/ dst/     # 디렉토리 복사\nmv old new          # 이동/이름 변경\nrm -rf dir/         # 디렉토리 강제 삭제\nfind / -name \"*.log\" -mtime +7   # 7일 이상된 .log 파일\nln -s /path/target link_name    # 심볼릭 링크\n```\n\n### 파일 내용\n\n```bash\ncat file.txt        # 전체 출력\nless file.txt       # 페이지 단위 보기\nhead -20 file.txt   # 앞 20줄\ntail -f /var/log/syslog  # 실시간 로그\ngrep -rn \"pattern\" /path/   # 재귀 검색 + 행번호\ngrep -v \"exclude\" file      # 제외 패턴\nawk '{print $1,$3}' file    # 1,3번째 필드\nsed 's/old/new/g' file      # 치환\nwc -l file          # 줄 수\n```\n\n### 권한과 사용자\n\n```bash\nchmod 755 file      # rwxr-xr-x\nchmod +x script.sh  # 실행 권한 추가\nchown user:group file\nsudo -i             # root 쉘\nid                  # 현재 사용자 정보\nwhoami\nuseradd -m -s /bin/bash username\npasswd username\nusermod -aG sudo username\n```\n\n### 프로세스\n\n```bash\nps aux              # 모든 프로세스\nps aux | grep nginx\ntop                 # 실시간 모니터링\nhtop                # 개선된 top\nkill -9 PID         # 강제 종료\nkillall nginx\npgrep -l nginx      # 프로세스 검색\nnohup cmd &         # 백그라운드 실행\njobs                # 백그라운드 작업 목록\n```\n\n### 네트워크\n\n```bash\nip addr             # IP 주소\nip route            # 라우팅 테이블\nping -c 4 8.8.8.8\ntraceroute google.com\nss -tlnp            # 리스닝 포트\ncurl -I https://example.com   # HTTP 헤더\nwget https://example.com/file\nnetstat -an | grep ESTABLISHED\n```\n\n---\n\n## B. systemd 명령어\n\n```bash\n# 서비스 관리\nsystemctl start|stop|restart|reload nginx\nsystemctl enable|disable nginx     # 부팅 시 자동 시작\nsystemctl status nginx\nsystemctl is-active nginx\nsystemctl --failed                 # 실패한 서비스 목록\n\n# 로그\njournalctl -u nginx               # 서비스 로그\njournalctl -f                     # 실시간\njournalctl -b                     # 현재 부팅\njournalctl -p err                 # 오류 이상\njournalctl --since \"1 hour ago\"\njournalctl --vacuum-size=500M     # 로그 정리\n\n# 타이머\nsystemctl list-timers\n```\n\n---\n\n## C. APT 패키지 관리\n\n```bash\napt update                    # 패키지 목록 갱신\napt upgrade                   # 업그레이드\napt install nginx             # 설치\napt remove nginx              # 제거 (설정 유지)\napt purge nginx               # 완전 제거\napt autoremove                # 불필요 패키지 제거\napt search keyword            # 검색\napt show nginx                # 정보\ndpkg -l | grep nginx          # 설치 확인\ndpkg -L nginx                 # 설치된 파일 목록\n```\n\n---\n\n## D. UFW 방화벽\n\n```bash\nufw status verbose\nufw enable|disable\nufw allow 80/tcp\nufw allow ssh\nufw allow from 192.168.1.0/24 to any port 22\nufw deny 23\nufw delete allow 80/tcp\nufw limit ssh                 # brute-force 방어\nufw logging on\n```\n\n---\n\n## E. SSH\n\n```bash\n# 접속\nssh user@host\nssh -p 2222 user@host\nssh -i ~/.ssh/key user@host\n\n# 키 관리\nssh-keygen -t ed25519 -C \"email\"\nssh-copy-id user@host\ncat ~/.ssh/id_ed25519.pub     # 공개키 확인\n\n# 설정 (~/.ssh/config)\nHost myserver\n    HostName 192.168.1.100\n    User ubuntu\n    Port 22\n    IdentityFile ~/.ssh/mykey\n\n# 포트 포워딩\nssh -L 8080:localhost:80 user@host    # 로컬\nssh -R 9090:localhost:3000 user@host  # 원격\n```\n\n---\n\n## F. Nginx 주요 설정\n\n```nginx\n# /etc/nginx/sites-available/mysite\nserver {\n    listen 80;\n    server_name example.com;\n    root /var/www/mysite;\n    index index.html;\n\n    # 프록시\n    location /api/ {\n        proxy_pass http://localhost:3000/;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n    }\n\n    # 정적 파일 캐시\n    location ~* \\.(jpg|css|js|png)$ {\n        expires 30d;\n    }\n\n    # HTTPS 리디렉션\n    return 301 https://$server_name$request_uri;\n}\n```\n\n```bash\nnginx -t            # 설정 검사\nnginx -s reload     # 재로드\n```\n\n---\n\n## G. MySQL\n\n```bash\nmysql -u root -p\nmysql -u user -p dbname < dump.sql    # 복원\n\n# MySQL 명령어\nSHOW DATABASES;\nUSE dbname;\nSHOW TABLES;\nDESCRIBE tablename;\n\n# 사용자 관리\nCREATE USER 'user'@'localhost' IDENTIFIED BY 'password';\nGRANT ALL PRIVILEGES ON dbname.* TO 'user'@'localhost';\nFLUSH PRIVILEGES;\n\n# 백업/복원\nmysqldump -u root -p dbname > backup.sql\nmysqldump -u root -p --all-databases > all.sql\n```\n\n---\n\n## H. Docker\n\n```bash\n# 이미지\ndocker pull nginx\ndocker images\ndocker rmi nginx\ndocker build -t myapp:1.0 .\n\n# 컨테이너\ndocker run -d -p 80:80 --name web nginx\ndocker ps\ndocker ps -a\ndocker stop|start|restart web\ndocker rm web\ndocker logs -f web\ndocker exec -it web bash\n\n# Docker Compose\ndocker compose up -d\ndocker compose down\ndocker compose ps\ndocker compose logs -f\n```\n\n---\n\n## I. 자주 쓰는 설정 파일\n\n| 파일 | 용도 |\n|------|------|\n| `/etc/fstab` | 파일시스템 자동 마운트 |\n| `/etc/hosts` | 로컬 DNS |\n| `/etc/resolv.conf` | DNS 서버 |\n| `/etc/network/interfaces` | 네트워크 설정 (구형) |\n| `/etc/netplan/*.yaml` | 네트워크 설정 (신형) |\n| `/etc/ssh/sshd_config` | SSH 서버 설정 |\n| `/etc/sudoers` | sudo 권한 |\n| `/etc/passwd` | 사용자 목록 |\n| `/etc/group` | 그룹 목록 |\n| `/etc/crontab` | 시스템 cron |\n| `/var/log/syslog` | 시스템 로그 |\n| `/var/log/auth.log` | 인증 로그 |\n\n---\n\n## J. 환경 변수와 .bashrc\n\n```bash\n# ~/.bashrc에 추가\nexport PATH=\"$HOME/bin:$PATH\"\nexport JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64\nexport EDITOR=vim\n\n# 유용한 alias\nalias ll='ls -la'\nalias ..='cd ..'\nalias grep='grep --color=auto'\nalias gs='git status'\nalias gl='git log --oneline --graph'\n\n# 함수\nmkcd() { mkdir -p \"$1\" && cd \"$1\"; }\n\n# 적용\nsource ~/.bashrc\n```\n\n---\n\n## K. 트러블슈팅 빠른 참조\n\n```bash\n# 서비스 안 뜰 때\nsystemctl status SERVICE\njournalctl -u SERVICE -n 50\nSERVICE -t                    # 설정 검사 (nginx, apache2 등)\n\n# 디스크 꽉 찼을 때\ndf -h                         # 파티션 확인\ndu -sh /* 2>/dev/null | sort -rh | head -10\njournalctl --vacuum-size=200M\napt clean\n\n# 포트 충돌\nss -tlnp | grep :80\nfuser 80/tcp\n\n# 네트워크 안 될 때\nip link show\nip addr show\nping -c 3 8.8.8.8\ndig google.com @8.8.8.8\n\n# 메모리 부족\nfree -h\nps aux --sort=-%mem | head -10\n```\n\n---\n\n## L. 유용한 단축키\n\n| 단축키 | 기능 |\n|--------|------|\n| `Ctrl+C` | 실행 중인 명령 취소 |\n| `Ctrl+D` | 입력 종료 / 로그아웃 |\n| `Ctrl+Z` | 프로세스 일시 정지 |\n| `Ctrl+L` | 화면 지우기 |\n| `Ctrl+A` | 줄 처음으로 |\n| `Ctrl+E` | 줄 끝으로 |\n| `Ctrl+R` | 명령어 이력 검색 |\n| `Ctrl+W` | 앞 단어 삭제 |\n| `!!` | 이전 명령 재실행 |\n| `!$` | 이전 명령의 마지막 인자 |\n| `Tab` | 자동완성 |\n| `Tab Tab` | 자동완성 목록 |\n"];

function md2html(t){
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inlineM=s=>{
    s=s.replace(/`([^`]+)`/g,(_,c)=>'<code>'+esc(c)+'</code>');
    s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    s=s.replace(/\*([^*]+)\*/g,'<em>$1</em>');
    return s;
  };
  const lines=t.split('\n');
  let out='',inPre=false,inUl=false,inOl=false,buf='';
  const flush=()=>{if(buf.trim()){out+='<p>'+inlineM(buf.trim())+'</p>';buf='';}};
  const flushL=()=>{if(inUl){out+='</ul>';inUl=false;}if(inOl){out+='</ol>';inOl=false;}};
  for(const l of lines){
    if(l.startsWith('```')){if(!inPre){flush();flushL();out+='<pre><code>';inPre=true;}else{out+='</code></pre>';inPre=false;}continue;}
    if(inPre){out+=esc(l)+'\n';continue;}
    if(l.startsWith('> ')){flush();flushL();out+='<blockquote>'+inlineM(l.slice(2))+'</blockquote>';continue;}
    if(l.startsWith('# ')){flush();flushL();out+='<h1>'+inlineM(l.slice(2))+'</h1>';continue;}
    if(l.startsWith('## ')){flush();flushL();out+='<h2>'+inlineM(l.slice(3))+'</h2>';continue;}
    if(l.startsWith('### ')){flush();flushL();out+='<h3>'+inlineM(l.slice(4))+'</h3>';continue;}
    if(l.startsWith('- ')||l.startsWith('* ')){flush();if(!inUl){flushL();out+='<ul>';inUl=true;}out+='<li>'+inlineM(l.slice(2))+'</li>';continue;}
    if(/^\d+\.\s/.test(l)){flush();if(!inOl){flushL();out+='<ol>';inOl=true;}out+='<li>'+inlineM(l.replace(/^\d+\.\s/,''))+'</li>';continue;}
    if(/^---+$/.test(l)){flush();flushL();out+='<hr>';continue;}
    if(l.trim()===''){flush();flushL();continue;}
    buf+=(buf?' ':'')+l;
  }
  flush();flushL();
  return out;
}

function buildPages(){
  const p=[];
  p.push({type:'cover-l'});
  p.push({type:'cover-r'});
  CHAPTERS.forEach((md,ci)=>{
    const isAppendix=ci===CHAPTERS.length-1;
    const tm=md.match(/^#\s+(.+)/m);
    const title=tm?tm[1]:(isAppendix?'부록':'챕터'+(ci+1));
    const parts=md.split(/\n(?=##\s)/);
    parts.forEach(pt=>{if(pt.trim())p.push({type:'c',title,num:isAppendix?'A':ci+1,md:pt.trim()});});
  });
  if(p.length%2!==0)p.push({type:'blank'});
  return p;
}

function resize(){
  const vw=window.innerWidth;
  const hdH=document.querySelector('.hd').offsetHeight||46;
  const botH=document.querySelector('.bottom').offsetHeight||38;
  const avH=window.innerHeight-hdH-botH-16;
  const isMobile=vw<=640;
  let w,h;
  if(isMobile){
    h=Math.min(avH,Math.floor((vw-60)*1.414));
    w=Math.floor(h/1.414);
    document.getElementById('pl').style.cssText='width:'+w+'px;height:'+h+'px;font-size:'+Math.floor(w/380*12)+'px';
  } else {
    const maxW=Math.floor((vw-120)/2);
    h=avH;
    w=Math.floor(h/1.414);
    if(w>maxW){w=maxW;h=Math.floor(w*1.414);}
    const fs=Math.floor(w/380*12)+'px';
    document.getElementById('pl').style.cssText='width:'+w+'px;height:'+h+'px;font-size:'+fs;
    document.getElementById('pr').style.cssText='width:'+w+'px;height:'+h+'px;font-size:'+fs;
  }
}

  if(page.type==='cover-r'){
    el.className='page right';
    el.innerHTML='<div class="cov-wrap"><div class="cov-top">이것이 우분투 리눅스다</div><div class="cov-body"><div class="cov-toc"><strong>목차</strong>CH01 챕터 1: 리눅스와 우분투 이해<br>CH02 챕터 2: 우분투 설치와 환경 설정<br>CH03 챕터 3: 터미널과 기본 명령어<br>CH04 챕터 4: 파일시스템 구조와 관리<br>CH05 챕터 5: 파일 권한과 사용자 관리<br>CH06 챕터 6: 프로세스와 서비스 관리<br>CH07 챕터 7: 네트워크 기초와 설정<br>CH08 챕터 8: SSH와 원격 접속<br>CH09 챕터 9: 방화벽과 보안<br>...</div></div><div class="cov-ft">— 2 —</div></div>';
    return;
  }
  const side=el.id==='pl'?'left':'right';
  el.className='page '+side;
  el.innerHTML='<div class="pg-hd">이것이 우분투 리눅스다</div><div class="pg-bd">'+md2html(page.md)+'</div><div class="pg-ft">— '+pgNum+' —</div>';
}

function render(){
  const li=cur*2,ri=cur*2+1;
  renderPage(document.getElementById('pl'),PAGES[li],li+1);
  renderPage(document.getElementById('pr'),PAGES[ri],ri+1);
}

function ui(){
  const disp=cur*2+1;
  document.getElementById('pn').textContent=disp;
  document.getElementById('pi').value=disp;
  ['pb','pb2'].forEach(id=>document.getElementById(id).disabled=cur===0);
  ['nb','nb2'].forEach(id=>document.getElementById(id).disabled=cur>=SPREADS-1);
  document.getElementById('bar').style.width=((cur+1)/SPREADS*100)+'%';
}

function go(d){
  if(busy)return;
  const n=cur+d;
  if(n<0||n>=SPREADS)return;
  busy=true;
  const book=document.getElementById('book');
  book.classList.add(d>0?'flip-next':'flip-prev');
  setTimeout(()=>{cur=n;render();ui();book.classList.remove('flip-next','flip-prev');busy=false;},250);
}

function jumpTo(e){
  const r=e.currentTarget.getBoundingClientRect();
  const ratio=(e.clientX-r.left)/r.width;
  cur=Math.floor(ratio*SPREADS);
  render();ui();
}

function jumpPage(v){
  const pg=parseInt(v);
  if(!isNaN(pg)&&pg>=1&&pg<=PAGES.length){
    cur=Math.floor((pg-1)/2);render();ui();
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);
});
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{const d=tx-e.changedTouches[0].clientX;if(Math.abs(d)>40)go(d>0?1:-1);},{passive:true});

window.addEventListener('resize',()=>{resize();render();});
resize();render();ui();
</script>
</body>
</html>
