<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이것이 우분투 리눅스다</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* 헤더 */
.hd{background:#fff;border-bottom:1px solid #d1d5db;padding:6px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;height:42px}
.hd h1{color:#1e3a8a;font-size:.85rem;font-weight:700}
.hd .inf{color:#6b7280;font-size:.75rem}
.pdf-btn{background:#2563eb;color:#fff;border:none;padding:4px 12px;border-radius:6px;font-size:.72rem;cursor:pointer;transition:.2s}
.pdf-btn:hover{background:#1d4ed8}

/* 뷰어 */
.viewer{flex:1;height:0;display:flex;align-items:center;justify-content:center;padding:12px 8px;min-height:0;gap:0}

/* 네비게이션 버튼 */
.nav{background:#fff;color:#374151;border:1px solid #d1d5db;width:36px;height:36px;border-radius:50%;font-size:1rem;cursor:pointer;transition:.2s;flex-shrink:0;margin:0 8px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.nav:hover{background:#f3f4f6;border-color:#9ca3af}
.nav:disabled{background:#f9fafb;color:#d1d5db;cursor:default;box-shadow:none}

/* 책 컨테이너 */
.book{display:flex;box-shadow:0 8px 32px rgba(0,0,0,.25);position:relative}
.book::after{content:'';position:absolute;top:0;left:50%;width:3px;height:100%;background:linear-gradient(90deg,rgba(0,0,0,.12),rgba(0,0,0,.04),rgba(0,0,0,.12));transform:translateX(-50%);z-index:10;pointer-events:none}

/* 페이지 */
.page{background:#fff;overflow:hidden;display:flex;flex-direction:column;flex-shrink:0}
.page.left{border-right:1px solid #e5e7eb}
.page.right{}

/* 표지 */
.cov-wrap{display:flex;flex-direction:column;height:100%;padding:8% 10%}
.cov-top{border-bottom:1px solid #e5e7eb;padding-bottom:.6em;margin-bottom:1.5em;font-size:.5em;color:#9ca3af}
.cov-body{flex:1;display:flex;flex-direction:column;justify-content:center}
.cov-ic{font-size:2.5em;margin-bottom:.3em}
.cov-t{font-size:1.6em;font-weight:900;color:#111827;line-height:1.25;margin-bottom:.4em}
.cov-sub{font-size:.7em;color:#374151;margin-bottom:.7em}
.cov-line{width:3em;height:3px;background:#2563eb;margin-bottom:.8em}
.cov-desc{font-size:.6em;color:#6b7280;line-height:1.7;margin-bottom:1em}
.cov-date{font-size:.55em;color:#9ca3af}
.cov-toc{font-size:.55em;color:#374151;line-height:2;border-top:1px solid #e5e7eb;padding-top:1em}
.cov-toc strong{display:block;color:#1e3a8a;font-size:1.1em;margin-bottom:.4em}
.cov-ft{font-size:.46em;color:#9ca3af;text-align:center;padding-top:.6em;border-top:1px solid #e5e7eb;margin-top:auto}

/* 페이지 헤더 */
.pg-hd{border-bottom:1px solid #e5e7eb;padding:.35em 1.2em;font-size:.46em;color:#9ca3af;font-weight:400;flex-shrink:0}

/* 본문 */
.pg-bd{flex:1;padding:.9em 1.2em;overflow:hidden;color:#1f2937;line-height:1.65;font-size:.66em}
.pg-bd h1{font-size:1.5em;font-weight:900;color:#111827;border-bottom:3px solid #2563eb;padding-bottom:.3em;margin-bottom:.6em;line-height:1.3}
.pg-bd h2{font-size:1.05em;font-weight:700;color:#2563eb;margin:.7em 0 .3em}
.pg-bd h3{font-size:.92em;font-weight:700;color:#111827;margin:.5em 0 .2em}
.pg-bd p{margin-bottom:.4em}
.pg-bd ul,.pg-bd ol{padding-left:1.2em;margin:.2em 0 .4em}
.pg-bd li{margin:.15em 0}
.pg-bd blockquote{border-left:3px solid #2563eb;padding:.3em .7em;background:#eff6ff;color:#374151;font-style:italic;margin:.4em 0;font-size:.93em;border-radius:0 4px 4px 0}
.pg-bd pre{background:#1e293b;color:#e2e8f0;padding:.55em .8em;border-radius:4px;font-size:.74em;overflow:hidden;margin:.4em 0;line-height:1.45;white-space:pre-wrap;word-break:break-all}
.pg-bd code{background:#f0f4ff;color:#1d4ed8;padding:.1em .25em;border-radius:3px;font-size:.87em}
.pg-bd pre code{background:none;color:inherit;padding:0;font-size:1em}
.pg-bd table{width:100%;border-collapse:collapse;margin:.4em 0;font-size:.83em}
.pg-bd th{background:#2563eb;color:#fff;padding:.28em .5em;text-align:left;font-weight:600}
.pg-bd td{padding:.22em .5em;border-bottom:1px solid #e5e7eb}
.pg-bd tr:nth-child(even) td{background:#f9fafb}
.pg-bd strong{color:#111827;font-weight:700}
.pg-bd hr{border:none;border-top:1px solid #e5e7eb;margin:.4em 0}

/* 페이지 푸터 */
.pg-ft{padding:.3em .7em;text-align:center;border-top:1px solid #e5e7eb;font-size:.46em;color:#9ca3af;flex-shrink:0}

/* 플립 애니메이션 */
.book.flip-next{animation:fn .4s ease}
.book.flip-prev{animation:fp .4s ease}
@keyframes fn{0%{transform:perspective(1200px) rotateY(0)}40%{transform:perspective(1200px) rotateY(-3deg)}100%{transform:perspective(1200px) rotateY(0)}}
@keyframes fp{0%{transform:perspective(1200px) rotateY(0)}40%{transform:perspective(1200px) rotateY(3deg)}100%{transform:perspective(1200px) rotateY(0)}}

/* 하단 바 */
.bottom{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 16px;background:#fff;border-top:1px solid #d1d5db}
.prog{flex:1;max-width:300px;height:3px;background:#e5e7eb;border-radius:2px;cursor:pointer}
.prog-b{height:100%;background:#2563eb;border-radius:2px;transition:width .3s}
.pg-input{background:#f9fafb;border:1px solid #d1d5db;color:#374151;padding:2px 6px;border-radius:4px;font-size:.72rem;width:60px;text-align:center}
.pg-input:focus{outline:none;border-color:#2563eb}

/* 모바일: 단일 페이지 */
@media(max-width:640px){
  .page.right{display:none}
  .book::after{display:none}
}
</style>
</head>
<body>
<div class="hd">
  <h1>🐧 이것이 우분투 리눅스다</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="inf"><span id="pn">1</span> / <span id="pt">-</span></div>
    <button class="pdf-btn" onclick="window.print()">📄 PDF</button>
  </div>
</div>
<div class="viewer">
  <button class="nav" id="pb" onclick="go(-1)" disabled>&#8592;</button>
  <div class="book" id="book">
    <div class="page left" id="pl"></div>
    <div class="page right" id="pr"></div>
  </div>
  <button class="nav" id="nb" onclick="go(1)">&#8594;</button>
</div>
<div class="bottom">
  <button class="nav" style="margin:0;width:28px;height:28px;font-size:.8rem" onclick="go(-1)" disabled id="pb2">&#8592;</button>
  <div class="prog" id="prog" onclick="jumpTo(event)"><div class="prog-b" id="bar"></div></div>
  <input class="pg-input" id="pi" value="1" onchange="jumpPage(this.value)" />
  <button class="nav" style="margin:0;width:28px;height:28px;font-size:.8rem" onclick="go(1)" id="nb2">&#8594;</button>
</div>
<script>
const CHAPTERS=["# 챕터 1: 리눅스와 우분투 이해\n\n> 오픈소스 운영체제의 역사와 우분투의 특징\n\n## 학습 목표\n- 리눅스의 탄생 배경과 역사를 이해한다\n- 리눅스 커널 구조와 운영체제 구성요소를 파악한다\n- 우분투의 특징과 다른 배포판과의 차이를 이해한다\n- 리눅스를 배워야 하는 이유를 설명할 수 있다\n\n---\n\n## 1.1 리눅스의 탄생과 역사\n\n### UNIX에서 Linux로\n\n1969년 AT&T 벨 연구소에서 Ken Thompson과 Dennis Ritchie가 UNIX를 개발했습니다. UNIX는 멀티태스킹과 멀티유저를 지원하는 혁신적인 운영체제였지만, 상업적 라이선스로 인해 사용이 제한적이었습니다.\n\n```\nUNIX 계보:\nUNIX (1969, AT&T)\n├── BSD (1977, UC Berkeley)\n│   ├── FreeBSD\n│   ├── NetBSD\n│   └── macOS (Darwin)\n├── System V\n│   └── AIX, HP-UX, Solaris\n└── GNU/Linux (1991, Linus Torvalds)\n    ├── Debian → Ubuntu, Mint\n    ├── Red Hat → Fedora, CentOS, RHEL\n    └── Arch Linux → Manjaro\n```\n\n### Linus Torvalds와 Linux 커널\n\n1991년 핀란드 헬싱키 대학교 학생이었던 **Linus Torvalds**는 개인 프로젝트로 운영체제 커널을 개발하기 시작했습니다. 그의 유명한 메시지:\n\n> \"저는 386(486) AT 클론을 위한 자유로운(무료) 운영체제를 만들고 있습니다. 단지 취미로, GNU처럼 크고 전문적이지는 않을 것입니다.\"\n\nLinux는 오픈소스로 공개되어 전 세계 개발자들의 기여를 받으며 빠르게 성장했습니다.\n\n### GNU 프로젝트와의 만남\n\nRichard Stallman이 1983년 시작한 **GNU 프로젝트**는 자유 소프트웨어 도구들(gcc, bash, glibc 등)을 제공했지만 커널이 없었습니다. Linux 커널과 GNU 도구들이 결합되어 완전한 운영체제인 **GNU/Linux**가 탄생했습니다.\n\n---\n\n## 1.2 리눅스 커널 구조\n\n### 운영체제의 계층 구조\n\n```\n┌─────────────────────────────────┐\n│         사용자 애플리케이션       │  ← 웹 브라우저, 편집기, 게임\n├─────────────────────────────────┤\n│         시스템 라이브러리         │  ← glibc, libstdc++\n├─────────────────────────────────┤\n│         시스템 콜 인터페이스      │  ← read(), write(), fork()\n├─────────────────────────────────┤\n│                                 │\n│         리눅스 커널              │  ← 핵심 운영체제\n│  ┌──────┬──────┬──────┬──────┐  │\n│  │프로세스│메모리│파일  │네트워크│  │\n│  │관리   │관리  │시스템│스택   │  │\n│  └──────┴──────┴──────┴──────┘  │\n├─────────────────────────────────┤\n│         하드웨어 드라이버         │  ← CPU, 메모리, 디스크, NIC\n├─────────────────────────────────┤\n│         하드웨어                 │  ← 물리적 장치\n└─────────────────────────────────┘\n```\n\n### 커널의 주요 기능\n\n| 기능 | 설명 |\n|------|------|\n| 프로세스 관리 | CPU 스케줄링, 프로세스 생성/종료 |\n| 메모리 관리 | 가상 메모리, 페이지 교체, 메모리 할당 |\n| 파일 시스템 | ext4, xfs, btrfs 등 다양한 파일시스템 지원 |\n| 네트워크 스택 | TCP/IP 프로토콜 구현 |\n| 디바이스 드라이버 | 하드웨어 추상화 계층 제공 |\n| 보안 | DAC, MAC, SELinux, AppArmor |\n\n### 모놀리식 커널 vs 마이크로커널\n\nLinux는 **모놀리식 커널(Monolithic Kernel)** 방식을 채택합니다.\n\n```\n모놀리식 커널 (Linux):           마이크로커널 (MINIX, QNX):\n┌──────────────────┐             ┌──────────────────┐\n│  단일 커널 공간   │             │   최소한의 커널   │\n│ ┌──┬──┬──┬──┐   │             ├──────────────────┤\n│ │FS│MM│NS│DD│   │             │  파일시스템 서버  │\n│ └──┴──┴──┴──┘   │             │  드라이버 서버    │\n└──────────────────┘             │  메모리 서버      │\n장점: 성능 우수                   └──────────────────┘\n단점: 버그 시 시스템 전체 영향     장점: 안정성\n                                  단점: 성능 오버헤드\n```\n\n---\n\n## 1.3 우분투(Ubuntu)란?\n\n### 우분투의 탄생\n\n**우분투(Ubuntu)**는 2004년 South African 기업가 **Mark Shuttleworth**가 설립한 **Canonical Ltd.**에서 만든 리눅스 배포판입니다. Debian을 기반으로 하며, 사용 편의성에 초점을 맞췄습니다.\n\n이름 \"Ubuntu\"는 아프리카 반투족 철학에서 유래:\n> **\"I am what I am because of who we all are\"**\n> (우리 모두가 있기에 내가 있다)\n\n### 우분투 버전 체계\n\n우분투는 **6개월마다** 새 버전을 출시하며, **2년마다 LTS(Long Term Support)** 버전을 출시합니다.\n\n```\n버전 번호 형식: YY.MM\n예: 24.04 LTS = 2024년 4월, 장기 지원\n\n지원 기간:\n일반 버전:  9개월\nLTS 버전:  5년 (서버는 10년 ESM)\n\n주요 LTS 버전:\n- 20.04 LTS (Focal Fossa)     ← 2025년까지 지원\n- 22.04 LTS (Jammy Jellyfish) ← 2027년까지 지원\n- 24.04 LTS (Noble Numbat)    ← 2029년까지 지원\n```\n\n### 우분투 에디션\n\n| 에디션 | 대상 | 특징 |\n|--------|------|------|\n| Ubuntu Desktop | 일반 사용자 | GNOME 데스크톱 환경 |\n| Ubuntu Server | 서버 관리자 | GUI 없음, 최소 설치 |\n| Ubuntu Core | IoT 기기 | 스냅 패키지 기반 |\n| Kubuntu | KDE 선호자 | KDE Plasma 환경 |\n| Xubuntu | 저사양 PC | XFCE 환경 |\n\n---\n\n## 1.4 주요 리눅스 배포판 비교\n\n### 배포판 계열 분류\n\n```\nDebian 계열                    Red Hat 계열\n├── Ubuntu                     ├── RHEL (유료)\n│   ├── Linux Mint             ├── CentOS Stream\n│   ├── Pop!_OS                ├── Fedora\n│   └── Elementary OS          ├── Rocky Linux\n└── Debian                     └── AlmaLinux\n\n독립 계열\n├── Arch Linux → Manjaro\n├── openSUSE\n└── Gentoo\n```\n\n### 배포판 선택 가이드\n\n| 상황 | 추천 배포판 | 이유 |\n|------|------------|------|\n| 처음 리눅스 시작 | Ubuntu | 광범위한 커뮤니티, 풍부한 문서 |\n| 기업 서버 운영 | RHEL / Rocky Linux | 안정성, 기업 지원 |\n| 최신 패키지 필요 | Fedora | 최신 기술 선도 |\n| 고성능 데스크톱 | Arch Linux | 완전한 커스터마이징 |\n| 개발 환경 | Ubuntu / Debian | 풍부한 개발 도구 |\n\n---\n\n## 1.5 리눅스를 배워야 하는 이유\n\n### 서버 시장 점유율\n\n```\n전 세계 서버 운영체제 시장 (2024):\nLinux    ████████████████████████ 96.3%\nWindows  ██ 1.9%\n기타     ▌ 1.8%\n\n클라우드 VM 사용 비율:\nAWS EC2   Linux 기반 인스턴스: 92%\nAzure     Linux VM: 60% 이상\nGCP       Linux 기반: 85%\n```\n\n### 취업 시장에서의 가치\n\n- **DevOps / 클라우드 엔지니어**: Linux 필수 역량\n- **백엔드 개발자**: 서버 배포/운영에 필수\n- **데이터 엔지니어**: Hadoop, Spark 등 빅데이터 플랫폼\n- **보안 전문가**: 침투 테스트 도구 대부분 Linux 기반\n- **임베디드 개발자**: Android, IoT 기기 모두 Linux 커널\n\n### 개발자 도구 생태계\n\n```bash\n# 현대 개발에 필수적인 Linux 기반 도구들\nDocker      # 컨테이너 가상화\nKubernetes  # 컨테이너 오케스트레이션\nGit         # 버전 관리\nNginx       # 웹 서버\nMySQL/PostgreSQL  # 데이터베이스\nPython/Node.js    # 서버사이드 개발\n```\n\n---\n\n## 1.6 오픈소스 라이선스 이해\n\n### 주요 오픈소스 라이선스\n\n| 라이선스 | 특징 | 대표 소프트웨어 |\n|----------|------|----------------|\n| GPL v2/v3 | 수정 시 동일 라이선스 적용 | Linux 커널, GCC |\n| LGPL | 라이브러리 링크는 자유 | glibc |\n| MIT | 가장 자유로운 라이선스 | X11, jQuery |\n| Apache 2.0 | 특허권 명시 | Kubernetes, Android |\n| BSD | MIT와 유사, 광고 조항 | FreeBSD, PostgreSQL |\n\n### GPL의 중요성\n\nLinux 커널은 **GPL v2** 라이선스입니다. 이는:\n- 소스코드를 자유롭게 사용, 수정, 배포 가능\n- 수정한 코드도 GPL로 공개해야 함 (카피레프트)\n- 상업적 사용 가능하나 소스 공개 의무\n\n---\n\n## 핵심 요약\n\n- **Linux**는 1991년 Linus Torvalds가 개발한 오픈소스 운영체제 커널\n- **GNU/Linux**는 GNU 도구 + Linux 커널의 조합\n- **Ubuntu**는 Debian 기반의 사용자 친화적 배포판, 6개월 주기 출시\n- **LTS 버전**은 5년간 장기 지원, 서버 환경에 권장\n- 전 세계 서버의 96% 이상이 Linux 기반으로 운영\n- 현대 개발자에게 Linux는 선택이 아닌 필수 역량\n", "# 챕터 2: 우분투 설치와 환경 설정\n\n> 다양한 방법으로 우분투를 설치하고 개발 환경을 구성한다\n\n## 학습 목표\n- 가상머신, WSL, 듀얼부트 등 설치 방법을 이해한다\n- 우분투 초기 설정을 완료할 수 있다\n- 패키지 업데이트와 기본 도구를 설치할 수 있다\n- 개발에 적합한 환경을 구성할 수 있다\n\n---\n\n## 2.1 설치 방법 비교\n\n### 어떤 방법을 선택할까?\n\n```\n┌─────────────────────────────────────────────────────┐\n│                설치 방법 선택 가이드                  │\n├─────────────────┬────────────┬──────────────────────┤\n│ 방법            │ 난이도     │ 추천 대상            │\n├─────────────────┼────────────┼──────────────────────┤\n│ WSL2 (Windows)  │ ★☆☆☆☆    │ Windows 사용자 입문  │\n│ VirtualBox/VMware│ ★★☆☆☆   │ 안전하게 실습        │\n│ 듀얼부트        │ ★★★☆☆    │ 실제 성능 필요       │\n│ 단독 설치       │ ★★★★☆    │ 전용 리눅스 환경     │\n│ 클라우드 (AWS)  │ ★★☆☆☆    │ 서버 학습            │\n└─────────────────┴────────────┴──────────────────────┘\n```\n\n---\n\n## 2.2 WSL2로 우분투 설치 (Windows)\n\n### WSL2 설치 (Windows 10/11)\n\n```powershell\n# PowerShell 관리자 권한으로 실행\n\n# WSL 활성화 및 Ubuntu 설치 (한 번에)\nwsl --install\n\n# 또는 특정 버전 지정\nwsl --install -d Ubuntu-22.04\n\n# 설치 가능한 배포판 목록 확인\nwsl --list --online\n\n# 설치된 배포판 확인\nwsl --list --verbose\n```\n\n### WSL2 초기 설정\n\n```bash\n# 첫 실행 시 사용자 이름과 비밀번호 설정\nEnter new UNIX username: student\nNew password: ****\nRetype new password: ****\n\n# 시스템 업데이트\nsudo apt update && sudo apt upgrade -y\n```\n\n### WSL2 설정 파일 최적화\n\n```ini\n# %USERPROFILE%\\.wslconfig 파일 생성 (Windows)\n[wsl2]\nmemory=4GB          # 메모리 제한\nprocessors=2        # CPU 코어 수\nswap=2GB            # 스왑 메모리\n```\n\n---\n\n## 2.3 VirtualBox로 우분투 설치\n\n### 우분투 ISO 다운로드\n\n```\n공식 다운로드: https://ubuntu.com/download/server\n추천 버전: Ubuntu 22.04 LTS Server\n\n파일명: ubuntu-22.04.4-live-server-amd64.iso\n크기: 약 1.8GB\n```\n\n### VirtualBox 가상머신 설정\n\n```\n권장 사양:\n- 메모리: 2GB 이상 (서버), 4GB 이상 (데스크톱)\n- 저장소: 20GB 이상 (동적 할당)\n- 네트워크: NAT 또는 브리지 어댑터\n- CPU: 2코어 이상\n```\n\n### 설치 과정 주요 단계\n\n```\n1. 언어 선택: English (Korean은 서버에서 인코딩 문제 발생 가능)\n2. 키보드 레이아웃: Korean 또는 English(US)\n3. 네트워크 설정: DHCP 자동 설정\n4. 저장소 설정: 전체 디스크 사용\n5. 프로필 설정: 사용자명, 서버명, 비밀번호\n6. SSH 설치: Install OpenSSH server 체크\n7. 추가 패키지: 필요에 따라 선택\n```\n\n---\n\n## 2.4 우분투 초기 설정\n\n### 시스템 업데이트\n\n```bash\n# 패키지 목록 업데이트\nsudo apt update\n\n# 설치된 패키지 업그레이드\nsudo apt upgrade -y\n\n# 커널 포함 전체 업그레이드\nsudo apt full-upgrade -y\n\n# 불필요한 패키지 제거\nsudo apt autoremove -y\nsudo apt autoclean\n```\n\n### 타임존 설정\n\n```bash\n# 현재 타임존 확인\ntimedatectl\n\n# 타임존 목록 확인\ntimedatectl list-timezones | grep Seoul\n\n# 한국 시간으로 설정\nsudo timedatectl set-timezone Asia/Seoul\n\n# 확인\ndate\n# Mon Jan 15 14:30:00 KST 2024\n```\n\n### 로케일 설정\n\n```bash\n# 현재 로케일 확인\nlocale\n\n# 한국어 로케일 추가 (선택사항, 서버는 영어 권장)\nsudo locale-gen ko_KR.UTF-8\nsudo update-locale LANG=ko_KR.UTF-8\n\n# 영어 로케일 유지 (서버 권장)\nsudo update-locale LANG=en_US.UTF-8\n```\n\n### 호스트명 설정\n\n```bash\n# 현재 호스트명 확인\nhostname\nhostnamectl\n\n# 호스트명 변경\nsudo hostnamectl set-hostname ubuntu-server\n\n# /etc/hosts 파일도 업데이트\nsudo nano /etc/hosts\n# 127.0.1.1 ubuntu-server 추가 또는 수정\n```\n\n---\n\n## 2.5 필수 패키지 설치\n\n### 개발 도구 설치\n\n```bash\n# 빌드 필수 도구 (gcc, make, g++ 등)\nsudo apt install -y build-essential\n\n# 버전 관리\nsudo apt install -y git\n\n# 텍스트 편집기\nsudo apt install -y vim nano\n\n# 네트워크 도구\nsudo apt install -y curl wget net-tools\n\n# 시스템 모니터링\nsudo apt install -y htop tree\n\n# 압축 도구\nsudo apt install -y zip unzip tar\n\n# Python 개발\nsudo apt install -y python3 python3-pip python3-venv\n\n# 한 번에 설치\nsudo apt install -y \\\n  build-essential git vim nano curl wget \\\n  net-tools htop tree zip unzip \\\n  python3 python3-pip python3-venv\n```\n\n### 설치 확인\n\n```bash\n# 각 도구 버전 확인\ngcc --version\ngit --version\npython3 --version\ncurl --version\n```\n\n---\n\n## 2.6 SSH 서버 설정\n\n### OpenSSH 서버 설치\n\n```bash\n# SSH 서버 설치\nsudo apt install -y openssh-server\n\n# 서비스 상태 확인\nsudo systemctl status ssh\n\n# 서비스 시작/활성화\nsudo systemctl start ssh\nsudo systemctl enable ssh\n```\n\n### SSH 설정 파일 수정\n\n```bash\nsudo nano /etc/ssh/sshd_config\n```\n\n```ini\n# 주요 보안 설정\nPort 22                          # SSH 포트 (변경 권장)\nPermitRootLogin no               # root 직접 로그인 금지\nPasswordAuthentication yes       # 비밀번호 인증 (키 설정 후 no로 변경)\nPubkeyAuthentication yes         # 공개키 인증 허용\nMaxAuthTries 3                   # 최대 로그인 시도 횟수\nAllowUsers student               # 허용할 사용자 지정\n```\n\n```bash\n# 설정 적용\nsudo systemctl restart ssh\n```\n\n### 방화벽 기본 설정\n\n```bash\n# UFW 활성화\nsudo ufw enable\n\n# SSH 허용\nsudo ufw allow ssh\n# 또는 포트 번호로\nsudo ufw allow 22/tcp\n\n# 상태 확인\nsudo ufw status verbose\n```\n\n---\n\n## 2.7 쉘 환경 설정\n\n### Bash 설정 파일 구조\n\n```\n~/.bashrc        # 인터랙티브 쉘 설정 (매번 로드)\n~/.bash_profile  # 로그인 쉘 설정 (로그인 시 한 번)\n~/.bash_aliases  # 별칭 모음 (별도 파일로 관리 권장)\n/etc/bash.bashrc # 전체 사용자 Bash 설정\n/etc/profile     # 전체 사용자 로그인 설정\n```\n\n### .bashrc 커스터마이징\n\n```bash\n# ~/.bashrc에 추가\n\n# 색상 프롬프트 설정\nPS1='\\[\\033[01;32m\\]\\u@\\h\\[\\033[00m\\]:\\[\\033[01;34m\\]\\w\\[\\033[00m\\]\\$ '\n\n# 유용한 별칭 설정\nalias ll='ls -alF'\nalias la='ls -A'\nalias l='ls -CF'\nalias ..='cd ..'\nalias ...='cd ../..'\nalias grep='grep --color=auto'\nalias df='df -h'\nalias du='du -h'\nalias free='free -h'\n\n# 히스토리 설정\nHISTSIZE=10000\nHISTFILESIZE=20000\nHISTCONTROL=ignoredups:erasedups\n\n# 설정 즉시 적용\nsource ~/.bashrc\n```\n\n### Oh My Bash 설치 (선택사항)\n\n```bash\n# Oh My Bash 설치\nbash -c \"$(curl -fsSL https://raw.githubusercontent.com/ohmybash/oh-my-bash/master/tools/install.sh)\"\n```\n\n---\n\n## 2.8 네트워크 연결 확인\n\n### 기본 네트워크 확인\n\n```bash\n# IP 주소 확인\nip addr show\n# 또는\nhostname -I\n\n# 네트워크 인터페이스 목록\nip link show\n\n# 기본 게이트웨이 확인\nip route show\n\n# DNS 서버 확인\ncat /etc/resolv.conf\n\n# 인터넷 연결 테스트\nping -c 4 google.com\ncurl -I https://ubuntu.com\n```\n\n### 고정 IP 설정 (선택사항)\n\n```yaml\n# /etc/netplan/00-installer-config.yaml\nnetwork:\n  version: 2\n  renderer: networkd\n  ethernets:\n    ens33:\n      addresses:\n        - 192.168.1.100/24\n      nameservers:\n        addresses: [8.8.8.8, 8.8.4.4]\n      routes:\n        - to: default\n          via: 192.168.1.1\n```\n\n```bash\n# 설정 적용\nsudo netplan apply\n```\n\n---\n\n## 핵심 요약\n\n- **WSL2**는 Windows에서 가장 쉽게 우분투를 시작하는 방법\n- **초기 설정**: 시스템 업데이트 → 타임존 → 호스트명 순서로 진행\n- **필수 패키지**: build-essential, git, curl, vim, python3는 기본으로 설치\n- **SSH 서버**: 원격 접속을 위해 설치하고 보안 설정 필수\n- **.bashrc 커스터마이징**으로 생산성 향상 가능\n- 서버 환경에서는 **영어 로케일** 유지를 권장\n", "# 챕터 3: 터미널과 기본 명령어\n\n> 리눅스 쉘을 자유자재로 다루는 첫걸음\n\n## 학습 목표\n- 쉘의 개념과 종류를 이해한다\n- 파일과 디렉토리를 다루는 필수 명령어를 익힌다\n- 파이프와 리다이렉션을 활용할 수 있다\n- 텍스트 처리 명령어를 실무에 적용할 수 있다\n\n---\n\n## 3.1 쉘(Shell) 이해\n\n### 쉘이란?\n\n```\n사용자 입력\n    ↓\n┌─────────────┐\n│   Shell     │  ← 명령어 해석기 (bash, zsh, fish)\n│  (해석/실행) │\n└─────────────┘\n    ↓\n┌─────────────┐\n│   Kernel    │  ← 실제 실행\n└─────────────┘\n    ↓\n  결과 출력\n```\n\n### 주요 쉘 비교\n\n| 쉘 | 특징 | 기본 설정 |\n|----|------|-----------|\n| **bash** | 가장 범용적, 스크립트 호환성 최고 | Ubuntu 기본 |\n| **zsh** | bash 호환 + 강력한 자동완성 | macOS 기본 |\n| **fish** | 현대적 UX, 문법이 달라 호환성 낮음 | - |\n| **sh** | POSIX 표준, 최소 기능 | 스크립트용 |\n\n```bash\n# 현재 사용 중인 쉘 확인\necho $SHELL\necho $0\n\n# 사용 가능한 쉘 목록\ncat /etc/shells\n\n# 기본 쉘 변경\nchsh -s /bin/zsh\n```\n\n---\n\n## 3.2 파일과 디렉토리 명령어\n\n### 현재 위치와 이동\n\n```bash\n# 현재 디렉토리 출력 (Print Working Directory)\npwd\n# /home/student\n\n# 디렉토리 이동 (Change Directory)\ncd /var/log          # 절대 경로\ncd Documents         # 상대 경로\ncd ..                # 상위 디렉토리\ncd ~                 # 홈 디렉토리\ncd -                 # 이전 디렉토리\n```\n\n### 파일 목록 확인\n\n```bash\n# 기본 목록\nls\n\n# 자세한 정보 (권한, 크기, 날짜)\nls -l\n\n# 숨김 파일 포함\nls -la\n\n# 사람이 읽기 쉬운 크기\nls -lh\n\n# 시간순 정렬 (최신 먼저)\nls -lt\n\n# 재귀적으로 하위 디렉토리 포함\nls -lR\n\n# 파일 유형 표시 (/ = 디렉토리, * = 실행파일)\nls -F\n```\n\n```\nls -la 출력 해석:\ndrwxr-xr-x  2 student student 4096 Jan 15 10:00 Documents\n│││││││││   │ │       │       │    │             └─ 파일명\n│││││││││   │ │       │       │    └─────────────── 수정 시간\n│││││││││   │ │       │       └──────────────────── 파일 크기(bytes)\n│││││││││   │ │       └──────────────────────────── 그룹명\n│││││││││   │ └──────────────────────────────────── 소유자\n│││││││││   └────────────────────────────────────── 하드링크 수\n│└────────────────────────────────────────────────── 권한 (rwxr-xr-x)\n└─────────────────────────────────────────────────── 파일 유형 (d=디렉토리)\n```\n\n### 디렉토리 생성과 삭제\n\n```bash\n# 디렉토리 생성\nmkdir project\nmkdir -p project/src/main    # 중간 디렉토리 자동 생성\n\n# 디렉토리 삭제\nrmdir empty_dir              # 빈 디렉토리만 삭제\nrm -r directory              # 디렉토리와 내용 모두 삭제\nrm -rf directory             # 강제 삭제 (주의!)\n```\n\n### 파일 생성, 복사, 이동, 삭제\n\n```bash\n# 빈 파일 생성 / 타임스탬프 업데이트\ntouch newfile.txt\ntouch -t 202401150900 file.txt  # 특정 시간으로 설정\n\n# 파일 복사\ncp source.txt dest.txt\ncp -r src_dir dest_dir      # 디렉토리 복사\ncp -p file.txt backup.txt   # 권한/시간 유지하며 복사\n\n# 파일 이동 (이름 변경)\nmv old.txt new.txt\nmv file.txt /tmp/\n\n# 파일 삭제\nrm file.txt\nrm -i file.txt              # 삭제 전 확인\nrm -f file.txt              # 강제 삭제\n```\n\n---\n\n## 3.3 파일 내용 확인\n\n```bash\n# 전체 출력\ncat file.txt\ncat -n file.txt             # 줄 번호 포함\n\n# 페이지 단위로 보기\nless file.txt               # q로 종료, /로 검색\nmore file.txt               # 위로 못 올라감\n\n# 앞부분만 보기\nhead file.txt               # 기본 10줄\nhead -n 20 file.txt         # 20줄\nhead -c 100 file.txt        # 100 바이트\n\n# 뒷부분만 보기\ntail file.txt               # 기본 10줄\ntail -n 20 file.txt\ntail -f /var/log/syslog     # 실시간 추적 (로그 모니터링)\ntail -F logfile             # 파일 재생성 시도 포함\n\n# 파일 정보\nfile document.txt           # 파일 유형 확인\nwc file.txt                 # 줄/단어/바이트 수\nwc -l file.txt              # 줄 수만\n```\n\n---\n\n## 3.4 검색 명령어\n\n### grep - 텍스트 검색\n\n```bash\n# 기본 검색\ngrep \"error\" logfile.txt\n\n# 대소문자 무시\ngrep -i \"Error\" logfile.txt\n\n# 줄 번호 표시\ngrep -n \"error\" logfile.txt\n\n# 매칭되지 않는 줄 출력\ngrep -v \"debug\" logfile.txt\n\n# 재귀적 검색\ngrep -r \"TODO\" ./src/\n\n# 정규식 사용\ngrep -E \"error|warning\" logfile.txt\ngrep -E \"^[0-9]+\" file.txt\n\n# 주변 문맥 출력\ngrep -A 2 -B 2 \"error\" logfile.txt  # 전후 2줄\n\n# 단어 단위 검색\ngrep -w \"log\" file.txt\n```\n\n### find - 파일 검색\n\n```bash\n# 이름으로 찾기\nfind /home -name \"*.txt\"\nfind . -name \"config*\"\n\n# 파일 유형으로 찾기\nfind /var -type f           # 일반 파일\nfind /etc -type d           # 디렉토리\nfind /tmp -type l           # 심볼릭 링크\n\n# 크기로 찾기\nfind / -size +100M          # 100MB 초과\nfind . -size -10k           # 10KB 미만\n\n# 날짜로 찾기\nfind /var/log -mtime -7     # 7일 이내 수정\nfind /tmp -atime +30        # 30일 이상 미접근\n\n# 권한으로 찾기\nfind / -perm 777            # 권한이 777인 파일\nfind / -perm /4000          # setuid 비트 설정 파일\n\n# 찾은 파일에 명령 실행\nfind . -name \"*.log\" -exec rm {} \\;\nfind . -name \"*.txt\" -exec grep -l \"error\" {} \\;\n```\n\n---\n\n## 3.5 파이프와 리다이렉션\n\n### 리다이렉션\n\n```bash\n# 표준 출력을 파일로 저장\nls -l > filelist.txt        # 덮어쓰기\nls -l >> filelist.txt       # 이어쓰기\n\n# 표준 에러를 파일로 저장\nls /nonexist 2> error.txt\n\n# 출력과 에러 모두 저장\ncommand > output.txt 2>&1\ncommand &> output.txt       # 위와 동일\n\n# 파일을 입력으로 사용\nsort < unsorted.txt\n\n# /dev/null로 버리기\ncommand > /dev/null 2>&1\n```\n\n### 파이프(|)\n\n```bash\n# 명령어 출력을 다음 명령어 입력으로 연결\nls -l | grep \".txt\"\n\n# 여러 명령어 연결\ncat /etc/passwd | grep \"student\" | cut -d: -f1,3\n\n# 정렬과 중복 제거\ncat words.txt | sort | uniq\n\n# 프로세스 찾기\nps aux | grep nginx\n\n# 파일 수 세기\nls | wc -l\n\n# 상위 10개 큰 파일\ndu -sh /* 2>/dev/null | sort -rh | head -10\n```\n\n---\n\n## 3.6 텍스트 처리 명령어\n\n### sort, uniq\n\n```bash\n# 정렬\nsort file.txt               # 알파벳순\nsort -r file.txt            # 역순\nsort -n numbers.txt         # 숫자순\nsort -k 2 file.txt          # 2번째 컬럼 기준\n\n# 중복 제거 (sort 후 사용)\nsort file.txt | uniq\nsort file.txt | uniq -c     # 중복 횟수 포함\nsort file.txt | uniq -d     # 중복된 항목만\n```\n\n### cut, awk\n\n```bash\n# 특정 컬럼 추출\ncut -d: -f1 /etc/passwd         # : 구분자의 1번째 필드\ncut -d, -f2,3 data.csv          # CSV 2,3번째 필드\ncut -c1-10 file.txt             # 1~10번째 문자\n\n# awk - 강력한 텍스트 처리\nawk '{print $1}' file.txt           # 1번째 컬럼\nawk -F: '{print $1,$3}' /etc/passwd # : 구분자\nawk 'NR==5' file.txt                # 5번째 줄\nawk '$3 > 100' data.txt             # 조건 필터\nawk '{sum += $1} END {print sum}' numbers.txt  # 합계\n```\n\n### sed - 스트림 편집기\n\n```bash\n# 치환\nsed 's/old/new/' file.txt          # 첫 번째만\nsed 's/old/new/g' file.txt         # 전체\nsed 's/old/new/gi' file.txt        # 대소문자 무시\n\n# 특정 줄 삭제\nsed '3d' file.txt                  # 3번째 줄 삭제\nsed '/pattern/d' file.txt          # 패턴 매칭 줄 삭제\n\n# 파일 직접 수정\nsed -i 's/http/https/g' config.txt\n\n# 특정 줄 출력\nsed -n '5,10p' file.txt            # 5~10번째 줄\n```\n\n---\n\n## 3.7 유용한 단축키와 팁\n\n### Bash 단축키\n\n| 단축키 | 기능 |\n|--------|------|\n| `Ctrl+C` | 현재 명령어 중단 |\n| `Ctrl+Z` | 백그라운드로 보내기 (정지) |\n| `Ctrl+D` | 로그아웃 / EOF |\n| `Ctrl+L` | 화면 지우기 (clear) |\n| `Ctrl+A` | 줄 맨 앞으로 |\n| `Ctrl+E` | 줄 맨 뒤로 |\n| `Ctrl+R` | 히스토리 검색 |\n| `Tab` | 자동 완성 |\n| `!!` | 이전 명령어 재실행 |\n| `!$` | 이전 명령어의 마지막 인자 |\n\n### 히스토리 활용\n\n```bash\n# 히스토리 목록\nhistory\nhistory | tail -20\n\n# 히스토리에서 실행\n!123                    # 123번 명령어 실행\n!git                    # git으로 시작하는 최근 명령어\n\n# 히스토리 검색\nCtrl+R → 검색어 입력\n```\n\n### 명령어 치환\n\n```bash\n# 명령어 결과를 변수에 저장\nTODAY=$(date +%Y%m%d)\nFILES=$(ls *.txt)\necho \"오늘 날짜: $TODAY\"\n\n# 백틱 방식 (구식)\nTODAY=`date +%Y%m%d`\n```\n\n---\n\n## 핵심 요약\n\n| 명령어 | 주요 용도 |\n|--------|-----------|\n| `ls -la` | 파일 목록 (상세) |\n| `cd`, `pwd` | 디렉토리 이동/확인 |\n| `cp`, `mv`, `rm` | 파일 조작 |\n| `cat`, `less`, `tail -f` | 파일 내용 보기 |\n| `grep` | 텍스트 검색 |\n| `find` | 파일 검색 |\n| `\\|`, `>`, `>>` | 파이프/리다이렉션 |\n| `awk`, `sed` | 텍스트 처리 |\n", "# 챕터 4: 파일시스템 구조와 관리\n\n> 리눅스 파일시스템의 구조를 이해하고 디스크를 관리한다\n\n## 학습 목표\n- 리눅스 FHS(Filesystem Hierarchy Standard)를 이해한다\n- 디스크 파티션과 마운트 개념을 익힌다\n- 디스크 사용량을 확인하고 관리할 수 있다\n- 심볼릭 링크와 하드 링크를 이해한다\n\n---\n\n## 4.1 리눅스 디렉토리 구조 (FHS)\n\n### 최상위 디렉토리 구조\n\n```\n/ (루트)\n├── bin/      → 기본 명령어 바이너리 (ls, cp, mv 등)\n├── sbin/     → 시스템 관리 명령어 (fdisk, mkfs 등)\n├── boot/     → 부트로더, 커널 이미지\n├── dev/      → 장치 파일 (디스크, 터미널 등)\n├── etc/      → 시스템 설정 파일\n├── home/     → 사용자 홈 디렉토리\n├── lib/      → 공유 라이브러리\n├── media/    → 이동식 미디어 마운트 포인트\n├── mnt/      → 임시 마운트 포인트\n├── opt/      → 선택적 소프트웨어 패키지\n├── proc/     → 프로세스/커널 정보 (가상 파일시스템)\n├── root/     → root 사용자 홈 디렉토리\n├── run/      → 런타임 데이터\n├── srv/      → 서비스 데이터\n├── sys/      → 시스템/커널 정보 (가상 파일시스템)\n├── tmp/      → 임시 파일 (재부팅 시 삭제)\n├── usr/      → 사용자 프로그램과 데이터\n│   ├── bin/      → 사용자 명령어\n│   ├── lib/      → 라이브러리\n│   ├── local/    → 로컬 설치 소프트웨어\n│   └── share/    → 공유 데이터\n└── var/      → 가변 데이터 (로그, 캐시, 스풀)\n    ├── log/      → 시스템 로그\n    ├── cache/    → 캐시 데이터\n    └── www/      → 웹 서버 파일\n```\n\n### 주요 디렉토리 상세 설명\n\n```bash\n# /etc - 시스템 설정 파일\n/etc/passwd         # 사용자 계정 정보\n/etc/shadow         # 비밀번호 (암호화)\n/etc/group          # 그룹 정보\n/etc/hosts          # 호스트명-IP 매핑\n/etc/fstab          # 파일시스템 마운트 설정\n/etc/crontab        # 예약 작업\n/etc/ssh/           # SSH 설정\n/etc/apt/           # APT 패키지 관리자 설정\n\n# /proc - 프로세스 정보 (메모리에 존재)\ncat /proc/cpuinfo   # CPU 정보\ncat /proc/meminfo   # 메모리 정보\ncat /proc/version   # 커널 버전\ncat /proc/1/status  # PID 1번 프로세스 상태\n\n# /dev - 장치 파일\n/dev/sda            # 첫 번째 SATA 디스크\n/dev/sda1           # 첫 번째 파티션\n/dev/nvme0n1        # NVMe SSD\n/dev/tty            # 터미널\n/dev/null           # 블랙홀 (버리기)\n/dev/zero           # 0 무한 제공\n/dev/random         # 난수 생성\n```\n\n---\n\n## 4.2 리눅스 파일시스템 유형\n\n### 주요 파일시스템\n\n| 파일시스템 | 특징 | 용도 |\n|-----------|------|------|\n| **ext4** | 리눅스 표준, 안정적 | 일반 용도 기본 |\n| **xfs** | 대용량, 고성능 | 대규모 파일 서버 |\n| **btrfs** | 스냅샷, 압축 지원 | 현대적 기능 필요 시 |\n| **tmpfs** | 메모리 기반 | /tmp, /run |\n| **vfat** | FAT32 호환 | USB, 부팅 파티션 |\n| **ntfs** | Windows 호환 | Windows 파티션 읽기 |\n\n### 파일시스템 확인\n\n```bash\n# 파티션과 파일시스템 확인\nlsblk\nlsblk -f\n\n# 마운트된 파일시스템 목록\ndf -h\nfindmnt\n\n# 파일시스템 유형 확인\ndf -T\nblkid /dev/sda1\n```\n\n---\n\n## 4.3 디스크 파티션 관리\n\n### 파티션 구조\n\n```\n물리 디스크 (/dev/sda)\n┌────────────────────────────────────────┐\n│ MBR/GPT │ 파티션1  │ 파티션2  │ 파티션3 │\n│         │ /dev/sda1│ /dev/sda2│/dev/sda3│\n│         │ /boot    │ swap     │ /       │\n└────────────────────────────────────────┘\n```\n\n### fdisk로 파티션 관리\n\n```bash\n# 디스크 목록 확인\nsudo fdisk -l\n\n# 특정 디스크 파티션 확인\nsudo fdisk -l /dev/sdb\n\n# 파티션 작업 (대화형)\nsudo fdisk /dev/sdb\n# p: 파티션 목록\n# n: 새 파티션 생성\n# d: 파티션 삭제\n# t: 파티션 유형 변경\n# w: 저장 후 종료\n# q: 저장 없이 종료\n```\n\n### parted로 파티션 관리 (GPT 권장)\n\n```bash\n# GPT 파티션 테이블 생성\nsudo parted /dev/sdb mklabel gpt\n\n# 파티션 생성\nsudo parted /dev/sdb mkpart primary ext4 0% 100%\n\n# 파티션 목록 확인\nsudo parted /dev/sdb print\n```\n\n### 파일시스템 생성 (포맷)\n\n```bash\n# ext4 파일시스템 생성\nsudo mkfs.ext4 /dev/sdb1\n\n# xfs 파일시스템 생성\nsudo mkfs.xfs /dev/sdb1\n\n# 레이블 지정\nsudo mkfs.ext4 -L \"mydata\" /dev/sdb1\n```\n\n---\n\n## 4.4 마운트와 언마운트\n\n### 마운트 개념\n\n```\n장치 파일         마운트 포인트      접근 경로\n/dev/sdb1  →  /mnt/data 로 마운트 →  /mnt/data/files\n```\n\n### 임시 마운트\n\n```bash\n# 마운트 포인트 생성\nsudo mkdir -p /mnt/data\n\n# 마운트\nsudo mount /dev/sdb1 /mnt/data\n\n# 마운트 확인\nmount | grep sdb1\ndf -h /mnt/data\n\n# 언마운트\nsudo umount /mnt/data\n# 또는\nsudo umount /dev/sdb1\n\n# 강제 언마운트 (사용 중일 때)\nsudo umount -f /mnt/data\nsudo umount -l /mnt/data  # lazy unmount\n```\n\n### 영구 마운트 (/etc/fstab)\n\n```bash\n# UUID 확인 (UUID 사용 권장, 디바이스명 변경 가능)\nsudo blkid /dev/sdb1\n\n# /etc/fstab 편집\nsudo nano /etc/fstab\n```\n\n```\n# /etc/fstab 형식:\n# <장치>                <마운트포인트>  <유형>  <옵션>         <dump> <pass>\nUUID=xxxxxxxx-xxxx...  /mnt/data       ext4    defaults        0      2\n/dev/sdb1              /mnt/backup     xfs     defaults,noatime 0     2\ntmpfs                  /tmp            tmpfs   defaults,size=1G 0     0\n```\n\n```bash\n# fstab 설정 테스트\nsudo mount -a\n\n# 특정 항목만 마운트\nsudo mount /mnt/data\n```\n\n---\n\n## 4.5 디스크 사용량 확인\n\n### df - 파일시스템 사용량\n\n```bash\n# 기본 출력\ndf -h\n\n# 특정 디렉토리\ndf -h /home\n\n# 파일시스템 유형 포함\ndf -hT\n\n# inode 사용량\ndf -i\n```\n\n```\n출력 예:\nFilesystem      Size  Used Avail Use% Mounted on\n/dev/sda1        20G  8.5G  10G  46%  /\ntmpfs           2.0G  1.2M  2.0G   1% /tmp\n/dev/sdb1        50G   12G  38G  24%  /mnt/data\n```\n\n### du - 디렉토리 사용량\n\n```bash\n# 현재 디렉토리 전체 크기\ndu -sh .\n\n# 하위 디렉토리별 크기\ndu -h --max-depth=1 /var\n\n# 상위 10개 큰 디렉토리\ndu -h /var | sort -rh | head -10\n\n# 특정 패턴 제외\ndu -sh --exclude=*.log /var/log\n\n# 파일별 크기\ndu -ah /etc | sort -rh | head -20\n```\n\n### ncdu - 대화형 디스크 사용량 분석\n\n```bash\n# 설치\nsudo apt install ncdu\n\n# 실행\nncdu /\nncdu /home\n\n# 조작: j/k 또는 화살표로 이동, d로 삭제, q로 종료\n```\n\n---\n\n## 4.6 스왑(Swap) 관리\n\n### 스왑 파일 생성\n\n```bash\n# 2GB 스왑 파일 생성\nsudo fallocate -l 2G /swapfile\n\n# 권한 설정\nsudo chmod 600 /swapfile\n\n# 스왑 파일시스템 설정\nsudo mkswap /swapfile\n\n# 스왑 활성화\nsudo swapon /swapfile\n\n# 스왑 확인\nswapon --show\nfree -h\n```\n\n```bash\n# 영구 설정 (/etc/fstab)\n/swapfile  none  swap  sw  0  0\n```\n\n---\n\n## 4.7 링크 (Link)\n\n### 하드 링크 vs 심볼릭 링크\n\n```\n하드 링크:\n원본파일 ──┐\n           ├── inode (실제 데이터)\n하드링크 ──┘\n\n심볼릭 링크:\n심볼릭링크 → 원본파일경로 → inode (실제 데이터)\n```\n\n### 하드 링크\n\n```bash\n# 하드 링크 생성\nln original.txt hardlink.txt\n\n# 확인 (inode 번호 동일)\nls -li original.txt hardlink.txt\n\n# 특징\n# - 같은 파일시스템만 가능\n# - 디렉토리 불가\n# - 원본 삭제해도 데이터 유지\n```\n\n### 심볼릭 링크\n\n```bash\n# 심볼릭 링크 생성\nln -s /path/to/original symlink\n\n# 현재 디렉토리에 생성\nln -s /usr/local/bin/python3.11 python3\n\n# 확인\nls -la symlink\n# symlink -> /path/to/original\n\n# 링크 삭제 (원본 유지)\nrm symlink\nunlink symlink\n\n# 끊어진 링크 찾기\nfind . -type l ! -e\n```\n\n### 실용적인 심볼릭 링크 활용\n\n```bash\n# 버전 관리\nln -s /opt/python3.11 /usr/local/bin/python3\n\n# 설정 파일 관리\nln -s ~/dotfiles/.bashrc ~/.bashrc\n\n# 웹 서버 공개 디렉토리\nsudo ln -s /var/www/myapp/public /var/www/html/myapp\n```\n\n---\n\n## 4.8 파일시스템 점검과 복구\n\n```bash\n# 파일시스템 점검 (언마운트 상태에서)\nsudo fsck /dev/sdb1\nsudo fsck.ext4 -f /dev/sdb1\n\n# ext4 파일시스템 정보 확인\nsudo tune2fs -l /dev/sda1\n\n# 저널 로그 확인\nsudo dumpe2fs /dev/sda1 | grep -i journal\n```\n\n---\n\n## 핵심 요약\n\n- **FHS**: / 하위의 bin, etc, home, var 등 표준 디렉토리 구조\n- **파티션**: fdisk(MBR), parted(GPT)로 관리\n- **마운트**: mount 명령어, /etc/fstab으로 영구 설정\n- **df**: 파일시스템 전체 사용량, **du**: 디렉토리별 사용량\n- **심볼릭 링크**: 경로의 별칭, 버전 관리에 유용\n- **하드 링크**: 동일 inode를 가리키는 또 다른 이름\n", "# 챕터 5: 파일 권한과 사용자 관리\n\n> 리눅스 보안의 핵심, 권한 시스템과 사용자 관리\n\n## 학습 목표\n- 리눅스 파일 권한 체계를 완전히 이해한다\n- chmod, chown 명령어를 능숙하게 사용한다\n- 사용자와 그룹을 생성하고 관리할 수 있다\n- sudo 설정과 보안 모범 사례를 적용한다\n\n---\n\n## 5.1 파일 권한 이해\n\n### 권한 표기 방식\n\n```\nls -l 출력:\n-rwxr-xr--  1  student  devteam  4096  Jan 15  file.sh\n│└─┤└─┤└─┤     │        │\n│  │  │  │     │        └── 그룹명\n│  │  │  │     └─────────── 소유자\n│  │  │  └───────────────── other 권한 (r--)\n│  │  └──────────────────── group 권한 (r-x)\n│  └─────────────────────── owner 권한 (rwx)\n└────────────────────────── 파일 유형 (- = 일반파일)\n\n파일 유형:\n- : 일반 파일\nd : 디렉토리\nl : 심볼릭 링크\nc : 문자 장치\nb : 블록 장치\np : 파이프\ns : 소켓\n```\n\n### 권한의 의미\n\n| 권한 | 파일 | 디렉토리 |\n|------|------|---------|\n| r (4) | 읽기 가능 | 목록 조회 (ls) |\n| w (2) | 쓰기/수정 가능 | 파일 생성/삭제 |\n| x (1) | 실행 가능 | 진입 가능 (cd) |\n\n```\n8진수 표기:\nrwx = 4+2+1 = 7\nrw- = 4+2+0 = 6\nr-x = 4+0+1 = 5\nr-- = 4+0+0 = 4\n--- = 0+0+0 = 0\n\n예: rwxr-xr-- = 754\n     7   5   4\n```\n\n---\n\n## 5.2 chmod - 권한 변경\n\n### 8진수 방식\n\n```bash\n# rwxr-xr-- (소유자:모두, 그룹:읽기+실행, 기타:읽기만)\nchmod 754 file.txt\n\n# 일반적인 권한 설정\nchmod 644 document.txt    # rw-r--r-- (일반 파일)\nchmod 755 script.sh       # rwxr-xr-x (실행 파일)\nchmod 700 private.key     # rwx------ (개인 파일)\nchmod 777 public.txt      # rwxrwxrwx (모두 허용, 위험!)\n\n# 재귀적으로 적용\nchmod -R 755 /var/www/html\n```\n\n### 심볼릭 방식\n\n```bash\n# u=소유자, g=그룹, o=기타, a=모두\n# +=추가, -=제거, ==설정\n\n# 실행 권한 추가\nchmod +x script.sh\nchmod u+x script.sh       # 소유자에만\n\n# 쓰기 권한 제거\nchmod go-w sensitive.txt  # 그룹과 기타에서 쓰기 제거\n\n# 정확하게 설정\nchmod u=rw,go=r file.txt  # 소유자:rw, 나머지:r\n\n# 재귀적으로\nchmod -R u=rwX,go=rX /home/shared\n# X = 디렉토리이거나 이미 실행 권한이 있을 때만 x 설정\n```\n\n---\n\n## 5.3 chown, chgrp - 소유권 변경\n\n```bash\n# 소유자 변경 (root 권한 필요)\nsudo chown student file.txt\n\n# 소유자와 그룹 함께 변경\nsudo chown student:devteam file.txt\n\n# 그룹만 변경\nsudo chgrp devteam file.txt\n# 또는\nsudo chown :devteam file.txt\n\n# 재귀적 변경\nsudo chown -R www-data:www-data /var/www/html\n\n# 심볼릭 링크가 아닌 원본 파일 변경\nsudo chown -h student symlink\n```\n\n---\n\n## 5.4 특수 권한 비트\n\n### SetUID, SetGID, Sticky Bit\n\n```bash\n# SetUID (4000): 실행 시 파일 소유자 권한으로 실행\n# 예: /usr/bin/passwd (일반 사용자가 root 권한 파일 수정)\nchmod u+s file\nchmod 4755 file\nls -l file  # -rwsr-xr-x\n\n# SetGID (2000): 실행 시 그룹 권한으로 실행\n# 디렉토리에 설정 시 하위 파일이 같은 그룹 상속\nchmod g+s directory\nchmod 2755 directory\nls -l  # drwxr-sr-x\n\n# Sticky Bit (1000): 디렉토리에서 자신의 파일만 삭제 가능\n# 예: /tmp 디렉토리\nchmod +t /shared\nchmod 1777 /tmp\nls -l  # drwxrwxrwt\n```\n\n```bash\n# SetUID 설정된 파일 찾기 (보안 점검)\nfind / -perm /4000 -type f 2>/dev/null\nfind / -perm /2000 -type f 2>/dev/null\n```\n\n### umask - 기본 권한 마스크\n\n```bash\n# 현재 umask 확인\numask\n# 0022\n\n# umask 계산:\n# 파일 기본 권한: 666 - 022 = 644 (rw-r--r--)\n# 디렉토리 기본 권한: 777 - 022 = 755 (rwxr-xr-x)\n\n# umask 변경 (현재 세션)\numask 027   # 파일: 640, 디렉토리: 750\n\n# 영구 설정 (~/.bashrc)\necho \"umask 027\" >> ~/.bashrc\n```\n\n---\n\n## 5.5 사용자 계정 관리\n\n### 사용자 정보 파일\n\n```bash\n# /etc/passwd 구조\ncat /etc/passwd\n# username:x:UID:GID:comment:home:shell\n# student:x:1000:1000:Student User:/home/student:/bin/bash\n\n# /etc/shadow 구조 (root만 읽기 가능)\nsudo cat /etc/shadow\n# username:암호화된패스워드:최종변경일:최소:최대:경고:비활성:만료:예약\n\n# /etc/group 구조\ncat /etc/group\n# groupname:x:GID:members\n# devteam:x:1001:student,bob\n```\n\n### 사용자 추가\n\n```bash\n# 기본 사용자 추가 (홈 디렉토리 자동 생성)\nsudo useradd -m student\n\n# 상세 옵션으로 추가\nsudo useradd \\\n  -m \\                    # 홈 디렉토리 생성\n  -s /bin/bash \\          # 기본 쉘\n  -c \"Kim Student\" \\      # 코멘트 (이름)\n  -G sudo,docker \\        # 추가 그룹\n  student\n\n# 비밀번호 설정\nsudo passwd student\n\n# adduser (대화형, 더 친화적)\nsudo adduser newuser\n```\n\n### 사용자 수정\n\n```bash\n# 쉘 변경\nsudo usermod -s /bin/zsh student\n\n# 추가 그룹에 포함\nsudo usermod -aG docker student\nsudo usermod -aG sudo student\n\n# 홈 디렉토리 변경\nsudo usermod -d /new/home -m student\n\n# 계정 잠금\nsudo usermod -L student\nsudo passwd -l student\n\n# 계정 잠금 해제\nsudo usermod -U student\nsudo passwd -u student\n\n# 계정 만료 설정\nsudo usermod -e 2024-12-31 student\n```\n\n### 사용자 삭제\n\n```bash\n# 사용자 삭제 (홈 디렉토리 유지)\nsudo userdel student\n\n# 홈 디렉토리와 메일 스풀도 삭제\nsudo userdel -r student\n\n# 삭제 전 소유 파일 확인\nfind / -user student -type f 2>/dev/null\n```\n\n---\n\n## 5.6 그룹 관리\n\n```bash\n# 그룹 생성\nsudo groupadd devteam\nsudo groupadd -g 2000 devteam  # GID 지정\n\n# 그룹 수정\nsudo groupmod -n newname devteam   # 이름 변경\nsudo groupmod -g 2001 devteam      # GID 변경\n\n# 그룹 삭제\nsudo groupdel devteam\n\n# 사용자의 그룹 확인\ngroups student\nid student\n\n# 현재 사용자 그룹 정보\ngroups\nid\n```\n\n---\n\n## 5.7 sudo 설정\n\n### /etc/sudoers 파일\n\n```bash\n# visudo로 안전하게 편집 (문법 검사)\nsudo visudo\n\n# /etc/sudoers.d/에 별도 파일 생성 (권장)\nsudo visudo -f /etc/sudoers.d/student\n```\n\n```\n# /etc/sudoers 주요 구문\n\n# 사용자 권한\nstudent ALL=(ALL:ALL) ALL       # 모든 권한\nstudent ALL=(ALL) NOPASSWD: ALL # 비밀번호 없이\n\n# 특정 명령어만 허용\nstudent ALL=(ALL) /usr/bin/apt, /usr/bin/systemctl\n\n# 그룹 권한\n%sudo   ALL=(ALL:ALL) ALL       # sudo 그룹 전체\n%devteam ALL=(ALL) /usr/bin/docker\n\n# 별칭 정의\nCmnd_Alias WEBOPS = /usr/bin/systemctl restart nginx, \\\n                    /usr/bin/systemctl reload nginx\nstudent ALL=(ALL) WEBOPS\n```\n\n```bash\n# sudo 사용 예\nsudo apt update\nsudo -u www-data ls /var/www   # 다른 사용자로 실행\nsudo -i                        # root 쉘 (환경변수 포함)\nsudo -s                        # root 쉘 (현재 환경변수)\n\n# sudo 로그 확인\nsudo grep sudo /var/log/auth.log\n```\n\n---\n\n## 5.8 PAM과 계정 보안\n\n### 비밀번호 정책 설정\n\n```bash\n# PAM 모듈 설치\nsudo apt install libpam-pwquality\n\n# 비밀번호 정책 설정\nsudo nano /etc/security/pwquality.conf\n```\n\n```ini\n# /etc/security/pwquality.conf\nminlen = 12          # 최소 길이\nminclass = 3         # 최소 문자 클래스 수 (대/소/숫자/특수)\nmaxrepeat = 3        # 같은 문자 연속 최대 횟수\ndcredit = -1         # 숫자 최소 1개 필요\nucredit = -1         # 대문자 최소 1개 필요\nlcredit = -1         # 소문자 최소 1개 필요\nocredit = -1         # 특수문자 최소 1개 필요\n```\n\n### 계정 잠금 정책\n\n```bash\n# faillock 설정 (로그인 실패 제한)\nsudo nano /etc/security/faillock.conf\n```\n\n```ini\ndeny = 5             # 5회 실패 시 잠금\nunlock_time = 300    # 300초 후 자동 해제\nfail_interval = 900  # 900초 내 실패 횟수 누적\n```\n\n```bash\n# 잠긴 계정 확인 및 해제\nsudo faillock --user student\nsudo faillock --user student --reset\n```\n\n---\n\n## 핵심 요약\n\n- **권한 3요소**: 읽기(r=4), 쓰기(w=2), 실행(x=1)\n- **chmod**: 8진수(644, 755) 또는 심볼릭(u+x) 방식\n- **chown**: 소유자 변경, **chgrp**: 그룹 변경\n- **특수 권한**: SetUID(4), SetGID(2), Sticky(1)\n- **useradd/usermod/userdel**: 사용자 계정 생명주기 관리\n- **visudo**: sudoers 파일 안전하게 편집\n- **최소 권한 원칙**: 필요한 권한만 최소한으로 부여\n", "# 챕터 6: 프로세스와 서비스 관리\n\n> 리눅스 프로세스 생명주기와 systemd 서비스를 마스터한다\n\n## 학습 목표\n- 프로세스의 개념과 상태를 이해한다\n- ps, top, htop으로 프로세스를 모니터링할 수 있다\n- 프로세스 제어와 시그널을 다룰 수 있다\n- systemd로 서비스를 관리할 수 있다\n\n---\n\n## 6.1 프로세스 이해\n\n### 프로세스란?\n\n```\n프로그램 (디스크의 파일)\n        ↓  실행 (exec)\n프로세스 (메모리에 로드된 실행 중인 프로그램)\n\n프로세스 구성 요소:\n┌────────────────────────┐\n│ PID (프로세스 ID)       │\n│ PPID (부모 프로세스 ID) │\n│ UID/GID (소유자/그룹)   │\n│ 상태 (Running/Sleep..)  │\n│ 메모리 공간             │\n│ 열린 파일 디스크립터    │\n│ 환경 변수              │\n└────────────────────────┘\n```\n\n### 프로세스 상태\n\n```\n프로세스 상태 전이:\n                  fork()\n새 프로세스 ─────────────→ READY (준비)\n                               │\n                    CPU 할당   │   CPU 선점\n                  ┌────────────┘────────────┐\n                  ↓                         ↑\n              RUNNING (실행) ──────────────→ READY\n                  │\n    I/O 요청,     │   I/O 완료,\n    sleep()       ↓   신호 수신\n              SLEEPING (대기)\n                  │\n              exit()\n                  ↓\n              ZOMBIE (좀비) → 부모 wait() → 소멸\n```\n\n### PID 1 - init/systemd\n\n```bash\n# PID 1 확인\nps -p 1\ncat /proc/1/comm  # systemd\n\n# 프로세스 트리 전체\npstree\npstree -p         # PID 포함\npstree -u         # 사용자 포함\n```\n\n---\n\n## 6.2 프로세스 모니터링\n\n### ps - 프로세스 스냅샷\n\n```bash\n# 현재 터미널의 프로세스\nps\n\n# 전체 프로세스 (BSD 스타일)\nps aux\n\n# 전체 프로세스 (System V 스타일)\nps -ef\n\n# 특정 프로세스 찾기\nps aux | grep nginx\nps -ef | grep python\n\n# 프로세스 트리\nps axjf\nps -ejH\n\n# 특정 사용자의 프로세스\nps -u student\n\n# 출력 형식 커스터마이징\nps -eo pid,ppid,user,%cpu,%mem,stat,cmd\n```\n\n```\nps aux 출력 해석:\nUSER   PID  %CPU %MEM    VSZ   RSS TTY  STAT START   TIME COMMAND\nroot     1   0.0  0.3 168548 12345 ?    Ss   10:00   0:01 /sbin/init\nstudent 1234  2.1  1.5 123456 60000 pts/0 Sl  10:15   0:30 python3 app.py\n\nSTAT 코드:\nR - Running (실행 중)\nS - Sleeping (인터럽트 가능 대기)\nD - Disk sleep (인터럽트 불가 대기, I/O 대기)\nZ - Zombie\nT - Stopped\n< - 높은 우선순위\nN - 낮은 우선순위\n```\n\n### top - 실시간 모니터링\n\n```bash\n# top 실행\ntop\n\n# top 단축키:\n# q    - 종료\n# h    - 도움말\n# M    - 메모리 사용량순 정렬\n# P    - CPU 사용량순 정렬\n# k    - 프로세스 종료 (PID 입력)\n# r    - renice (우선순위 변경)\n# u    - 특정 사용자 필터\n# 1    - CPU 코어별 표시\n# W    - 설정 저장\n```\n\n### htop - 향상된 top\n\n```bash\n# 설치\nsudo apt install htop\n\n# 실행\nhtop\n\n# htop 단축키:\n# F2      - 설정\n# F3/F4   - 검색/필터\n# F5      - 트리뷰\n# F6      - 정렬 기준\n# F9      - 프로세스 종료\n# F10/q   - 종료\n# Space   - 태그 (다중 선택)\n```\n\n---\n\n## 6.3 프로세스 제어\n\n### 포그라운드 / 백그라운드\n\n```bash\n# 백그라운드로 실행 (&)\npython3 server.py &\nsleep 100 &\n\n# 작업 목록 확인\njobs\njobs -l  # PID 포함\n\n# 백그라운드 작업을 포그라운드로\nfg          # 가장 최근 작업\nfg %1       # 1번 작업\n\n# 포그라운드 작업을 백그라운드로\nCtrl+Z      # 일시 정지\nbg          # 백그라운드에서 계속 실행\nbg %1\n```\n\n### nohup - 터미널 종료 후에도 실행\n\n```bash\n# 터미널 종료 시 SIGHUP 무시\nnohup python3 server.py &\nnohup python3 server.py > output.log 2>&1 &\n\n# 출력은 nohup.out 또는 지정 파일에 저장\ntail -f nohup.out\n```\n\n### disown - 현재 쉘에서 분리\n\n```bash\n# 실행 중인 작업을 쉘에서 분리\npython3 server.py &\ndisown %1\n\n# 모든 작업 분리\ndisown -a\n```\n\n---\n\n## 6.4 시그널과 kill\n\n### 주요 시그널\n\n| 번호 | 이름 | 설명 |\n|------|------|------|\n| 1 | SIGHUP | 터미널 연결 종료, 설정 재로드 |\n| 2 | SIGINT | Ctrl+C, 인터럽트 |\n| 9 | SIGKILL | 강제 종료 (무시 불가) |\n| 15 | SIGTERM | 정상 종료 요청 (기본) |\n| 18 | SIGCONT | 정지된 프로세스 재개 |\n| 19 | SIGSTOP | 프로세스 정지 (무시 불가) |\n\n```bash\n# PID로 시그널 전송\nkill 1234           # SIGTERM (기본)\nkill -9 1234        # SIGKILL (강제)\nkill -TERM 1234     # SIGTERM 명시\nkill -HUP 1234      # 설정 재로드\n\n# 프로세스 이름으로 종료\nkillall nginx\nkillall -9 zombie_process\n\n# 패턴으로 종료\npkill -f \"python3 app.py\"\npkill -u student    # 특정 사용자의 모든 프로세스\n\n# 프로세스 확인\npgrep nginx\npgrep -l python     # 이름 포함\n```\n\n### 좀비 프로세스 처리\n\n```bash\n# 좀비 프로세스 찾기\nps aux | grep Z\n\n# 좀비의 부모 프로세스 찾기\nps -ef | grep Z\n# PPID 확인 후 부모 프로세스에 SIGCHLD 전송\nkill -CHLD <PPID>\n\n# 또는 부모 프로세스 재시작\n```\n\n---\n\n## 6.5 프로세스 우선순위\n\n### nice와 renice\n\n```bash\n# nice 값 범위: -20 (최고 우선순위) ~ 19 (최저)\n# 기본값: 0, 일반 사용자는 0~19만 설정 가능\n\n# 낮은 우선순위로 실행\nnice -n 10 python3 heavy_task.py\n\n# 높은 우선순위 (root만 가능)\nsudo nice -n -10 critical_process\n\n# 실행 중인 프로세스 우선순위 변경\nrenice 15 -p 1234        # PID로\nrenice 10 -u student     # 사용자로\nsudo renice -5 -p 1234   # root만 음수 가능\n```\n\n---\n\n## 6.6 systemd 서비스 관리\n\n### systemd 구조\n\n```\nsystemd (PID 1)\n├── 서비스 유닛 (.service)\n├── 소켓 유닛 (.socket)\n├── 타이머 유닛 (.timer)\n├── 마운트 유닛 (.mount)\n└── 타깃 유닛 (.target)  ← 런레벨 대체\n\n유닛 파일 위치:\n/lib/systemd/system/    ← 패키지 설치 시\n/etc/systemd/system/    ← 관리자 설정 (우선순위 높음)\n~/.config/systemd/user/ ← 사용자 서비스\n```\n\n### systemctl 기본 명령어\n\n```bash\n# 서비스 상태 확인\nsudo systemctl status nginx\nsudo systemctl status ssh\n\n# 서비스 시작/중지/재시작\nsudo systemctl start nginx\nsudo systemctl stop nginx\nsudo systemctl restart nginx\nsudo systemctl reload nginx    # 설정만 재로드\n\n# 부팅 시 자동 시작 설정\nsudo systemctl enable nginx\nsudo systemctl disable nginx\n\n# 시작 + 활성화 한번에\nsudo systemctl enable --now nginx\n\n# 서비스 목록\nsystemctl list-units --type=service\nsystemctl list-units --type=service --state=running\nsystemctl list-units --type=service --state=failed\n```\n\n### 서비스 유닛 파일 작성\n\n```bash\n# 커스텀 서비스 예시\nsudo nano /etc/systemd/system/myapp.service\n```\n\n```ini\n[Unit]\nDescription=My Python Application\nAfter=network.target postgresql.service\nRequires=postgresql.service\n\n[Service]\nType=simple\nUser=student\nGroup=student\nWorkingDirectory=/opt/myapp\nExecStart=/usr/bin/python3 /opt/myapp/app.py\nExecReload=/bin/kill -HUP $MAINPID\nRestart=always\nRestartSec=3\nStandardOutput=journal\nStandardError=journal\nEnvironment=FLASK_ENV=production\nEnvironmentFile=/opt/myapp/.env\n\n[Install]\nWantedBy=multi-user.target\n```\n\n```bash\n# 새 서비스 파일 인식\nsudo systemctl daemon-reload\n\n# 서비스 활성화 및 시작\nsudo systemctl enable --now myapp\n\n# 로그 확인\nsudo journalctl -u myapp -f\nsudo journalctl -u myapp --since \"1 hour ago\"\n```\n\n### systemd 타깃 (런레벨)\n\n```bash\n# 현재 타깃 확인\nsystemctl get-default\n\n# 타깃 변경\nsudo systemctl set-default multi-user.target   # CLI 모드\nsudo systemctl set-default graphical.target    # GUI 모드\n\n# 즉시 전환\nsudo systemctl isolate rescue.target           # 복구 모드\n\n# 주요 타깃\n# poweroff.target   - 전원 끄기\n# rescue.target     - 단일 사용자 모드\n# multi-user.target - 다중 사용자 (CLI)\n# graphical.target  - 다중 사용자 (GUI)\n# reboot.target     - 재부팅\n```\n\n---\n\n## 6.7 부팅 분석\n\n```bash\n# 부팅 시간 분석\nsystemd-analyze\nsystemd-analyze blame        # 각 서비스 시작 시간\nsystemd-analyze critical-chain  # 임계 경로\n\n# 시스템 정보\nhostnamectl\ntimedatectl\nlocalectl\n```\n\n---\n\n## 핵심 요약\n\n- **프로세스**: PID, PPID, 상태(R/S/D/Z/T)로 관리\n- **ps aux**: 전체 프로세스 스냅샷, **top/htop**: 실시간 모니터링\n- **kill 시그널**: SIGTERM(15)=정상종료, SIGKILL(9)=강제종료\n- **&, nohup, disown**: 백그라운드 실행 방법\n- **nice/renice**: CPU 우선순위(-20~19)\n- **systemctl**: 서비스 시작/중지/활성화/상태확인\n- **systemd 유닛 파일**: /etc/systemd/system/에 .service 파일 작성\n", "# 챕터 7: 네트워크 기초와 설정\n\n> TCP/IP 프로토콜을 이해하고 우분투 네트워크를 설정한다\n\n## 학습 목표\n- TCP/IP 프로토콜 스택을 이해한다\n- 네트워크 인터페이스를 설정할 수 있다\n- 주요 네트워크 진단 도구를 활용할 수 있다\n- DNS, 라우팅, 포트를 이해하고 관리할 수 있다\n\n---\n\n## 7.1 TCP/IP 프로토콜 기초\n\n### OSI 7계층과 TCP/IP\n\n```\nOSI 7계층              TCP/IP 4계층\n┌─────────────┐       ┌─────────────────┐\n│ 7. 응용     │       │                 │\n│ 6. 표현     │  →    │ 응용 계층        │ HTTP, FTP, SSH, DNS\n│ 5. 세션     │       │                 │\n├─────────────┤       ├─────────────────┤\n│ 4. 전송     │  →    │ 전송 계층        │ TCP, UDP\n├─────────────┤       ├─────────────────┤\n│ 3. 네트워크  │  →    │ 인터넷 계층      │ IP, ICMP, ARP\n├─────────────┤       ├─────────────────┤\n│ 2. 데이터링크│  →    │ 네트워크 접근    │ Ethernet, Wi-Fi\n│ 1. 물리     │       │ 계층            │\n└─────────────┘       └─────────────────┘\n```\n\n### IP 주소 체계\n\n```\nIPv4: 32비트, 4옥텟 표기\n192.168.1.100 / 24\n\n네트워크 주소: 192.168.1.0\n브로드캐스트:  192.168.1.255\n사용 가능 범위: 192.168.1.1 ~ 192.168.1.254\n\n서브넷 마스크:\n/24 = 255.255.255.0   (256개 호스트, 실사용 254개)\n/25 = 255.255.255.128 (128개 호스트, 실사용 126개)\n/16 = 255.255.0.0     (65536개 호스트)\n\n사설 IP 대역:\n10.0.0.0/8          (대규모 네트워크)\n172.16.0.0/12       (중규모)\n192.168.0.0/16      (가정/소규모)\n```\n\n### TCP vs UDP\n\n| 특성 | TCP | UDP |\n|------|-----|-----|\n| 연결 방식 | 연결 지향 (3-way handshake) | 비연결 |\n| 신뢰성 | 보장 (재전송) | 미보장 |\n| 순서 | 보장 | 미보장 |\n| 속도 | 상대적으로 느림 | 빠름 |\n| 용도 | HTTP, SSH, FTP | DNS, 스트리밍, 게임 |\n\n---\n\n## 7.2 네트워크 인터페이스 관리\n\n### 인터페이스 확인\n\n```bash\n# 네트워크 인터페이스 목록과 IP\nip addr show\nip a               # 축약\n\n# 특정 인터페이스\nip addr show eth0\nip addr show lo\n\n# 인터페이스 통계\nip -s link show eth0\n\n# 구식 명령어 (ifconfig)\nsudo apt install net-tools\nifconfig\nifconfig eth0\n```\n\n```\nip addr 출력 예:\n2: ens33: <BROADCAST,MULTICAST,UP,LOWER_UP> mtu 1500 qdisc fq_codel state UP\n    link/ether 00:0c:29:12:34:56 brd ff:ff:ff:ff:ff:ff\n    inet 192.168.1.100/24 brd 192.168.1.255 scope global ens33\n    inet6 fe80::20c:29ff:fe12:3456/64 scope link\n```\n\n### 라우팅 테이블\n\n```bash\n# 라우팅 테이블 확인\nip route show\nip r              # 축약\nroute -n          # 구식\n\n# 기본 게이트웨이 확인\nip route | grep default\n\n# 특정 목적지 경로\nip route get 8.8.8.8\n\n# 임시 라우팅 추가\nsudo ip route add 10.0.0.0/8 via 192.168.1.1\nsudo ip route del 10.0.0.0/8\n```\n\n### Netplan으로 네트워크 설정 (Ubuntu 18.04+)\n\n```bash\n# 설정 파일 확인\nls /etc/netplan/\ncat /etc/netplan/00-installer-config.yaml\n```\n\n```yaml\n# DHCP 설정\nnetwork:\n  version: 2\n  renderer: networkd\n  ethernets:\n    ens33:\n      dhcp4: true\n      dhcp6: false\n```\n\n```yaml\n# 고정 IP 설정\nnetwork:\n  version: 2\n  renderer: networkd\n  ethernets:\n    ens33:\n      addresses:\n        - 192.168.1.100/24\n      nameservers:\n        search: [local.domain]\n        addresses: [8.8.8.8, 8.8.4.4]\n      routes:\n        - to: default\n          via: 192.168.1.1\n      dhcp4: false\n```\n\n```bash\n# 설정 적용\nsudo netplan apply\n\n# 검증 (적용 전 테스트)\nsudo netplan try\n```\n\n---\n\n## 7.3 DNS 설정\n\n### DNS 동작 원리\n\n```\n클라이언트 → /etc/hosts → 로컬 DNS → 상위 DNS 서버\n              (우선순위 1)   (캐시)\n```\n\n```bash\n# /etc/hosts - 로컬 호스트 매핑\ncat /etc/hosts\n```\n\n```\n127.0.0.1   localhost\n127.0.1.1   ubuntu-server\n192.168.1.10 db.local mydb\n192.168.1.20 web.local\n```\n\n```bash\n# /etc/resolv.conf - DNS 서버 설정 (systemd-resolved가 관리)\ncat /etc/resolv.conf\n\n# DNS 서버 설정 확인\nresolvectl status\n\n# DNS 조회\nnslookup google.com\nnslookup google.com 8.8.8.8  # 특정 DNS 서버 사용\n\ndig google.com               # 상세 DNS 조회\ndig google.com A             # A 레코드\ndig google.com MX            # MX 레코드\ndig @8.8.8.8 google.com      # 특정 DNS 사용\n\n# 역방향 조회\ndig -x 8.8.8.8\nnslookup 8.8.8.8\n```\n\n---\n\n## 7.4 네트워크 진단 도구\n\n### ping - 연결 확인\n\n```bash\n# 기본 ping\nping google.com\n\n# 횟수 지정\nping -c 4 google.com\n\n# 인터벌 지정\nping -i 0.5 google.com\n\n# 패킷 크기 지정\nping -s 1000 google.com\n\n# IPv6\nping6 google.com\n```\n\n### traceroute - 경로 추적\n\n```bash\n# 설치\nsudo apt install traceroute\n\n# 경로 추적\ntraceroute google.com\ntraceroute -n google.com    # DNS 조회 없이 (빠름)\n\n# tracepath (권한 불필요)\ntracepath google.com\n\n# MTR (실시간 traceroute)\nsudo apt install mtr\nmtr google.com\nmtr --report google.com\n```\n\n### netstat / ss - 포트와 연결 확인\n\n```bash\n# ss (netstat 대체, 더 빠름)\nss -tulnp              # TCP/UDP 리스닝 포트\nss -tnp                # TCP 연결 중인 포트\nss -s                  # 통계 요약\n\n# netstat (구식, net-tools 필요)\nnetstat -tulnp         # 리스닝 포트\nnetstat -an            # 모든 연결\n\n# 특정 포트 확인\nss -tlnp | grep :80\nss -tlnp | grep :22\n```\n\n```\nss -tulnp 출력:\nNetid  State   Recv-Q Send-Q Local Address:Port  Peer Address:Port\ntcp    LISTEN  0      128    0.0.0.0:22           0.0.0.0:*     users:((\"sshd\",pid=1234))\ntcp    LISTEN  0      511    0.0.0.0:80           0.0.0.0:*     users:((\"nginx\",pid=5678))\n```\n\n### 포트 스캔과 테스트\n\n```bash\n# nmap - 포트 스캔\nsudo apt install nmap\n\n# 자신의 서버 스캔\nnmap localhost\nnmap -p 1-1000 localhost     # 포트 범위\nnmap -sV localhost            # 서비스 버전\nnmap -A localhost             # 전체 정보\n\n# 특정 포트 연결 테스트\ntelnet localhost 80\nnc -zv localhost 80           # netcat\nnc -zv localhost 80-90        # 포트 범위\n\n# curl로 HTTP 테스트\ncurl -v http://localhost\ncurl -I https://google.com    # 헤더만\n```\n\n---\n\n## 7.5 네트워크 트래픽 분석\n\n### tcpdump\n\n```bash\n# 설치\nsudo apt install tcpdump\n\n# 전체 트래픽 캡처\nsudo tcpdump -i ens33\n\n# HTTP 트래픽만\nsudo tcpdump -i ens33 port 80\n\n# 특정 호스트\nsudo tcpdump -i ens33 host 192.168.1.1\n\n# 파일로 저장\nsudo tcpdump -i ens33 -w capture.pcap\n\n# 저장된 파일 읽기\ntcpdump -r capture.pcap\n\n# 출력 형식 조정\nsudo tcpdump -i ens33 -n -v port 443\n```\n\n### iftop / nethogs\n\n```bash\n# 인터페이스별 대역폭\nsudo apt install iftop\nsudo iftop -i ens33\n\n# 프로세스별 대역폭\nsudo apt install nethogs\nsudo nethogs ens33\n```\n\n---\n\n## 7.6 네트워크 본딩과 브리지\n\n### IP 별칭 (가상 인터페이스)\n\n```bash\n# 임시로 IP 추가\nsudo ip addr add 192.168.1.200/24 dev ens33\n\n# 확인\nip addr show ens33\n\n# 제거\nsudo ip addr del 192.168.1.200/24 dev ens33\n```\n\n---\n\n## 핵심 요약\n\n| 명령어 | 주요 용도 |\n|--------|-----------|\n| `ip addr` | IP 주소 확인/설정 |\n| `ip route` | 라우팅 테이블 |\n| `ss -tulnp` | 리스닝 포트 확인 |\n| `ping` | 기본 연결 테스트 |\n| `traceroute` | 경로 추적 |\n| `dig/nslookup` | DNS 조회 |\n| `netplan` | Ubuntu 네트워크 설정 |\n| `tcpdump` | 패킷 캡처 분석 |\n\n- **Netplan**: Ubuntu 18.04+에서 YAML로 네트워크 설정\n- **ss**: netstat의 현대적 대체, 리스닝 포트 확인 필수\n- **DNS 우선순위**: /etc/hosts → 로컬 캐시 → DNS 서버\n", "# 챕터 8: SSH와 원격 접속\n\n> SSH로 안전하게 원격 서버를 관리한다\n\n## 학습 목표\n- SSH 프로토콜의 동작 원리를 이해한다\n- 키 기반 인증을 설정하고 관리할 수 있다\n- SCP, rsync로 파일을 안전하게 전송할 수 있다\n- SSH 터널링과 포트 포워딩을 활용할 수 있다\n\n---\n\n## 8.1 SSH 프로토콜 이해\n\n### SSH 연결 과정\n\n```\n클라이언트                        서버\n    │                               │\n    │──── TCP 연결 (포트 22) ───────→│\n    │                               │\n    │←── 서버 공개키 전송 ───────────│\n    │                               │\n    │  키 교환 (Diffie-Hellman)      │\n    │←─────────────────────────────→│\n    │                               │\n    │  세션 키 생성 (대칭 암호화)     │\n    │                               │\n    │──── 사용자 인증 ──────────────→│\n    │  (비밀번호 or 공개키)          │\n    │                               │\n    │←──── 암호화된 쉘 세션 ─────────│\n```\n\n### SSH 버전과 암호화\n\n```bash\n# SSH 버전 확인\nssh -V\n\n# 지원하는 암호화 알고리즘 확인\nssh -Q cipher\nssh -Q mac\nssh -Q kex\nssh -Q key\n```\n\n---\n\n## 8.2 SSH 기본 사용법\n\n### 접속\n\n```bash\n# 기본 접속 (현재 사용자명으로)\nssh 192.168.1.100\n\n# 사용자 지정\nssh student@192.168.1.100\n\n# 포트 지정\nssh -p 2222 student@192.168.1.100\n\n# 특정 키 파일 사용\nssh -i ~/.ssh/mykey.pem student@192.168.1.100\n\n# 첫 접속 시 호스트 키 확인\n# The authenticity of host '192.168.1.100' can't be established.\n# ED25519 key fingerprint is SHA256:xxxx...\n# Are you sure you want to continue connecting (yes/no)?\n```\n\n### SSH 설정 파일 (~/.ssh/config)\n\n```bash\nmkdir -p ~/.ssh\nchmod 700 ~/.ssh\nnano ~/.ssh/config\n```\n\n```\n# ~/.ssh/config\n\n# 기본 설정\nHost *\n    ServerAliveInterval 60\n    ServerAliveCountMax 3\n    AddKeysToAgent yes\n\n# 개발 서버\nHost dev\n    HostName 192.168.1.100\n    User student\n    Port 22\n    IdentityFile ~/.ssh/dev_key\n\n# 프로덕션 서버\nHost prod\n    HostName 10.0.1.50\n    User ubuntu\n    Port 2222\n    IdentityFile ~/.ssh/prod_key.pem\n    StrictHostKeyChecking yes\n\n# 배스천 호스트를 통한 터널링\nHost internal\n    HostName 10.0.2.10\n    User admin\n    ProxyJump bastion\n```\n\n```bash\n# 설정 파일로 간단히 접속\nssh dev\nssh prod\n```\n\n---\n\n## 8.3 키 기반 인증\n\n### SSH 키 생성\n\n```bash\n# ED25519 키 생성 (최신, 권장)\nssh-keygen -t ed25519 -C \"student@company.com\"\n\n# RSA 키 생성 (호환성)\nssh-keygen -t rsa -b 4096 -C \"student@company.com\"\n\n# 키 파일 위치와 이름 지정\nssh-keygen -t ed25519 -f ~/.ssh/myserver_key\n\n# 생성되는 파일:\n# ~/.ssh/id_ed25519      (개인키 - 절대 공유 금지!)\n# ~/.ssh/id_ed25519.pub  (공개키 - 서버에 등록)\n\n# 권한 설정\nchmod 600 ~/.ssh/id_ed25519\nchmod 644 ~/.ssh/id_ed25519.pub\n```\n\n### 서버에 공개키 등록\n\n```bash\n# 방법 1: ssh-copy-id (권장)\nssh-copy-id student@192.168.1.100\nssh-copy-id -i ~/.ssh/mykey.pub student@192.168.1.100\n\n# 방법 2: 수동 등록\ncat ~/.ssh/id_ed25519.pub | ssh student@192.168.1.100 \\\n  \"mkdir -p ~/.ssh && cat >> ~/.ssh/authorized_keys\"\n\n# 방법 3: 서버에서 직접 편집\n# 서버에서:\nmkdir -p ~/.ssh\nchmod 700 ~/.ssh\nnano ~/.ssh/authorized_keys  # 공개키 내용 붙여넣기\nchmod 600 ~/.ssh/authorized_keys\n```\n\n### SSH 에이전트\n\n```bash\n# SSH 에이전트 시작\neval $(ssh-agent)\n\n# 키 추가\nssh-add ~/.ssh/id_ed25519\nssh-add ~/.ssh/myserver_key\n\n# 등록된 키 확인\nssh-add -l\n\n# 키 제거\nssh-add -d ~/.ssh/myserver_key\n\n# ~/.bashrc에 자동 실행 추가\necho 'eval $(ssh-agent) && ssh-add ~/.ssh/id_ed25519' >> ~/.bashrc\n```\n\n---\n\n## 8.4 SSH 서버 보안 설정\n\n### sshd_config 보안 강화\n\n```bash\nsudo nano /etc/ssh/sshd_config\n```\n\n```ini\n# /etc/ssh/sshd_config 보안 설정\n\n# 포트 변경 (22 → 다른 포트)\nPort 2222\n\n# root 직접 로그인 금지\nPermitRootLogin no\n\n# 비밀번호 인증 비활성화 (키 설정 후)\nPasswordAuthentication no\nChallengeResponseAuthentication no\n\n# 공개키 인증 활성화\nPubkeyAuthentication yes\nAuthorizedKeysFile .ssh/authorized_keys\n\n# 빈 비밀번호 금지\nPermitEmptyPasswords no\n\n# X11 포워딩 (필요 시만)\nX11Forwarding no\n\n# 최대 인증 시도 횟수\nMaxAuthTries 3\n\n# 최대 세션 수\nMaxSessions 5\n\n# 로그인 허용 사용자\nAllowUsers student admin\n\n# 연결 타임아웃\nLoginGraceTime 30\nClientAliveInterval 300\nClientAliveCountMax 2\n\n# 프로토콜 버전\nProtocol 2\n\n# 강력한 암호화만 허용\nCiphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com\nMACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com\nKexAlgorithms curve25519-sha256,diffie-hellman-group-exchange-sha256\n```\n\n```bash\n# 설정 문법 검사\nsudo sshd -t\n\n# 적용\nsudo systemctl restart ssh\n```\n\n---\n\n## 8.5 SCP와 rsync 파일 전송\n\n### SCP - 보안 복사\n\n```bash\n# 로컬 → 원격\nscp file.txt student@192.168.1.100:/home/student/\nscp -r directory/ student@192.168.1.100:/tmp/\n\n# 원격 → 로컬\nscp student@192.168.1.100:/var/log/nginx/error.log ./\n\n# 원격 → 원격\nscp server1:/file.txt server2:/destination/\n\n# 포트 지정\nscp -P 2222 file.txt student@192.168.1.100:/tmp/\n\n# 진행 상황 표시\nscp -v file.txt student@server:/tmp/\n```\n\n### rsync - 효율적인 동기화\n\n```bash\n# 기본 동기화 (로컬)\nrsync -av source/ destination/\n\n# 원격 동기화\nrsync -avz ./local/ student@server:/remote/\n\n# 삭제 동기화 (소스에 없는 파일 제거)\nrsync -avz --delete ./local/ student@server:/remote/\n\n# 특정 파일 제외\nrsync -avz --exclude='*.log' --exclude='.git' ./local/ student@server:/remote/\n\n# 드라이런 (실제 실행 없이 확인)\nrsync -avzn ./local/ student@server:/remote/\n\n# 압축 + 체크섬 검증\nrsync -avzc ./local/ student@server:/remote/\n\n# SSH 포트 지정\nrsync -avz -e \"ssh -p 2222\" ./local/ student@server:/remote/\n\n# 백업 예시 (날짜별)\nrsync -avz --backup --backup-dir=../backup-$(date +%Y%m%d) \\\n  ./data/ student@server:/backup/\n```\n\n---\n\n## 8.6 SSH 포트 포워딩 (터널링)\n\n### 로컬 포트 포워딩\n\n```bash\n# 원격 서버의 포트를 로컬로 포워딩\n# ssh -L [로컬포트]:[원격호스트]:[원격포트] [SSH서버]\n\n# 원격 MySQL(3306)을 로컬 3307로\nssh -L 3307:localhost:3306 student@server\n# 이후 로컬에서: mysql -h 127.0.0.1 -P 3307\n\n# 내부망 웹서버를 로컬로 접속\nssh -L 8080:internal-web:80 student@bastion\n# 이후 로컬에서: http://localhost:8080\n```\n\n### 원격 포트 포워딩\n\n```bash\n# 로컬 서비스를 원격 서버를 통해 공개\n# ssh -R [원격포트]:[로컬호스트]:[로컬포트] [SSH서버]\n\n# 로컬 3000번을 원격 서버 8080으로 공개\nssh -R 8080:localhost:3000 student@server\n```\n\n### 동적 포트 포워딩 (SOCKS 프록시)\n\n```bash\n# SOCKS5 프록시 생성\nssh -D 1080 student@server\n\n# 브라우저에서 SOCKS 프록시 설정: 127.0.0.1:1080\n```\n\n### 백그라운드 터널\n\n```bash\n# 백그라운드로 실행 (-N: 명령 없음, -f: 백그라운드)\nssh -NfL 3307:localhost:3306 student@server\n\n# 터널 종료\nps aux | grep ssh\nkill <PID>\n```\n\n---\n\n## 8.7 실전: 멀티홉 SSH (Jump Host)\n\n```bash\n# 배스천 → 내부 서버 접속\nssh -J student@bastion.example.com admin@10.0.1.50\n\n# ~/.ssh/config 설정\nHost internal\n    HostName 10.0.1.50\n    User admin\n    ProxyJump student@bastion.example.com\n\n# 간단히 접속\nssh internal\n```\n\n---\n\n## 핵심 요약\n\n- **키 기반 인증**: ssh-keygen → ssh-copy-id → PasswordAuthentication no\n- **~/.ssh/config**: Host 별칭으로 복잡한 설정 단순화\n- **scp**: 단순 파일 전송, **rsync**: 대용량/동기화에 적합\n- **로컬 포트 포워딩**: `-L` 옵션으로 원격 서비스를 로컬에서 접속\n- **보안 설정**: root 로그인 금지, 비밀번호 인증 비활성화, 포트 변경\n- **fail2ban**: SSH 브루트포스 방어 필수 (챕터 9에서 다룸)\n", "# 챕터 9: 방화벽과 보안\n\n> UFW와 iptables로 서버를 안전하게 보호한다\n\n## 학습 목표\n- UFW로 방화벽을 설정하고 관리할 수 있다\n- iptables 기본 개념을 이해한다\n- fail2ban으로 브루트포스 공격을 방어할 수 있다\n- 리눅스 보안 모범 사례를 적용할 수 있다\n\n---\n\n## 9.1 UFW (Uncomplicated Firewall)\n\n### UFW 기본 설정\n\n```bash\n# UFW 상태 확인\nsudo ufw status\nsudo ufw status verbose\nsudo ufw status numbered\n\n# UFW 활성화/비활성화\nsudo ufw enable\nsudo ufw disable\n\n# 기본 정책 설정 (활성화 전에 먼저 설정)\nsudo ufw default deny incoming    # 들어오는 모든 연결 거부\nsudo ufw default allow outgoing   # 나가는 모든 연결 허용\n```\n\n### 규칙 추가\n\n```bash\n# 서비스 이름으로 허용\nsudo ufw allow ssh\nsudo ufw allow http\nsudo ufw allow https\n\n# 포트 번호로 허용\nsudo ufw allow 22/tcp\nsudo ufw allow 80/tcp\nsudo ufw allow 443/tcp\nsudo ufw allow 8080\n\n# UDP 허용\nsudo ufw allow 53/udp      # DNS\nsudo ufw allow 123/udp     # NTP\n\n# 포트 범위\nsudo ufw allow 6000:6007/tcp\n\n# 특정 IP 허용\nsudo ufw allow from 192.168.1.100\nsudo ufw allow from 192.168.1.0/24\n\n# 특정 IP + 포트\nsudo ufw allow from 192.168.1.100 to any port 3306\n\n# 특정 인터페이스\nsudo ufw allow in on ens33 to any port 80\n```\n\n### 규칙 삭제\n\n```bash\n# 번호로 삭제\nsudo ufw status numbered\nsudo ufw delete 3\n\n# 규칙 내용으로 삭제\nsudo ufw delete allow 8080\nsudo ufw delete allow from 192.168.1.100\n\n# 전체 규칙 초기화\nsudo ufw reset\n```\n\n### UFW 로그\n\n```bash\n# 로그 활성화\nsudo ufw logging on\nsudo ufw logging medium   # low/medium/high/full\n\n# 로그 확인\nsudo tail -f /var/log/ufw.log\nsudo grep \"UFW BLOCK\" /var/log/ufw.log | head -20\n```\n\n---\n\n## 9.2 iptables 기초\n\n### iptables 구조\n\n```\n패킷 흐름:\n                    INPUT\n                      ↑\n외부 → PREROUTING → 라우팅 → FORWARD → 라우팅 → POSTROUTING → 외부\n                      ↓\n                   OUTPUT\n                      ↑\n                  로컬 프로세스\n\n테이블:\n- filter: 패킷 허용/차단 (기본)\n- nat: 주소 변환 (NAT)\n- mangle: 패킷 수정\n- raw: 추적 예외\n\n체인:\n- INPUT: 서버로 들어오는 패킷\n- OUTPUT: 서버에서 나가는 패킷\n- FORWARD: 서버를 통과하는 패킷\n- PREROUTING: 라우팅 전 처리\n- POSTROUTING: 라우팅 후 처리\n```\n\n### iptables 기본 명령어\n\n```bash\n# 현재 규칙 확인\nsudo iptables -L\nsudo iptables -L -v -n        # 자세히, 숫자 표시\nsudo iptables -L INPUT -v -n\n\n# 기본 정책 설정\nsudo iptables -P INPUT DROP\nsudo iptables -P FORWARD DROP\nsudo iptables -P OUTPUT ACCEPT\n\n# 규칙 추가 (-A: 뒤에 추가, -I: 앞에 삽입)\n# 루프백 허용\nsudo iptables -A INPUT -i lo -j ACCEPT\n\n# 기존 연결 유지\nsudo iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT\n\n# SSH 허용\nsudo iptables -A INPUT -p tcp --dport 22 -j ACCEPT\n\n# HTTP/HTTPS 허용\nsudo iptables -A INPUT -p tcp --dport 80 -j ACCEPT\nsudo iptables -A INPUT -p tcp --dport 443 -j ACCEPT\n\n# ICMP (ping) 허용\nsudo iptables -A INPUT -p icmp -j ACCEPT\n\n# 규칙 삭제\nsudo iptables -D INPUT -p tcp --dport 8080 -j ACCEPT\n\n# 규칙 저장 (재부팅 후에도 유지)\nsudo apt install iptables-persistent\nsudo netfilter-persistent save\n```\n\n### iptables 실전 예제\n\n```bash\n# SSH 브루트포스 방어 (분당 3회 제한)\nsudo iptables -A INPUT -p tcp --dport 22 -m state --state NEW \\\n  -m recent --set --name SSH\nsudo iptables -A INPUT -p tcp --dport 22 -m state --state NEW \\\n  -m recent --update --seconds 60 --hitcount 4 --name SSH -j DROP\n\n# 특정 IP 차단\nsudo iptables -A INPUT -s 1.2.3.4 -j DROP\n\n# 포트 스캔 차단\nsudo iptables -A INPUT -p tcp --tcp-flags ALL NONE -j DROP\nsudo iptables -A INPUT -p tcp --tcp-flags ALL ALL -j DROP\n\n# DDoS 기본 방어\nsudo iptables -A INPUT -p tcp --dport 80 -m limit \\\n  --limit 25/minute --limit-burst 100 -j ACCEPT\n```\n\n---\n\n## 9.3 fail2ban\n\n### 설치와 기본 설정\n\n```bash\n# 설치\nsudo apt install fail2ban\n\n# 서비스 시작\nsudo systemctl enable --now fail2ban\n\n# 상태 확인\nsudo fail2ban-client status\nsudo fail2ban-client status sshd\n```\n\n### fail2ban 설정\n\n```bash\n# 설정 파일 구조\n/etc/fail2ban/jail.conf       # 기본 설정 (수정 금지)\n/etc/fail2ban/jail.local      # 커스텀 설정 (여기서 수정)\n/etc/fail2ban/filter.d/       # 필터 정의 파일\n/etc/fail2ban/action.d/       # 액션 정의 파일\n\n# jail.local 생성\nsudo nano /etc/fail2ban/jail.local\n```\n\n```ini\n[DEFAULT]\n# 기본 설정\nbantime  = 3600          # 차단 시간 (초), -1은 영구\nfindtime = 600           # 이 시간 내에\nmaxretry = 5             # 이 횟수 실패 시 차단\nignoreip = 127.0.0.1/8 192.168.1.0/24  # 화이트리스트\n\n# 이메일 알림 (선택)\ndestemail = admin@example.com\nsendername = Fail2Ban\naction = %(action_mwl)s\n\n[sshd]\nenabled  = true\nport     = ssh\nfilter   = sshd\nlogpath  = /var/log/auth.log\nmaxretry = 3\nbantime  = 86400         # 24시간\n\n[nginx-http-auth]\nenabled  = true\nfilter   = nginx-http-auth\nport     = http,https\nlogpath  = /var/log/nginx/error.log\nmaxretry = 5\n\n[nginx-limit-req]\nenabled = true\nfilter  = nginx-limit-req\nport    = http,https\nlogpath = /var/log/nginx/error.log\nmaxretry = 10\n```\n\n```bash\n# 설정 적용\nsudo systemctl restart fail2ban\n\n# 차단된 IP 확인\nsudo fail2ban-client status sshd\n\n# IP 차단 해제\nsudo fail2ban-client set sshd unbanip 1.2.3.4\n\n# 수동 IP 차단\nsudo fail2ban-client set sshd banip 1.2.3.4\n```\n\n---\n\n## 9.4 보안 업데이트 자동화\n\n### unattended-upgrades\n\n```bash\n# 설치\nsudo apt install unattended-upgrades\n\n# 설정\nsudo nano /etc/apt/apt.conf.d/50unattended-upgrades\n```\n\n```\nUnattended-Upgrade::Allowed-Origins {\n    \"${distro_id}:${distro_codename}\";\n    \"${distro_id}:${distro_codename}-security\";\n    \"${distro_id}ESMApps:${distro_codename}-apps-security\";\n};\n\nUnattended-Upgrade::Mail \"admin@example.com\";\nUnattended-Upgrade::Remove-Unused-Dependencies \"true\";\nUnattended-Upgrade::Automatic-Reboot \"false\";\n```\n\n```bash\n# 자동 업데이트 주기 설정\nsudo nano /etc/apt/apt.conf.d/20auto-upgrades\n```\n\n```\nAPT::Periodic::Update-Package-Lists \"1\";      # 매일 목록 업데이트\nAPT::Periodic::Download-Upgradeable-Packages \"1\";\nAPT::Periodic::AutocleanInterval \"7\";          # 7일마다 정리\nAPT::Periodic::Unattended-Upgrade \"1\";         # 자동 설치\n```\n\n---\n\n## 9.5 시스템 보안 점검\n\n### 보안 감사 도구\n\n```bash\n# lynis - 시스템 보안 감사\nsudo apt install lynis\nsudo lynis audit system\n\n# rkhunter - 루트킷 검사\nsudo apt install rkhunter\nsudo rkhunter --update\nsudo rkhunter --check\n\n# chkrootkit\nsudo apt install chkrootkit\nsudo chkrootkit\n\n# clamav - 바이러스 검사\nsudo apt install clamav\nsudo freshclam            # 데이터베이스 업데이트\nsudo clamscan -r /home\n```\n\n### 열린 포트와 서비스 점검\n\n```bash\n# 불필요한 서비스 확인\nsudo systemctl list-units --type=service --state=running\n\n# 리스닝 포트 확인\nsudo ss -tulnp\n\n# setuid 파일 검사\nsudo find / -perm /4000 -type f 2>/dev/null\n\n# 최근 로그인 이력\nlast\nlastb                     # 실패한 로그인\nsudo grep \"Failed\" /var/log/auth.log | tail -20\nsudo grep \"Accepted\" /var/log/auth.log | tail -20\n```\n\n---\n\n## 9.6 AppArmor\n\n```bash\n# AppArmor 상태 확인\nsudo apparmor_status\nsudo aa-status\n\n# 프로필 목록\nls /etc/apparmor.d/\n\n# 특정 프로그램 프로필 확인\nsudo aa-status | grep nginx\n\n# 프로필 로드/해제\nsudo apparmor_parser -r /etc/apparmor.d/usr.sbin.nginx\nsudo aa-disable /etc/apparmor.d/usr.sbin.nginx\n\n# 위반 로그 확인\nsudo dmesg | grep apparmor\nsudo grep apparmor /var/log/syslog\n```\n\n---\n\n## 핵심 요약\n\n```\n기본 보안 체크리스트:\n□ sudo ufw enable && ufw default deny incoming\n□ SSH: PermitRootLogin no, PasswordAuthentication no\n□ SSH 포트 변경 (22 → 다른 포트)\n□ fail2ban 설치 및 설정\n□ 불필요한 서비스 비활성화\n□ unattended-upgrades 보안 업데이트 자동화\n□ 정기적인 lynis 보안 감사\n□ 로그인 이력 주기적 확인\n```\n\n- **UFW**: iptables의 쉬운 인터페이스, `default deny incoming`이 기본\n- **iptables**: 세밀한 패킷 필터링, 규칙 순서가 중요\n- **fail2ban**: 로그 분석으로 브루트포스 자동 차단\n- **보안 = 계층 방어**: 방화벽 + SSH 보안 + fail2ban + 업데이트\n", "# 챕터 10: APT 패키지 관리\n\n> 우분투의 패키지 관리 시스템을 완전히 마스터한다\n\n## 학습 목표\n- APT 패키지 관리 시스템의 구조를 이해한다\n- apt 명령어로 소프트웨어를 설치/관리할 수 있다\n- PPA와 서드파티 저장소를 추가할 수 있다\n- 소스에서 직접 컴파일하여 설치할 수 있다\n\n---\n\n## 10.1 패키지 관리 시스템 이해\n\n### Debian 패키지 시스템 구조\n\n```\n사용자\n  ↓\napt (고수준 인터페이스)\n  ↓\napt-get / apt-cache (중간 레이어)\n  ↓\ndpkg (저수준 패키지 관리)\n  ↓\n.deb 패키지 파일\n\n저장소(Repository):\nUbuntu Server ──→ /etc/apt/sources.list\nPPA ──────────→ /etc/apt/sources.list.d/\n서드파티 ─────→ /etc/apt/sources.list.d/\n```\n\n### 저장소 구성\n\n```bash\n# 기본 저장소 확인\ncat /etc/apt/sources.list\n```\n\n```\ndeb http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse\ndeb http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse\ndeb http://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse\n\n컴포넌트:\nmain        - 공식 지원, 오픈소스\nrestricted  - 공식 지원, 비오픈소스 드라이버\nuniverse    - 커뮤니티 지원\nmultiverse  - 비자유 소프트웨어\n```\n\n---\n\n## 10.2 apt 명령어\n\n### 패키지 목록 업데이트\n\n```bash\n# 저장소 패키지 목록 업데이트 (설치는 하지 않음)\nsudo apt update\n\n# 업그레이드 가능한 패키지 목록\napt list --upgradable\n```\n\n### 패키지 설치와 업그레이드\n\n```bash\n# 패키지 설치\nsudo apt install nginx\nsudo apt install nginx mysql-server php-fpm  # 여러 패키지\n\n# 특정 버전 설치\nsudo apt install nginx=1.18.0-0ubuntu1\n\n# 설치 없이 다운로드만\nsudo apt install -d nginx\n\n# 확인 없이 설치 (-y)\nsudo apt install -y nginx\n\n# 시뮬레이션 (실제 설치 없이 확인)\nsudo apt install --simulate nginx\n\n# 업그레이드\nsudo apt upgrade              # 기존 패키지 업그레이드\nsudo apt full-upgrade         # 의존성 변경 포함 업그레이드\nsudo apt dist-upgrade         # full-upgrade와 동일\n```\n\n### 패키지 제거\n\n```bash\n# 패키지 제거 (설정 파일 유지)\nsudo apt remove nginx\n\n# 패키지 + 설정 파일 완전 제거\nsudo apt purge nginx\n\n# 의존성으로만 설치된 불필요 패키지 제거\nsudo apt autoremove\n\n# 한 번에 완전 제거\nsudo apt purge --autoremove nginx\n\n# 로컬 캐시 정리\nsudo apt clean          # 다운로드된 패키지 파일 삭제\nsudo apt autoclean      # 오래된 버전만 삭제\n```\n\n### 패키지 검색과 정보\n\n```bash\n# 패키지 검색\napt search nginx\napt search \"web server\"\n\n# 패키지 정보 확인\napt show nginx\napt-cache show nginx\n\n# 패키지 의존성 확인\napt depends nginx\napt rdepends nginx      # 역의존성 (누가 이 패키지를 필요로 하나)\n\n# 설치된 패키지 목록\napt list --installed\napt list --installed | grep nginx\ndpkg -l\ndpkg -l | grep nginx\n\n# 파일이 어느 패키지에 속하는지\ndpkg -S /usr/bin/nginx\n\n# 패키지가 설치할 파일 목록\ndpkg -L nginx\n```\n\n---\n\n## 10.3 dpkg - 저수준 패키지 관리\n\n```bash\n# .deb 파일 설치\nsudo dpkg -i package.deb\n\n# 의존성 문제 해결 후 재시도\nsudo apt install -f\n\n# 패키지 제거\nsudo dpkg -r package-name\nsudo dpkg -P package-name    # 설정 파일 포함 제거\n\n# 설치된 패키지 정보\ndpkg -s package-name\n\n# 패키지 파일 추출 (설치 없이)\ndpkg -x package.deb /tmp/extract/\n\n# 패키지 내용 확인\ndpkg -c package.deb\n```\n\n---\n\n## 10.4 PPA 추가\n\n### PPA(Personal Package Archive) 란?\n\nPPA는 개인이나 팀이 운영하는 우분투 패키지 저장소입니다. 공식 저장소보다 최신 버전이나 추가 소프트웨어를 제공합니다.\n\n```bash\n# PPA 추가\nsudo add-apt-repository ppa:deadsnakes/python\nsudo add-apt-repository ppa:ondrej/php\n\n# 목록 업데이트 후 설치\nsudo apt update\nsudo apt install python3.12\n\n# PPA 제거\nsudo add-apt-repository --remove ppa:deadsnakes/python\n# 또는\nsudo ppa-purge ppa:deadsnakes/python\n```\n\n### 서드파티 저장소 추가\n\n```bash\n# 예: Docker 공식 저장소\n# 1. GPG 키 추가\ncurl -fsSL https://download.docker.com/linux/ubuntu/gpg | \\\n  sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg\n\n# 2. 저장소 추가\necho \"deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] \\\n  https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable\" | \\\n  sudo tee /etc/apt/sources.list.d/docker.list\n\n# 3. 업데이트 및 설치\nsudo apt update\nsudo apt install docker-ce\n\n# 예: Node.js 공식 저장소\ncurl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -\nsudo apt install -y nodejs\n```\n\n---\n\n## 10.5 소스 컴파일 설치\n\n### 빌드 환경 준비\n\n```bash\n# 빌드 필수 도구\nsudo apt install build-essential\nsudo apt install autoconf automake libtool\n\n# 개발 라이브러리\nsudo apt install libssl-dev libpcre3-dev zlib1g-dev\n```\n\n### 소스에서 컴파일 (예: Nginx)\n\n```bash\n# 소스 다운로드\nwget http://nginx.org/download/nginx-1.25.0.tar.gz\ntar -xzf nginx-1.25.0.tar.gz\ncd nginx-1.25.0\n\n# 의존성 설치\nsudo apt install -y libpcre3 libpcre3-dev zlib1g zlib1g-dev \\\n  libssl-dev libgd-dev\n\n# 설정 (configure)\n./configure \\\n  --prefix=/opt/nginx \\\n  --with-http_ssl_module \\\n  --with-http_v2_module \\\n  --with-http_gzip_static_module\n\n# 컴파일\nmake -j$(nproc)     # CPU 코어 수만큼 병렬 컴파일\n\n# 설치\nsudo make install\n\n# 확인\n/opt/nginx/sbin/nginx -v\n```\n\n### checkinstall - 소스 설치를 패키지로 변환\n\n```bash\nsudo apt install checkinstall\n\n# make install 대신 checkinstall 사용\nsudo checkinstall make install\n# .deb 패키지 생성 및 설치\n# dpkg로 관리 가능\n```\n\n---\n\n## 10.6 패키지 보류와 우선순위\n\n### 패키지 버전 고정 (Hold)\n\n```bash\n# 패키지 업그레이드 방지\nsudo apt-mark hold nginx\nsudo apt-mark hold linux-image-generic\n\n# 보류 목록 확인\napt-mark showhold\n\n# 보류 해제\nsudo apt-mark unhold nginx\n```\n\n### apt preferences - 저장소 우선순위\n\n```bash\n# /etc/apt/preferences.d/에 파일 생성\nsudo nano /etc/apt/preferences.d/nginx-priority\n```\n\n```\nPackage: nginx\nPin: version 1.18.*\nPin-Priority: 1001\n```\n\n---\n\n## 10.7 apt 캐시와 성능\n\n```bash\n# 캐시 디렉토리\nls /var/cache/apt/archives/\n\n# 캐시 크기 확인\ndu -sh /var/cache/apt/archives/\n\n# 저장소 미러 최적화\nsudo apt install apt-select\n# 또는 수동으로 가까운 미러로 변경\nsudo nano /etc/apt/sources.list\n# archive.ubuntu.com → kr.archive.ubuntu.com (한국)\n\n# apt 동시 다운로드 설정\nsudo nano /etc/apt/apt.conf.d/99-parallel-downloads\n```\n\n```\nAcquire::Queue-Mode \"access\";\nAcquire::Retries \"3\";\nAPT::Acquire::Workers::MAX \"5\";\n```\n\n---\n\n## 핵심 요약\n\n| 명령어 | 용도 |\n|--------|------|\n| `apt update` | 패키지 목록 갱신 |\n| `apt upgrade` | 패키지 업그레이드 |\n| `apt install pkg` | 패키지 설치 |\n| `apt remove pkg` | 패키지 제거 |\n| `apt purge pkg` | 설정 포함 완전 제거 |\n| `apt search` | 패키지 검색 |\n| `apt show` | 패키지 정보 |\n| `dpkg -l` | 설치 목록 |\n| `dpkg -S file` | 파일의 패키지 확인 |\n\n- **apt update는 설치가 아님**: 목록만 갱신\n- **PPA**: 최신 버전이 필요할 때, 신뢰할 수 있는 출처만\n- **소스 설치**: 커스텀 옵션이 필요할 때만 사용\n- **apt-mark hold**: 특정 버전 유지 필요 시\n", "# 챕터 11: 웹 서버 구축 (Nginx)\n\n> Nginx로 고성능 웹 서버를 구축하고 운영한다\n\n## 학습 목표\n- Nginx 설치와 기본 설정을 할 수 있다\n- 가상 호스트로 여러 도메인을 운영할 수 있다\n- HTTPS/SSL 인증서를 설정할 수 있다\n- 리버스 프록시로 애플리케이션 서버를 연결할 수 있다\n\n---\n\n## 11.1 Nginx 이해\n\n### Nginx vs Apache\n\n| 특성 | Nginx | Apache |\n|------|-------|--------|\n| 아키텍처 | 이벤트 기반(비동기) | 프로세스/스레드 기반 |\n| 동시 접속 | 매우 높음 | 상대적으로 낮음 |\n| 메모리 | 낮은 메모리 사용 | 높은 메모리 사용 |\n| 정적 파일 | 매우 빠름 | 빠름 |\n| 설정 | 중앙 집중식 | 분산(.htaccess) |\n| 모듈 | 컴파일 타임 | 런타임 로드 가능 |\n\n### Nginx 설치\n\n```bash\n# 공식 저장소에서 설치\nsudo apt update\nsudo apt install nginx\n\n# 최신 버전 (Nginx 공식 저장소)\ncurl -fsSL https://nginx.org/keys/nginx_signing.key | \\\n  sudo gpg --dearmor -o /usr/share/keyrings/nginx-keyring.gpg\n\necho \"deb [signed-by=/usr/share/keyrings/nginx-keyring.gpg] \\\n  http://nginx.org/packages/ubuntu $(lsb_release -cs) nginx\" | \\\n  sudo tee /etc/apt/sources.list.d/nginx.list\n\nsudo apt update && sudo apt install nginx\n\n# 서비스 시작 및 활성화\nsudo systemctl enable --now nginx\n\n# 버전 확인\nnginx -v\n```\n\n---\n\n## 11.2 Nginx 설정 파일 구조\n\n```\n/etc/nginx/\n├── nginx.conf              ← 메인 설정 파일\n├── conf.d/                 ← 추가 설정 (자동 로드)\n│   └── default.conf\n├── sites-available/        ← 가상 호스트 설정 (Ubuntu 방식)\n│   └── default\n├── sites-enabled/          ← 활성화된 가상 호스트 (심볼릭 링크)\n│   └── default -> ../sites-available/default\n├── snippets/               ← 재사용 설정 조각\n│   ├── fastcgi-php.conf\n│   └── snakeoil.conf\n└── modules-enabled/        ← 활성화된 모듈\n```\n\n### nginx.conf 구조\n\n```nginx\n# /etc/nginx/nginx.conf\n\nuser www-data;\nworker_processes auto;          # CPU 코어 수\npid /run/nginx.pid;\n\nevents {\n    worker_connections 1024;    # 워커당 최대 연결 수\n    use epoll;                  # Linux 이벤트 모델\n    multi_accept on;\n}\n\nhttp {\n    # MIME 유형\n    include /etc/nginx/mime.types;\n    default_type application/octet-stream;\n\n    # 로그 형식\n    log_format main '$remote_addr - $remote_user [$time_local] '\n                    '\"$request\" $status $body_bytes_sent '\n                    '\"$http_referer\" \"$http_user_agent\"';\n\n    access_log /var/log/nginx/access.log main;\n    error_log /var/log/nginx/error.log warn;\n\n    # 성능 설정\n    sendfile on;\n    tcp_nopush on;\n    tcp_nodelay on;\n    keepalive_timeout 65;\n    gzip on;\n\n    # 가상 호스트 설정 포함\n    include /etc/nginx/conf.d/*.conf;\n    include /etc/nginx/sites-enabled/*;\n}\n```\n\n---\n\n## 11.3 가상 호스트 설정\n\n### 기본 정적 사이트\n\n```bash\n# 사이트 디렉토리 생성\nsudo mkdir -p /var/www/example.com/html\nsudo chown -R $USER:$USER /var/www/example.com/html\n\n# 테스트 페이지 생성\ncat > /var/www/example.com/html/index.html << 'EOF'\n<!DOCTYPE html>\n<html>\n<body><h1>example.com 동작 중!</h1></body>\n</html>\nEOF\n```\n\n```bash\n# 가상 호스트 설정 파일 생성\nsudo nano /etc/nginx/sites-available/example.com\n```\n\n```nginx\nserver {\n    listen 80;\n    listen [::]:80;\n\n    server_name example.com www.example.com;\n    root /var/www/example.com/html;\n    index index.html index.htm;\n\n    # 액세스/에러 로그\n    access_log /var/log/nginx/example.com.access.log;\n    error_log  /var/log/nginx/example.com.error.log;\n\n    location / {\n        try_files $uri $uri/ =404;\n    }\n\n    # 정적 파일 캐싱\n    location ~* \\.(jpg|jpeg|png|gif|ico|css|js)$ {\n        expires 1y;\n        add_header Cache-Control \"public, no-transform\";\n    }\n\n    # 숨김 파일 차단\n    location ~ /\\. {\n        deny all;\n    }\n}\n```\n\n```bash\n# 가상 호스트 활성화\nsudo ln -s /etc/nginx/sites-available/example.com /etc/nginx/sites-enabled/\n\n# 설정 문법 검사\nsudo nginx -t\n\n# Nginx 재로드\nsudo systemctl reload nginx\n```\n\n---\n\n## 11.4 HTTPS 설정 (Let's Encrypt)\n\n### Certbot 설치\n\n```bash\n# Certbot 설치\nsudo apt install certbot python3-certbot-nginx\n\n# 인증서 발급 (도메인이 실제로 가리키고 있어야 함)\nsudo certbot --nginx -d example.com -d www.example.com\n\n# 와일드카드 인증서\nsudo certbot certonly --manual -d \"*.example.com\" \\\n  --preferred-challenges dns\n```\n\n### 수동 SSL 설정\n\n```nginx\nserver {\n    listen 80;\n    server_name example.com www.example.com;\n    # HTTP → HTTPS 리다이렉트\n    return 301 https://$server_name$request_uri;\n}\n\nserver {\n    listen 443 ssl http2;\n    listen [::]:443 ssl http2;\n    server_name example.com www.example.com;\n\n    root /var/www/example.com/html;\n    index index.html;\n\n    # SSL 인증서\n    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;\n    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;\n\n    # SSL 보안 설정\n    ssl_protocols TLSv1.2 TLSv1.3;\n    ssl_prefer_server_ciphers off;\n    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;\n    ssl_session_cache shared:SSL:10m;\n    ssl_session_timeout 10m;\n\n    # HSTS (HTTPS 강제)\n    add_header Strict-Transport-Security \"max-age=31536000; includeSubDomains\" always;\n\n    # 보안 헤더\n    add_header X-Frame-Options DENY;\n    add_header X-Content-Type-Options nosniff;\n    add_header X-XSS-Protection \"1; mode=block\";\n\n    location / {\n        try_files $uri $uri/ =404;\n    }\n}\n```\n\n```bash\n# 자동 갱신 테스트\nsudo certbot renew --dry-run\n\n# cron으로 자동 갱신 (certbot이 자동 설정)\nsudo systemctl status certbot.timer\n```\n\n---\n\n## 11.5 리버스 프록시\n\n### Node.js/Python 앱 연결\n\n```nginx\n# /etc/nginx/sites-available/myapp\nserver {\n    listen 80;\n    server_name api.example.com;\n\n    location / {\n        proxy_pass http://127.0.0.1:3000;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection 'upgrade';\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_cache_bypass $http_upgrade;\n        proxy_read_timeout 60s;\n    }\n}\n```\n\n### 업스트림 로드밸런싱\n\n```nginx\nupstream myapp {\n    least_conn;                          # 최소 연결 방식\n    server 127.0.0.1:3001 weight=3;     # 가중치\n    server 127.0.0.1:3002 weight=1;\n    server 127.0.0.1:3003 backup;       # 백업 서버\n    keepalive 32;\n}\n\nserver {\n    listen 80;\n    location / {\n        proxy_pass http://myapp;\n    }\n}\n```\n\n---\n\n## 11.6 성능 최적화\n\n```nginx\n# /etc/nginx/conf.d/performance.conf\n\n# Gzip 압축\ngzip on;\ngzip_vary on;\ngzip_proxied any;\ngzip_comp_level 6;\ngzip_types text/plain text/css text/xml application/json\n           application/javascript application/xml+rss\n           application/atom+xml image/svg+xml;\n\n# 파일 캐시\nopen_file_cache max=1000 inactive=20s;\nopen_file_cache_valid 30s;\nopen_file_cache_min_uses 2;\n\n# 버퍼 설정\nclient_body_buffer_size 128k;\nclient_max_body_size 10m;\nclient_header_buffer_size 1k;\n```\n\n---\n\n## 11.7 Nginx 로그 분석\n\n```bash\n# 실시간 로그 모니터링\nsudo tail -f /var/log/nginx/access.log\nsudo tail
